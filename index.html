.trumpCards{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.trumpCard{border:2px solid #8b6a33;border-radius:12px;background:linear-gradient(#fff6d5,#dfc184);color:#172337;padding:8px;cursor:pointer;box-shadow:0 2px 0 rgba(0,0,0,.22);min-height:72px;display:flex;flex-direction:column;justify-content:space-between}.trumpCard:hover{transform:translateY(-1px);filter:brightness(1.05)}.trumpCard.selected{border-color:#fff2a8;background:linear-gradient(#ffe98f,#d7a62b);box-shadow:0 0 0 3px rgba(255,214,78,.25),0 2px 0 rgba(0,0,0,.25)}.trumpCard.disabled{opacity:.35;pointer-events:none}.trumpName{font-weight:1000;font-size:13px}.trumpDesc{font-size:11px;line-height:1.25;color:#4b3922}.trumpTarget{font-size:11px;color:#755117;font-weight:900}.assignLane.carded{outline:4px solid rgba(255,210,65,.55);box-shadow:0 0 18px rgba(255,210,65,.35),0 4px 0 rgba(0,0,0,.25)}.assignCardLine b{color:#8a4b00;font-size:13px}.caseCard .caseMeta{display:none!important}.caseCard{min-height:112px!important}.lane.stun::after{content:'立て直し中';position:absolute;left:50%;top:42px;transform:translateX(-50%);color:#ffe7a8;background:rgba(0,0,0,.26);border:1px solid rgba(255,231,160,.45);border-radius:999px;padding:3px 10px;font-size:11px;font-weight:900;z-index:30}.actor.bracing img{filter:drop-shadow(0 12px 9px rgba(0,0,0,.42)) saturate(.85) brightness(.9)}

<body><div id="game"><section id="screenMain" class="screen active"></section><section id="screenAssign" class="screen"></section><section id="screenBattle" class="screen"></section><section id="screenResult" class="screen"></section></div>
<script>
'use strict';
const CONFIG={battleSeconds:15,actorW:150,overlapRatio:.35,readyPx:360,goodPx:168,perfectPx:44,baseSpeed:.57,farBoost:1.18,nearBoost:.82};
const TUNING={
judgeDelta:{'Perfect!':52,Good:20,Normal:-4,Bad:-30},
recoil:{
'Perfect!':{playerKb:42,enemyKb:230,playerStun:.14,enemyStun:.76,dur:.36},
Good:{playerKb:66,enemyKb:150,playerStun:.24,enemyStun:.54,dur:.34},
Normal:{playerKb:118,enemyKb:92,playerStun:.42,enemyStun:.30,dur:.35},
Bad:{playerKb:190,enemyKb:54,playerStun:.74,enemyStun:.20,dur:.38}
},
finish:{winEnemyX:1450,winPlayerBack:36,lossPlayerX:-560,lossEnemyBack:36},
accel:{startRatio:.18,rate:3.4,minSlide:.10}
};
const IMG={albrecht:'https://lh3.googleusercontent.com/d/1FFvdrMNaSqL4Iw6jXGY7GSlydoKtAz-Z',brother:'https://lh3.googleusercontent.com/d/11r6fBXfV_o-HocoKItXXqheU15WAVLV1',wife:'https://lh3.googleusercontent.com/d/1hXJDVWQ4quNQHlTn_lQvNMUdkKeTaRYt',butler:'https://lh3.googleusercontent.com/d/1oUSfZOYPPBX1YcDId_Yrl8hNNcpP_9um',horse:'https://lh3.googleusercontent.com/d/1QGIBZflFZOFEC2vrnpLVqU4YAC-Le1eW',soldier:'https://lh3.googleusercontent.com/d/1sF1erNkEKUmsNLBjISUKIMCSDk_8td1G'};
const DATA={
actors:{albrecht:{id:'albrecht',name:'アルブレヒト',type:'万能型',speed:3,push:3,stability:3,defense:3},brother:{id:'brother',name:'弟',type:'高速攻勢型',speed:5,push:3,stability:2,defense:2},wife:{id:'wife',name:'妻',type:'安定支援型',speed:2,push:2,stability:5,defense:4}},
cards:{assault:{id:'assault',name:'強攻令',short:'強攻',desc:'最初のGood以上で押し込み+18。失敗時は-8。'},guard:{id:'guard',name:'鉄壁令',short:'鉄壁',desc:'最初のマイナス判定を大きく軽減。'},royal:{id:'royal',name:'親征宣言',short:'親征',desc:'アルブレヒト戦線で最初の判定を1段階上げる。'},wifeAdvice:{id:'wifeAdvice',name:'王妃の助言',short:'王妃',desc:'最初のBadをNormal扱いにし、反動を軽くする。'},butler:{id:'butler',name:'老執事の助言',short:'執事',desc:'この戦線だけ判定幅を広げ、押し合いを安定させる。'}},
cases:[
{id:'tutorial_butler',title:'老執事との訓練',category:'訓練',difficulty:'tutorial',ignoreType:'放置可',enemy:'老執事',lineName:'間合い',initialLine:5,enemyImg:'butler',intro:'朝霧の中庭で、老執事は木剣を静かに構えた。「陛下。王の一歩は、兵の千歩に先立つものでございます」',effects:makeEffects({win:{prestige:1},loss:{},ignored:{},stories:['老執事は深く一礼した。「見事でございます。陛下の一歩には王の重みが宿っております」','老執事は静かに微笑んだ。「焦る必要はございません」','老執事は何も責めなかった。ただ、もう一度構えを示した。']})},
{id:'peasant_revolt',title:'農民の一揆',category:'内政',difficulty:'normal',ignoreType:'悪化注意',enemy:'一揆の代表',lineName:'鎮静度',initialLine:-10,intro:'北の穀倉地帯で、農民たちが鍬を掲げて徴税官を追い返した。飢えと怒りは、王都の命令より早く広がっている。',effects:makeEffects({win:{stability:7,prestige:3,treasury:2},loss:{stability:-8,treasury:-3},ignored:{stability:-2},stories:['農民の怒りはひとまず収まった。王の名は村にも届き始めている。','一揆は押しとどめたが、穀倉地帯にはまだ不満が残る。','農民の怒りは広がり、徴税の声は村々で拒まれた。']})},
{id:'hospital',title:'病院の建設',category:'内政・福祉',difficulty:'easy',ignoreType:'くすぶる',enemy:'反対する財務官',lineName:'建設進度',initialLine:0,intro:'王都の貧民街で熱病が広がり始めた。医師たちは施療院の建設を求めるが、財務官は空の金庫を理由に渋っている。',effects:makeEffects({win:{stability:5,citySupport:5,treasury:-3},loss:{stability:-3,citySupport:-3},ignored:{},stories:['施療院の鐘が鳴り、王都の人々は若き王の慈悲を語った。','計画は小さく進んだ。だが熱病への不安は残る。','施療院の話は帳簿の中で止まり、貧民街には湿った咳が残った。']})},
{id:'loire_border',title:'ロアール国境のいさかい',category:'外交・国境',difficulty:'normal',ignoreType:'くすぶる',enemy:'ロアール国境代官',lineName:'国境の緊張',initialLine:-5,intro:'アルトラントとロアールの境界村で、用水路をめぐる小競り合いが起きた。農民同士の争いは、放置すれば国同士の面子へ変わる。',effects:makeEffects({win:{diplomacy:5,stability:3},loss:{diplomacy:-5,stability:-2},ignored:{diplomacy:-1},stories:['国境の用水路は共同管理となり、ロアール側も王の裁きを認めた。','争いは収まったが、境界の杭はまだ不安定に揺れている。','小さないさかいは、国境の村々に疑心を残した。']})},
{id:'horse',title:'愛馬の乗りこなし',category:'成長',difficulty:'hard',ignoreType:'機会損失',enemy:'愛馬シュトルム',lineName:'手綱',initialLine:-15,enemyImg:'horse',intro:'黒馬シュトルムは、若き王を背に乗せることを拒むように嘶いた。厩番は黙って手綱を差し出す。',effects:makeEffects({win:{prestige:3},loss:{prestige:-2},ignored:{},stories:['シュトルムは王を認めた。宮廷ではその走りがしばらく語り草となった。','王は振り落とされながらも手綱を離さなかった。','シュトルムは別の厩舎へ移された。この機会はもう戻らない。']})},
{id:'landlord',title:'悪徳地主の排除',category:'内政・裁き',difficulty:'normal',ignoreType:'放置不可',enemy:'悪徳地主',lineName:'裁きの主導権',initialLine:-10,intro:'ある地主が借金を盾に農民の土地を奪い、私兵まで雇っているという訴えが届いた。だが、その地主は有力貴族の縁者だった。',effects:makeEffects({win:{stability:6,prestige:4,nobleSupport:-2},loss:{stability:-6,prestige:-3},ignored:{stability:-3},stories:['悪徳地主は裁かれた。農民たちは王の名を初めて味方として口にした。','裁きは下ったが、貴族たちは王の手元を警戒している。','地主の私兵はさらに大きな顔で村道を歩くようになった。']})},
{id:'elector',title:'選帝侯との折衝',category:'政争',difficulty:'hard',ignoreType:'放置不可',enemy:'筆頭選帝侯',lineName:'議場の流れ',initialLine:-20,intro:'選帝侯たちは礼儀正しく頭を下げた。だが卓上に並ぶ沈黙のすべてが、若き王の力量を試していた。',effects:makeEffects({win:{prestige:9,nobleSupport:5},loss:{prestige:-9,nobleSupport:-7},ignored:{prestige:-3,nobleSupport:-2},stories:['議場の流れは王へ傾いた。選帝侯たちはしばらく沈黙を選ぶだろう。','折衝はかろうじて保たれた。だが目の奥の疑いは消えない。','選帝侯たちは、若き王の沈黙を弱さとして記憶した。']})},
{id:'rick',title:'リックの要請',category:'宗教・外交',difficulty:'hard',ignoreType:'くすぶる',enemy:'リック聖庁使節',lineName:'信仰と国益',initialLine:-15,intro:'リックから聖地支援の要請が届いた。応じれば教会は喜ぶが、国庫と兵は削られる。拒めば信仰の敵と見なされかねない。',effects:makeEffects({win:{churchSupport:7,diplomacy:3,treasury:-2},loss:{churchSupport:-7,diplomacy:-2},ignored:{churchSupport:-1},stories:['聖庁使節は満足げに十字を切った。王国の信仰上の立場は守られた。','要請への返答は曖昧にまとまった。信仰と国益の綱引きは続く。','リックの使節は不満を隠さず、王宮を去った。']})},
{id:'ruthenia',title:'ルテニアの外交団',category:'外交',difficulty:'desperate',ignoreType:'放置不可',enemy:'ルテニア外交団長',lineName:'交渉主導権',initialLine:-30,intro:'ルテニアの外交団は、笑みを浮かべたまま王宮へ入った。彼らの礼儀正しさは、剣よりも冷たい圧力を帯びている。',effects:makeEffects({win:{diplomacy:10,prestige:8},loss:{diplomacy:-10,prestige:-8,troops:-120},ignored:{diplomacy:-4,prestige:-2},stories:['外交団の笑みが消えた。若き王は侮れない相手として記録された。','会談は冷えたまま終わった。ルテニアはまだこちらを測っている。','外交団は勝ち誇って去った。次に届くのは、要求の書簡かもしれない。']})},
{id:'seafeara',title:'セーフェアラの貿易',category:'商業・外交',difficulty:'normal',ignoreType:'くすぶる',enemy:'セーフェアラ商業使節',lineName:'交易条件',initialLine:0,intro:'海の商業連盟セーフェアラが、港湾使用権と引き換えに大規模な交易協定を持ちかけてきた。利益は大きいが、主導権を渡せば王国の商人は飲み込まれる。',effects:makeEffects({win:{treasury:10,diplomacy:4,citySupport:3},loss:{treasury:-3,diplomacy:-4,citySupport:-5},ignored:{treasury:-1},stories:['交易協定は王国側の条件でまとまった。港には新しい帆が並ぶ。','利益は出たが、商人たちはセーフェアラのしたたかさを思い知った。','港の商人たちは機会を逃したと不満げに帳簿を閉じた。']})}
],
events:[{id:'butler_report',when:1,speaker:'老執事',title:'朝食前の報告',text:'「陛下。即位して最初の半年でございます。すべてを裁こうとなさらず、どこへ王命を下すかをお選びください」',choices:[{label:'うなずく',result:'老執事は一礼し、今日届いた訴状を静かに机へ並べた。',flags:{butlerAdvice:true}}]},{id:'brother_shadow',when:2,speaker:'弟',title:'弟の視線',text:'弟は訓練場の端で、あなたの采配を黙って見ている。誇らしげにも、悔しげにも見える沈黙だった。',choices:[{label:'声をかける',result:'弟は少しだけ表情を和らげた。',hidden:{brotherRelation:3}},{label:'今は放っておく',result:'弟は黙って去った。次に話す機会は少し遠のいた。',hidden:{brotherRelation:-2}}]}]
};
function makeEffects({win={},loss={},ignored={},stories=[]}){return{completeWin:{params:scaleParams(win,1.4),story:stories[0]},majorWin:{params:win,story:stories[0]},minorWin:{params:scaleParams(win,.55),story:stories[1]||stories[0]},draw:{params:{},story:stories[1]||'事態は先送りされた。'},minorLoss:{params:scaleParams(loss,.55),story:stories[2]||stories[1]},majorLoss:{params:loss,story:stories[2]},completeLoss:{params:scaleParams(loss,1.4),story:stories[2]},ignored:{params:ignored,story:stories[2]||'未対応のまま、火種は静かに残った。'}}}
function scaleParams(obj,m){const out={};for(const[k,v]of Object.entries(obj||{}))out[k]=Math.round(v*m);return out}
const State={turn:1,yearStoryRead:false,justRevealed:false,selected:[],assignments:{},cardAssignment:null,shownEvents:{},params:{treasury:50,troops:1000,stability:50,prestige:50,nobleSupport:50,citySupport:50,churchSupport:50,diplomacy:50},hand:['assault','guard','royal','wifeAdvice','butler'],queue:[],lastSummary:null};
let battle=null,audioCtx=null,soundOn=true;
const $=id=>document.getElementById(id);
function setScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function periodLabel(){const age=16+Math.floor((State.turn-1)/2);return `${age}歳 ${State.turn%2?'上半期':'下半期'}`}
function paramHud(){return `<span class="param">国庫 ${State.params.treasury}</span><span class="param">兵数 ${State.params.troops}</span>`}
function visibleCases(){if(State.turn===1)return ['tutorial_butler','peasant_revolt','hospital','loire_border','horse'].map(getCase);const pool=DATA.cases.filter(c=>c.id!=='tutorial_butler');const count=4+((State.turn+1)%4);const start=(State.turn*3)%pool.length;return [...pool.slice(start),...pool.slice(0,start)].slice(0,count)}
function getCase(id){return DATA.cases.find(c=>c.id===id)}
function yearStoryText(){return State.turn===1?'即位して最初の春。若き王の前に、民の怒り、国境の火種、病の不安、そして王自身の未熟さが同時に差し出された。':'この半年も、王国は静かには進まない。宮廷の沈黙、国境のざわめき、商人たちの帳簿が、若き王の采配を待っている。'}
const View={
main(){setScreen('screenMain');const event=Flow.pendingEvent();if(event){View.event(event);return}const story=!State.yearStoryRead;const vis=visibleCases();const picked=State.selected.map(getCase).filter(Boolean);const area=story?`<div class="yearStory"><div class="yearStoryKicker">${periodLabel()}　情勢</div><div class="yearStoryText">${yearStoryText()}</div><div class="yearStoryHint">この枠のどこをタップしても、国境の変化と案件が表示されます</div></div>`:vis.map(View.caseCard).join('');$('screenMain').innerHTML=`<div class="topbar"><b>${periodLabel()}</b>${paramHud()}</div><div class="pick"><div class="map ${story?'':'revealed'}"><div class="mapTitle">アルトラント周辺</div><div class="gridMap">${Array.from({length:64},(_,i)=>`<div class="tile ${i%13===0?'enemy':i%3===0?'own':'neutral'}"></div>`).join('')}</div></div><div class="casePanel ${story?'storyMode':'revealList'}" ${story?'onclick="Flow.revealYear()"':''}>${area}</div><div class="slots">${[0,1,2].map(i=>View.slot(picked[i],i)).join('')}<button class="next ${State.selected.length?'pulse':''}" ${State.selected.length?'':'disabled'} onclick="Flow.toAssign()">次へ</button></div><div class="count">${State.selected.length}/3</div>${State.warn?'<div class="toast">3件までです</div>':''}</div>`;if(State.warn)setTimeout(()=>{State.warn=false;View.main()},700)},
caseCard(c){const idx=State.selected.indexOf(c.id);const sel=idx>=0?'selected':'';const locked=idx<0&&State.selected.length>=3?'locked':'';return `<div class="caseCard ${c.difficulty} ${sel} ${locked}" data-order="${idx>=0?idx+1:''}" onclick="Flow.toggleCase('${c.id}')"><div class="caseTitle">${c.title}</div><div class="caseStory">${c.intro}</div></div>`},
slot(c,i){return c?`<div class="slot filled" onclick="Flow.toggleCase('${c.id}')"><div class="slotNo">戦線${i+1}</div><div class="slotTitle">${c.title}</div></div>`:`<div class="slot"><div class="slotNo">戦線${i+1}</div><div class="slotEmpty">空き</div></div>`},
event(ev){$('screenMain').innerHTML=`<div class="topbar"><b>${periodLabel()}</b>${paramHud()}</div><div class="modalShade"><div class="modalBox"><h2>${ev.title}</h2><div class="dialogSpeaker">${ev.speaker}</div><div class="dialogText">${ev.text}</div><div class="choices">${ev.choices.map((ch,i)=>`<button onclick="Flow.chooseEvent('${ev.id}',${i})">${ch.label}</button>`).join('')}</div></div></div>`},
assign(){setScreen('screenAssign');const ids=State.selected;const current=ids[State.cursor]||ids[0];const used=Object.entries(State.assignments).filter(([cid])=>cid!==current).map(([,aid])=>aid);const ready=Flow.allAssigned();const lanes=ids.map((id,i)=>{const c=getCase(id),a=DATA.actors[State.assignments[id]],cardId=State.cardAssignment?.caseId===id?State.cardAssignment.cardId:null,card=cardId?DATA.cards[cardId]:null;return `<div class="assignLane ${i===State.cursor?'active':''} ${a?'done':''} ${card?'carded':''}" onclick="Flow.chooseLane(${i})"><div class="badge">${i+1}</div><div><div class="assignCaseTitle">${c.title}</div><div class="assignCaseMeta">敵：${c.enemy}</div><div class="assignCardLine">切り札：<b>${card?card.name:'なし'}</b></div></div><div class="assigned">${a?a.name:'未采配'}</div></div>`}).join('');const actorCards=Object.values(DATA.actors).map(a=>`<div class="actorCard ${used.includes(a.id)?'disabled':''} ${State.assignments[current]===a.id?'active':''}" onclick="Flow.assignActor('${a.id}')"><div class="portrait">${a.name[0]}</div><div><div class="actorName">${a.name}</div><div class="actorStat">${a.type}</div><div class="actorStat">速${a.speed} 押${a.push} 安${a.stability} 防${a.defense}</div></div></div>`).join('');const assignedIds=new Set(Object.values(State.assignments));const currentCase=getCase(current);const cards=State.hand.map(id=>{const cd=DATA.cards[id];const selected=State.cardAssignment?.cardId===id;const disabled=!ready||(cd.actorId&&assignedIds.has(cd.actorId));const target=selected?`投入先：${getCase(State.cardAssignment.caseId)?.title||''}`:'1戦線だけ';return `<div class="trumpCard ${selected?'selected':''} ${disabled?'disabled':''}" onclick="Flow.assignCard('${id}')"><div><div class="trumpName">${cd.name}</div><div class="trumpDesc">${cd.desc}</div></div><div class="trumpTarget">${target}</div></div>`}).join('');const n=ids.filter(id=>State.assignments[id]).length;$('screenAssign').innerHTML=`<div class="topbar"><b>${periodLabel()}　采配</b>${paramHud()}</div><div class="assign"><div class="assignHead"><div><div class="assignTitle">采配を下す</div><div class="small">光っている戦線に人を置きます。全員を置くと切り札を1枚だけ使えます。</div></div><div class="progress ${ready?'ready':''}">${n}/${ids.length}</div></div><div class="assignLanes">${lanes}</div><div class="sidePanel"><div class="currentPick">現在の戦線<br><b>${currentCase?currentCase.title:'未選択'}</b><br>${ready?'必要なら下の切り札を1枚置けます。':'まず人を向かわせます。'}</div><h3>誰を向かわせる？</h3>${actorCards}</div><div class="trumpBar ${ready?'':'locked'}"><div class="trumpHead">切り札<small>${ready?'選択中の戦線へ、この半期に1枚だけ置けます。':'人物の采配が終わると使用できます。'}</small></div><div class="trumpCards">${cards}</div></div><div class="assignFooter"><button class="primary ${ready?'pulse':''}" ${ready?'':'disabled'} onclick="Flow.startBattle()">衝突開始</button></div></div>`},

function beep(f=440,d=.06,type='sine',g=.05){const ctx=audio();if(!ctx)return;const o=ctx.createOscillator(),gn=ctx.createGain();o.type=type;o.frequency.value=f;gn.gain.setValueAtTime(g,ctx.currentTime);gn.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+d);o.connect(gn);gn.connect(ctx.destination);o.start();o.stop(ctx.currentTime+d)}
function noise(d=.08,g=.08){const ctx=audio();if(!ctx)return;const b=ctx.createBuffer(1,ctx.sampleRate*d,ctx.sampleRate),a=b.getChannelData(0);for(let i=0;i<a.length;i++)a[i]=(Math.random()*2-1)*(1-i/a.length);const s=ctx.createBufferSource(),gn=ctx.createGain();s.buffer=b;gn.gain.setValueAtTime(g,ctx.currentTime);gn.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+d);s.connect(gn);gn.connect(ctx.destination);s.start()}
function sfx(n){if(n==='tap')beep(420,.035,'triangle',.025);if(n==='good'){beep(700,.05,'triangle',.04);noise(.04,.025)}if(n==='perfect'){beep(880,.045,'triangle',.055);setTimeout(()=>beep(1320,.06,'triangle',.045),45);noise(.055,.045)}if(n==='bad'){beep(180,.09,'sawtooth',.05);noise(.06,.035)}if(n==='card'){beep(520,.04,'triangle',.05);setTimeout(()=>beep(920,.06,'triangle',.045),55)}if(n==='start'){beep(440,.06,'square',.04);setTimeout(()=>beep(660,.06,'square',.04),70);setTimeout(()=>beep(880,.08,'square',.045),140)}if(n==='warn')beep(240,.08,'square',.045)}
window.addEventListener('keydown',e=>{if(!battle||battle.phase!=='running')return;if(e.code==='Space')Battle.tap(battle.lanes[0]?.id);if(e.key.toLowerCase()==='w')Battle.tap(1);if(e.key.toLowerCase()==='s')Battle.tap(2);if(e.key.toLowerCase()==='x')Battle.tap(3)});
View.main();
