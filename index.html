  const p=State.params||{};
  const mapValues=Object.values(State.map||{}).map(v=>Number(v)||0);
  const mapAdv=mapValues.filter(v=>v>0).reduce((a,b)=>a+b,0);
  const mapLoss=Math.abs(mapValues.filter(v=>v<0).reduce((a,b)=>a+b,0));
  const tensionAvg=Object.values(State.tension||{}).reduce((a,b)=>a+(Number(b)||0),0)/Math.max(1,Object.keys(State.tension||{}).length);
  const flags=State.caseFlags||{};
  const infra=Object.keys(flags).filter(k=>k.startsWith('infra_')&&k.endsWith('_built')).length;
  const completed=(State.completedCases||[]).length;
  const hasSpouse=!!State.marriage?.spouseId;
  const dynasty=!!flags.dynasty_started;
  const occult=Object.keys(flags).filter(k=>k.startsWith('occult_')).length;
  const deadSpouses=State.marriage?.deadSpouses||[];
  const marriages=State.marriage?.marriedHistory||[];
  const brotherDead=!!flags.brotherDead||actorIsDead('brother');
  const brotherRebel=!!flags.brotherRebellionUnlocked||(State.completedCases||[]).includes('brother_rebellion');
  const brotherReturned=actorIsUnlocked('brother')||brotherDead||brotherRebel;
  return {
    state:(p.stability||0)+(p.prestige||0)+(p.diplomacy||0)+(p.nobleSupport||0)+(p.citySupport||0)+(p.churchSupport||0),
    average:Math.round(((p.stability||0)+(p.prestige||0)+(p.diplomacy||0)+(p.nobleSupport||0)+(p.citySupport||0)+(p.churchSupport||0))/6),

function determineHistoricalEpithet(kind='fate'){

  if(kind==='battle'){

    if(church>=72&&city>=65)return epithet(71);

  }

  if(s.brotherRebel&&!s.brotherDead&&noble<45)return epithet(98);

  if(city<=15&&stability<=25)return epithet(90);
  if(church<=25&&stability<=35)return epithet(95);
  if(treasury<3000&&city<35)return epithet(85);
  if(stability<25&&s.tensionAvg>=7)return epithet(89);

  if(stability>=72&&s.mapLoss>=2)return epithet(6);
  if(s.mapAdv>=6&&noble>=60)return epithet(7);
  if(s.completed>=70&&prestige>=65)return epithet(10);
  if(city>=78&&treasury>=35000&&troops<12000)return epithet(12);
  if(treasury>=65000&&diplomacy>=68)return epithet(19);
  if(treasury>=55000&&city>=70)return epithet(17);
  if(s.infra>=3&&troops>=3500&&treasury>=25000)return epithet(14);
  if(troops>=15000&&s.mapAdv>=4&&prestige>=70)return epithet(21);
  if(troops>=10000&&prestige>=85&&stability>=55)return epithet(22);
  if(troops>=9000&&s.tensionAvg>=6)return epithet(28);
  if(troops>=7000&&prestige>=72)return epithet(25);
  if(s.mapAdv>=3&&troops>=6000)return epithet(30);
  if(diplomacy>=85&&s.tensionAvg<=5)return epithet(48);
  if(diplomacy>=78&&noble>=68)return epithet(38);
  if(diplomacy>=75&&prestige>=65&&treasury>=30000)return epithet(36);
  if(noble>=82&&prestige>=72)return epithet(51);
  if(prestige>=80&&noble>=75)return epithet(52);
  if(noble>=85&&stability>=70)return epithet(60);
  if(s.hasSpouse&&s.dynasty&&diplomacy>=70)return epithet(45);
  if(s.dynasty&&noble>=70)return epithet(46);
  if(church>=85&&stability>=65)return epithet(61);
  if(church>=78&&city>=62)return epithet(62);
  if(city>=85&&stability>=75)return epithet(70);
  if(city>=78&&church>=70)return epithet(72);
  if(stability>=85&&s.tensionAvg<=4)return epithet(74);
  if(stability>=82&&prestige<72)return epithet(73);
  if(stability>=72&&prestige>=60)return epithet(67);

function endingTraitLines(kind='fate'){
  const s=endingScore(),p=s.p,lines=[];
  if(kind==='battle')lines.push('この結末は、王が前線へ踏み出したことで訪れた。敗北であれ勝利であれ、彼は玉座の奥に隠れる王ではなかった。');

  if(s.infra>=5)lines.push('石橋、書庫、施療院、砦、港。王の時代は、戦勝よりも残された建築によって語られる地方を生んだ。');
  else if(s.infra>=2)lines.push('いくつかの建築と制度改革は、王の死後も人々の日々を支えた。');
  if(flagsHas('occult_forest_witch_final_unlocked'))lines.push('森の魔女をめぐる噂は、王の死後も消えなかった。人々はそこに、王国が救いきれなかった者たちの声を聞いた。');
  else if(s.occult>=3)lines.push('白鹿、幽霊、魔女の噂は、王の治世が民の信仰と迷信の上にも成り立っていたことを物語っている。');
  if(s.mapAdv>=5)lines.push('勢力圏は広がり、隣国はアルトラントの名を地図の余白ではなく中心の一つとして扱うようになった。');
  if(s.mapLoss>=4)lines.push('一方で失われた影響圏も多く、後の史家はその治世を「守りきれなかった地図」とともに論じた。');
  if((p.treasury||0)>=80000)lines.push('豊かな国庫は、王の政策に選択肢を与えた。金庫の重みは、そのまま王権の余力でもあった。');
  if((p.treasury||0)<3000)lines.push('晩年の国庫は乏しく、どの美談にも借財と未払いの影が差していた。');
  if((p.stability||0)>=75)lines.push('民は大きな凱歌よりも、壊れない日々を王の功として記憶した。');
  if((p.stability||0)<=25)lines.push('王国の足元は最後まで揺れ、民の不安は年代記の行間に残った。');
  return lines;
}

function isLatePressurePeriod(){return rulerAge()>=28}
function calcUpkeepDetail(){
  const troops=State.params.troops||0;
  const base=Math.round(troops*ECONOMY.troopUpkeep);
  const tier1=Math.max(0,troops-3500)*0.45;
  const tier2=Math.max(0,troops-7000)*0.75;
  const tier3=Math.max(0,troops-12000)*1.15;
  const surcharge=Math.round(tier1+tier2+tier3);
  return{base,surcharge,total:base+surcharge};
}
function strongestLandTensionKey(){
  let best=null,bv=-1;
  for(const k of LAND_BORDER_KEYS){const v=State.tension?.[k]||0;if(v>bv){best=k;bv=v}}
  return best;
}
function applyGreatPowerWatchTick(){
  if(!isLatePressurePeriod())return null;
  const p=State.params||{};
  let score=0;
  if((p.prestige||0)>=70)score++;
  if((p.diplomacy||0)>=70)score++;
  if((p.treasury||0)>=45000)score++;
  if((p.troops||0)>=5500)score++;
  if((p.nobleSupport||0)>=70)score++;
  if(score<3)return null;
  const key=strongestLandTensionKey()||'altrantRuthenia';
  const delta=score>=5?2:1;
  changeTension(key,delta);
  if(!State.latePressureLog)State.latePressureLog=[];
  const msg=`王国の成長を警戒し、${mapDef(key)?.label||key}方面の空気が硬くなった。`;
  State.latePressureLog.push({turn:State.turn,key,delta,msg});
  if(State.latePressureLog.length>8)State.latePressureLog=State.latePressureLog.slice(-8);
  return{key,delta,msg};
}
function applyNeglectConsequence(c){
  if(!c||!['放置不可','悪化注意'].includes(c.ignoreType))return null;
  const tags=caseMeta(c).tags||[];
  const keys=caseTensionKeys(c).filter(k=>LAND_BORDER_KEYS.includes(k));
  const out=[];
  if(keys.length){
    const key=keys[0];
    changeTension(key,1);
    changeInfluence(key,-8);
    out.push(`${mapDef(key)?.label||key}の緊張が尾を引いた`);
  }
  if(tags.includes('finance')||tags.includes('tax')||tags.includes('trade')){
    State.params.treasury=clamp((State.params.treasury||0)-500,0,ECONOMY.treasuryMax);
    out.push('未処理の帳尻で国庫が削られた');
  }
  if(tags.includes('military')||tags.includes('security')||tags.includes('border')){
    State.params.troops=clamp((State.params.troops||0)-25,0,ECONOMY.troopsMax);
    out.push('現場対応で兵が消耗した');
  }
  if(!out.length)return null;
  if(!State.neglectLog)State.neglectLog=[];
  State.neglectLog.push({turn:State.turn,caseId:c.id,title:c.title,text:out.join('、')});
  if(State.neglectLog.length>10)State.neglectLog=State.neglectLog.slice(-10);
  return out.join('、');
}
function applyVictorySidePressure(r){
  if(!isLatePressurePeriod()||!r||!r.case)return null;
  if(!['completeWin','majorWin'].includes(r.rank))return null;
  const tags=caseMeta(r.case).tags||[];
  if(!(tags.includes('border')||tags.includes('greatPower')||tags.includes('country')||tags.includes('war')))return null;
  const keys=caseTensionKeys(r.case).filter(k=>LAND_BORDER_KEYS.includes(k));
  if(!keys.length)return null;
  const key=keys[0];
  changeTension(key,1);
  return `${r.case.title}での強い勝利により、${mapDef(key)?.label||key}方面がこちらを警戒した。`;
}

function showTutorialBadHintOverlay(){
  if(!battle||State.tutorialBadHintSeen)return false;
  State.tutorialBadHintSeen=true;
  const screen=$("screenBattle");
  if(!screen)return false;
  battle.phase='paused';
  battle.pauseStart=performance.now();
  const dim=document.createElement("div");
  dim.className="tutorialDim";
  dim.id="tutorialBadDim";
  const box=document.createElement("div");
  box.className="tutorialOverlay butlerAdviceBox";
  box.id="tutorialBadOverlay";
  box.innerHTML=`<h2>崩された時の心得</h2><p>陛下、ただ今のは一拍遅うございました。</p><p>ぶつかってからでは、相手の勢いを正面から受けてしまいます。間合いが重なる直前に、こちらから踏み込むのでございます。</p><p>TAPの文字が青く光り、敵と肩が重なりかけたその一瞬をお待ちくださいませ。</p><button class="tutorialStartBtn" onclick="closeTutorialBadHint(event)">続ける</button>`;
  screen.appendChild(dim);
  screen.appendChild(box);
  dim.addEventListener("click",closeTutorialBadHint);
  box.addEventListener("click",closeTutorialBadHint);
  return true;
}
function closeTutorialBadHint(ev){
  if(ev){ev.preventDefault();ev.stopPropagation();}
  const dim=$("tutorialBadDim");
  const box=$("tutorialBadOverlay");
  if(dim)dim.remove();
  if(box)box.remove();
  if(!battle||battle.phase==='running')return;
  const now=performance.now();
  if(battle.pauseStart){
    battle.start += now-battle.pauseStart;
    battle.pauseStart=0;
  }
  battle.phase='running';
  battle.last=now;
  requestAnimationFrame(Battle.tick);
}
window.closeTutorialBadHint=closeTutorialBadHint;

if(card==='healingDecree'&&cardMatchesTags(l,['welfare','plague','people','village']))l.cardDelta=(judge==='Bad'||judge==='Normal')?22:8;
if(card==='tradePatent'&&cardMatchesTags(l,['trade','port','finance','city','seafeara']))l.cardDelta=(judge==='Perfect!'||judge==='Good')?20:10;
if(card==='envoySeal'&&cardMatchesTags(l,['diplomacy','politics','noble','greatPower','loire','ruthenia','solia','azraq']))l.cardDelta=judge==='Bad'?26:8;
if(card==='holyBanner'&&cardMatchesTags(l,['religion','church','pilgrimage','faith','rick']))l.cardDelta=(judge==='Bad'||judge==='Normal')?22:8;
if(card==='frontierCall'&&cardMatchesTags(l,['military','border','security','fort','treuval','ruthenia']))l.cardDelta=24;
if(card==='marketCharter'&&cardMatchesTags(l,['city','trade','port','finance','seafeara']))l.cardDelta=16;
if(card==='royalVow'&&cardMatchesTags(l,['dynasty','family','marriage']))l.cardDelta=judge==='Bad'?26:(judge==='Normal'?16:8);
if(card==='forestTalisman'&&cardMatchesTags(l,['occult','witch','ghost','animal','dragon']))l.cardDelta=judge==='Bad'?28:10;
if(card==='masterBuilder'&&cardMatchesTags(l,['infrastructure','building','reform','road']))l.cardDelta=22;
if(card==='lastReserve'&&cardMatchesTags(l,['late','crisis','fate','succession']))l.cardDelta=(l.line<0?30:12);

if(card==='legalEdict'){if(cardMatchesTags(l,['law','politics','religion','university','printing','noble','rick'])){if(judge==='Bad')l.cardDelta=24;else l.cardDelta=10}else if(judge==='Bad')l.cardDelta=14;}
if(card==='springOath'){if(cardMatchesTags(l,['welfare','people','church','plague','refugee','pilgrimage','religion'])){if(judge==='Bad')l.cardDelta=26;else l.cardDelta=10}else l.cardDelta=6;}

if(card==='ironwoodMobilization')l.cardDelta=cardMatchesTags(l,['military','border','fort','ruthenia','treuval','mercenary'])?(judge==='Bad'?14:24):5},result(l){const rank=Battle.rank(l.line);const effect=l.case.effects[rank];return{case:l.case,actor:l.actor,rank,finalLine:l.line,effect,story:effect.story,cardUsed:l.cardUsed,resourceBonus:l.resourceBonus||0,budgetBonus:l.budgetBonus||0,budgetCost:l.budgetCost||0,label:{completeWin:'完全勝利',majorWin:'優勢勝利',minorWin:'小勝利',draw:'膠着',minorLoss:'小敗北',majorLoss:'劣勢敗北',completeLoss:'完全敗北'}[rank]}},rank(x){if(x>=100)return'completeWin';if(x>=50)return'majorWin';if(x>=15)return'minorWin';if(x>=-14)return'draw';if(x>=-49)return'minorLoss';if(x>-100)return'majorLoss';return'completeLoss'},distance(l){return l.enemyX-(l.playerX+CONFIG.actorW-CONFIG.actorW*CONFIG.overlapRatio)},clashX(l){return (l.playerX+CONFIG.actorW-CONFIG.actorW*CONFIG.overlapRatio+l.enemyX)/2},xFromLine(line){return 500+clamp(line,-100,100)*3.35},lineFromX(x){return clamp(Math.round((x-500)/3.35),-100,100)},distBoost(l,d){const ep=l.enemyProfile||ENEMY_ARCHETYPES.standard;const elapsed=battle?.elapsed||0;let base=d>260?(ep.farBoost||CONFIG.farBoost):d<80?(ep.nearBoost||CONFIG.nearBoost):1;if(ep.id==='cunning')base=d<150?ep.nearBoost:(d>320?ep.farBoost:.86+Math.sin(elapsed*8+l.seed)*.16);else if(ep.pattern==='sticky')base*=d<170?1.08:1;else if(ep.pattern==='occult'){const wave=Math.sin(elapsed*5.1+l.seed)*.20+Math.sin(elapsed*11.3+l.seed*1.7)*.10;base=clamp(base+wave,.72,1.34)}return base},hitstop(judge,l){const base={'Perfect!':.14,Good:.10,Normal:.06,Bad:.12}[judge]||.04;return base*((l.enemyProfile&&l.enemyProfile.hitstop)||1)},feedback(l,text,kind){const fx=FX_LABELS[text]||{};/* tapFb removed: center judge only */if(kind==='clash'){['spark'].forEach(id=>{const e=$(`${id}${l.id}`);if(e){const cls='show';e.classList.remove(cls);void e.offsetWidth;e.classList.add(cls);setTimeout(()=>e.classList.remove(cls),360)}});const j=$(`judge${l.id}`);if(j){j.textConten /* =========================================================
   AUDIO / SFX / BOOT
   効果音生成と初期起動。

function audio(){if(!soundOn)return null;try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx}catch(e){return null}}
function beep(f=440,d=.06,type='sine',g=.05){const ctx=audio();if(!ctx)return;const o=ctx.createOscillator(),gn=ctx.createGain();o.type=type;o.frequency.value=f;gn.gain.setValueAtTime(g,ctx.currentTime);gn.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+d);o.connect(gn);gn.connect(ctx.destination);o.start();o.stop(ctx.currentTime+d)}
function noise(d=.08,g=.08){const ctx=audio();if(!ctx)return;const b=ctx.createBuffer(1,ctx.sampleRate*d,ctx.sampleRate),a=b.getChannelData(0);for(let i=0;i<a.length;i++)a[i]=(Math.random()*2-1)*(1-i/a.length);const s=ctx.createBufferSource(),gn=ctx.createGain();s.buffer=b;gn.gain.setValueAtTime(g,ctx.currentTime);gn.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+d);s.connect(gn);gn.connect(ctx.destination);s.start()}
function sfx(n){
  // 画面遷移・選択
  if(n==='reveal'){beep(360,.05,'triangle',.035);setTimeout(()=>beep(540,.06,'triangle',.032),70);setTimeout(()=>beep(720,.07,'triangle',.028),145);return}
  if(n==='select'||n==='casePick'){beep(620,.045,'triangle',.038);setTimeout(()=>beep(820,.04,'triangle',.028),46);return}
  if(n==='assign'){beep(500,.045,'triangle',.036);setTimeout(()=>beep(690,.045,'triangle',.030),48);return}
  if(n==='lane'){beep(390,.035,'triangle',.026);setTimeout(()=>beep(520,.035,'triangle',.022),40);return}
  if(n==='cancel'||n==='caseCancel'){beep(300,.045,'triangle',.026);setTimeout(()=>beep(220,.045,'triangle',.020),42);return}
  if(n==='warn'){beep(210,.075,'square',.040);setTimeout(()=>beep(180,.055,'square',.028),70);return}
  if(n==='next'){beep(460,.035,'triangle',.028);setTimeout(()=>beep(620,.04,'triangle',.025),46);return}
  if(n==='page'){beep(330,.04,'triangle',.026);setTimeout(()=>beep(470,.045,'triangle',.024),50);return}
  if(n==='summary'){beep(520,.06,'triangle',.034);setTimeout(()=>beep(660,.07,'triangle',.030),80);return}

  // 衝突パート
  if(n==='countdown'){beep(360,.045,'square',.026);return}
  if(n==='start'){beep(440,.06,'square',.04);setTimeout(()=>beep(660,.06,'square',.04),70);setTimeout(()=>beep(880,.08,'square',.045),140);return}
  if(n==='tap'){beep(420,.030,'triangle',.022);return}
  if(n==='normal'){beep(470,.035,'triangle',.026);return}
  if(n==='early'){beep(260,.035,'triangle',.020);setTimeout(()=>beep(220,.035,'triangle',.016),36);return}
  if(n==='good'){beep(700,.05,'triangle',.04);noise(.04,.025);return}
  if(n==='perfect'){beep(880,.045,'triangle',.055);setTimeout(()=>beep(1320,.06,'triangle',.045),45);noise(.055,.045);return}
  if(n==='bad'){beep(180,.09,'sawtooth',.05);noise(.06,.035);return}
  if(n==='finishWin'){beep(740,.07,'triangle',.050);setTimeout(()=>beep(990,.08,'triangle',.044),70);setTimeout(()=>beep(1320,.11,'triangle',.036),155);return}
  if(n==='finishLose'){beep(190,.10,'sawtooth',.044);setTimeout(()=>beep(140,.16,'sawtooth',.030),90);return}
  if(n==='card'){beep(520,.04,'triangle',.05);setTimeout(()=>beep(920,.06,'triangle',.045),55);return}

  // 情勢・結果・エンディング
  if(n==='caseReveal'){beep(360,.045,'triangle',.035);setTimeout(()=>beep(540,.055,'triangle',.035),50);setTimeout(()=>beep(720,.065,'triangle',.032),105);return}
  if(n==='mapNews'){beep(250,.08,'sine',.032);setTimeout(()=>beep(420,.10,'triangle',.030),80);setTimeout(()=>beep(630,.08,'triangle',.026),170);return}
  if(n==='resultWin'){beep(620,.07,'triangle',.046);setTimeout(()=>beep(820,.08,'triangle',.040),80);setTimeout(()=>beep(1040,.10,'triangle',.034),170);return}
  if(n==='resultLose'){beep(240,.09,'sawtooth',.036);setTimeout(()=>beep(180,.12,'sawtooth',.030),90);return}
  if(n==='resultDraw'){beep(360,.08,'triangle',.030);setTimeout(()=>beep(360,.08,'triangle',.024),100);return}
  if(n==='ending'){playEndingTheme();return}
  if(n==='opening'){beep(220,.18,'sine',.055);setTimeout(()=>beep(330,.16,'triangle',.045),95);setTimeout(()=>beep(520,.12,'triangle',.030),205);return}
  beep(360,.035,'triangle',.020);
}
window.addEventListener('keydown',e=>{if(!battle||battle.phase!=='running')return;const k=e.key.toLowerCase();if(['a','s','d',' '].includes(k)||e.code==='Space')e.preventDefault();if(k==='a')Battle.tap(1);else if(k==='s')Battle.tap(2);else if(k==='d')Battle.tap(3);else if(e.code==='Space')Battle.tap(battle.lanes[0]?.id)});

const Opening={
showTitle(){
  setScreen('screenOpening');

},

},

    story.classList.add('openingFadeOut');

    View.main();

};
