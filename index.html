<html lang="ja">
<head>

<title>私は王である 衝突プロトタイプ</title>
<style>
:root{

*{box-sizing:border-box}
body{margin:0;background:#0e1420;color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;user-select:none}
#game{width:1000px;height:600px;background:linear-gradient(#23344d,#172337);position:relative;overflow:hidden;border:3px solid #0b0f16;box-shadow:0 16px 40px rgba(0,0,0,.5)}
.screen{position:absolute;inset:0;display:none}.screen.active{display:block}
.topbar{height:58px;background:linear-gradient(90deg,#0e274b,#153962);color:#f7e6bd;display:flex;align-items:center;gap:12px;padding:8px 14px;border-bottom:3px solid var(--gold);font-weight:700}
.param{font-size:12px;padding:3px 7px;border:1px solid rgba(247,230,189,.35);border-radius:8px;background:rgba(0,0,0,.18)}
button{font:inherit;border:2px solid #674d22;background:#f7e7bd;color:#1f1a11;border-radius:8px;padding:7px 12px;cursor:pointer;font-weight:700;box-shadow:0 2px 0 #7a5a24}
button:hover{filter:brightness(1.05)}button:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(.4)}
.mainGrid{display:grid;grid-template-columns:430px 1fr;grid-template-rows:456px 86px;height:542px}
.map{margin:14px;background:#d8c19a;border:3px solid #6b4b21;border-radius:12px;position:relative;overflow:hidden;box-shadow:inset 0 0 18px rgba(0,0,0,.2)}
.mapTitle{position:absolute;top:10px;left:12px;font-weight:800;color:#263322}.gridMap{position:absolute;left:30px;top:55px;display:grid;grid-template-columns:repeat(9,36px);gap:3px}.tile{width:36px;height:36px;background:#8eaa70;border:1px solid rgba(0,0,0,.25)}.tile.own{background:#2c5c93}.tile.enemy{background:#9c4a3c}.tile.neutral{background:#b8a66f}
.caseList{padding:14px 14px 8px 0;overflow:auto}.caseCard{background:var(--panel);border:3px solid #806032;border-radius:12px;margin-bottom:9px;padding:9px;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.18)}.caseCard.selected{border-color:#d09b27;background:#fff2c8;outline:3px solid rgba(241,193,77,.35)}.caseCard.tutorial{border-color:#d7dce8;background:#f6f8ff}.caseCard.desperate{border-color:#7d1b1b;background:#ffe1d9}.caseCard.growth{border-color:#3c7d69;background:#e6fff3}.caseTitle{font-weight:900;color:#1d2030}.caseMeta{font-size:12px;color:#5f4e36;margin:3px 0}.caseStory{font-size:12px;line-height:1.25;color:#2e2a22}.caseEffects{font-size:12px;color:#57351f;margin-top:3px}
.bottom{grid-column:1/3;background:#101d30;color:#f5e6c0;border-top:3px solid var(--gold);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}.cardsMini{display:flex;gap:7px;flex-wrap:wrap}.miniCard{border:1px solid #d2ad55;border-radius:8px;padding:5px 8px;background:rgba(255,235,184,.1);font-size:12px}.mainActions{display:flex;align-items:center;gap:8px}.selectLimit{display:flex;align-items:center;gap:4px;font-size:12px}
.formationBody{height:542px;padding:14px;background:#24344b}.formationLanes{display:flex;gap:12px;height:340px}.formationLane{flex:1;background:var(--panel);border:3px solid #7d5a25;border-radius:12px;padding:10px;box-shadow:0 4px 0 rgba(0,0,0,.2)}.formationLane.empty{opacity:.45}.formationLane h3{margin:0 0 6px;color:#1b2a45}.actorBtns{display:flex;flex-direction:column;gap:7px;margin-top:10px}.actorBtn{display:flex;justify-content:space-between;align-items:center;background:#fff5dc;border:2px solid #8a6832;border-radius:8px;padding:7px;cursor:pointer}.actorBtn.chosen{background:#d9edff;border-color:#315f9a}.actorBtn.disabled{opacity:.35;pointer-events:none}.unhandled{height:110px;background:rgba(255,246,220,.92);border:2px solid #7d5a25;border-radius:10px;margin-top:12px;padding:8px;overflow:auto;font-size:13px}.formationActions{display:flex;justify-content:space-between;margin-top:10px}
.battleTop{height:54px;background:#0e274b;color:#f7e6bd;border-bottom:3px solid var(--gold);display:flex;align-items:center;justify-content:space-between;padding:8px 14px}.timer{font-size:25px;font-weight:900}.battleArea{height:546px;background:#172337}.lane{position:relative;border-bottom:2px solid rgba(255,230,180,.35);overflow:hidden;background:linear-gradient(90deg,#24344d,#2d3c50 50%,#3c2b2b)}.lane.done{filter:grayscale(.6);opacity:.7}.laneHeader{position:absolute;left:8px;top:6px;right:8px;height:28px;display:flex;align-items:center;gap:7px;color:#f9eac8;font-size:13px;font-weight:800;z-index:5}.keyBadge{background:#f4d074;color:#172337;border:2px solid #3d2b0b;border-radius:8px;padding:2px 8px}.lineBar{height:12px;flex:1;background:#461d1d;border:1px solid #f1d998;border-radius:99px;position:relative;overflow:hidden}.lineFill{position:absolute;top:0;bottom:0;left:50%;width:0;background:#e5c24c}.lineCenter{position:absolute;left:50%;top:-2px;bottom:-2px;width:2px;background:#fff}.lineText{width:72px;text-align:right}.actor{position:absolute;bottom:18px;width:80px;height:94px;border-radius:14px 14px 8px 8px;display:flex;align-items:flex-end;justify-content:center;color:#fff;font-size:12px;font-weight:900;text-shadow:0 1px 2px #000;border:3px solid rgba(255,255,255,.35);transition:transform .08s linear}.actor.left{background:linear-gradient(#3d7bc1,#193b6e)}.actor.right{background:linear-gradient(#c45b4c,#6d211c)}.actor.neutral{background:linear-gradient(#a7a7a7,#575757)}.impact{position:absolute;left:50%;top:50%;width:36px;height:36px;margin:-18px;border-radius:50%;border:3px solid rgba(255,236,150,.95);opacity:0;transform:scale(.3);pointer-events:none}.impact.flash{animation:flash .25s ease-out}@keyframes flash{0%{opacity:1;transform:scale(.3)}100%{opacity:0;transform:scale(2.8)}}.judge{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);font-size:28px;color:#ffe17a;font-weight:1000;text-shadow:0 3px 0 #5a1b12,0 0 12px #fff;opacity:0}.judge.show{animation:judge .7s ease-out}@keyframes judge{0%{opacity:0;transform:translate(-50%,-35%) scale(.6)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-80%) scale(1)}}.queued{position:absolute;right:10px;bottom:8px;display:flex;gap:4px}.qcard{font-size:11px;padding:2px 5px;border-radius:6px;background:rgba(255,237,180,.85);border:1px solid #815d26}.doneText{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-size:30px;color:#fff1bd;text-shadow:0 2px 4px #000;font-weight:900}.lane.done .doneText{display:flex}.battleHelp{position:absolute;right:12px;bottom:8px;color:#f3dfb2;font-size:12px}
.overlay{position:absolute;inset:0;background:rgba(6,9,14,.78);z-index:50;display:none;align-items:center;justify-content:center}.overlay.active{display:flex}.modal{width:820px;max-height:540px;background:#f1e4c8;border:4px solid #b48732;border-radius:16px;padding:16px;box-shadow:0 12px 40px rgba(0,0,0,.55);overflow:auto}.modal h2{margin:0 0 10px;color:#102a4c}.rcLanes{display:flex;gap:10px;margin-bottom:12px}.rcLane{flex:1;border:2px solid #725326;border-radius:10px;background:#fff5dc;padding:8px;cursor:pointer}.rcLane.selected{background:#d8ecff;border-color:#2c5c93}.handGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.cardBtn{min-height:76px;text-align:left;background:#fff8e8;border:2px solid #8a6832;border-radius:10px;padding:8px;cursor:pointer}.cardBtn.disabled{opacity:.35;pointer-events:none}.queueBox{margin-top:12px;padding:8px;background:#fff8e8;border:2px solid #8a6832;border-radius:10px;min-height:48px}.modalActions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
.countdown{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:90px;color:#ffe39a;font-weight:1000;text-shadow:0 4px 0 #4a1b12;z-index:30;background:rgba(0,0,0,.25)}
.resultBody{height:542px;background:#23344d;padding:18px}.resultCard{height:100%;background:var(--panel);border:4px solid #b48732;border-radius:16px;padding:18px;overflow:auto}.resultCard h2{margin:0 0 8px;color:#102a4c}.resultGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.resultBox{background:#fff7e3;border:2px solid #8a6832;border-radius:10px;padding:10px}.storyLine{background:#172337;color:#f7e6bd;border-left:5px solid #b48732;padding:10px;border-radius:8px;margin-top:10px}.summaryList{font-size:15px;line-height:1.7}.small{font-size:12px;color:var(--muted)}
</style>
</head>

const cases=[
 {id:'tutorial_butler',title:'老執事との訓練',category:'チュートリアル',special:'tutorial',difficulty:'tutorial',initialLine:0,lineName:'間合い',enemy:'老執事',recommended:['albrecht'],ignoreText:'2ターン目まで残る。3ターン目以降消滅。',intro:'老執事は朝の中庭で杖を構えた。「陛下。王の決断にも、剣の一歩にも、間合いがございます」',rewards:'老執事の助言、関係+1',effects:{completeWin:eff({prestige:1},['老執事の助言'],'老執事は深く一礼した。「見事でございます。陛下の一歩には王の重みが宿っております」'),majorWin:eff({},['老執事の助言'],'老執事は満足げに頷いた。「十分でございます。あとは実戦の中で磨かれましょう」'),minorWin:eff({},['老執事の助言'],'老執事は杖を下ろした。「まずはそれでよろしゅうございます」'),draw:eff({},['老執事の助言'],'老執事は静かに微笑んだ。「焦る必要はございません」'),minorLoss:eff({},['老執事の助言'],'老執事は穏やかに言った。「早すぎれば届かず、遅すぎれば受けに回ります」'),majorLoss:eff({},['老執事の助言'],'老執事は杖を収めた。「王は一度の敗北で終わるものではありません」'),completeLoss:eff({},['老執事の助言'],'老執事は何も責めなかった。ただ、もう一度構えを示した。'),ignored:eff({},[],'老執事は稽古の支度を整えたまま、静かに待っている。')}},
 {id:'tax_reform',title:'王税改革への反発',category:'内政',special:'normal',difficulty:'normal',initialLine:-10,lineName:'改革進度',enemy:'古参貴族',recommended:['albrecht','wife'],ignoreText:'貴族支持-4。次ターン悪化。',intro:'新たな王税案に、古参貴族たちが一斉に反発した。彼らは「先王の時代にはなかった負担だ」と声を荒らげている。',rewards:'国庫増、威信増',effects:{completeWin:eff({treasury:12,prestige:5,nobleSupport:-2},['徴税台帳'],'王税案は押し通された。貴族たちは沈黙したが、その目は冷たかった。'),majorWin:eff({treasury:8,prestige:3,nobleSupport:-1},[],'議場は王の言葉に押し切られた。新税は形を変えつつ通過した。'),minorWin:eff({treasury:5,prestige:1},[],'改革は辛うじて通った。だが貴族の不満はくすぶっている。'),draw:eff({treasury:2,nobleSupport:-2},[],'議論はまとまらず、改革は骨抜きになった。'),minorLoss:eff({treasury:-2,nobleSupport:-4},[],'貴族たちは譲らなかった。王の改革は初手からつまずいた。'),majorLoss:eff({treasury:-4,nobleSupport:-7,prestige:-2},[],'議場は貴族側に傾いた。王の権威は軽く見られ始めている。'),completeLoss:eff({treasury:-6,nobleSupport:-10},[], '改革案は公然と退けられた。次は徴税そのものが拒まれるだろう。',0,['徴税拒否の広がり']),ignored:eff({nobleSupport:-4},[],'貴族たちは王の沈黙を勝利と受け取った。')}},
 {id:'east_fort',title:'東境砦の急報',category:'軍事',special:'crisis',difficulty:'hard',initialLine:-20,lineName:'戦線',enemy:'東境襲撃隊長',recommended:['albrecht','brother'],ignoreText:'次ターン「東境砦への襲撃」に悪化。',intro:'東境砦から、夜明け前に伝令が駆け込んだ。国境の森で、武装集団が動いているという。',rewards:'安定・軍事増、カード入手',effects:{completeWin:eff({stability:8,military:5},['東境騎士団'],'砦は完璧に守られた。東境の兵は王旗の下に集まり直した。',1),majorWin:eff({stability:6,military:3},['砦守備隊'],'砦は守り切られた。兵は陛下の名を叫んでいる。'),minorWin:eff({stability:3,military:1},[],'襲撃は退けたが、東境の森はまだ騒がしい。'),draw:eff({stability:-1},[],'敵は退いた。しかし砦の周辺には再侵攻の気配が残る。',0,['東境砦への再侵攻']),minorLoss:eff({stability:-4,military:-1},[],'砦の外郭が焼かれた。東境の村々に不安が広がる。'),majorLoss:eff({stability:-7,military:-3},[],'砦は大きく損なわれた。担当者は疲労し、次の守りは危うい。',0,['東境砦包囲']),completeLoss:eff({stability:-10,military:-5},[],'東境砦は落ちた。王国の一部が敵の手に渡った。',-1,['東境奪還戦']),ignored:eff({stability:-3,military:-1},[],'東境の不穏は放置された。火種は砦へ迫っている。',0,['東境砦への襲撃'])}},
 {id:'merchant_petition',title:'商人組合の陳情',category:'商業',special:'normal',difficulty:'normal',initialLine:0,lineName:'契約主導権',enemy:'商人組合長',recommended:['wife'],ignoreText:'都市支持-5。案件は消滅。',intro:'王都の商人組合が、関税の見直しを求めて謁見を願い出た。銀貨の詰まった帳簿が卓上に置かれている。',rewards:'都市支持・国庫増',effects:{completeWin:eff({citySupport:8,treasury:6},['商人の融資'],'商人たちは王の裁定に膝を折った。王都の金は王冠へ流れ始める。'),majorWin:eff({citySupport:6,treasury:4},[],'組合は条件を呑んだ。市場には安堵が広がっている。'),minorWin:eff({citySupport:3,treasury:2},[],'折衷案がまとまった。大きな利益はないが、市場は落ち着いた。'),draw:eff({citySupport:-1},[],'話し合いは長引き、商人たちは不満げに退いた。'),minorLoss:eff({citySupport:-4,treasury:-2},[],'組合は譲歩を引き出した。王庫の収入は鈍る。'),majorLoss:eff({citySupport:-7,treasury:-4},[],'商人たちは王宮を見限り始めた。市場の空気が冷える。'),completeLoss:eff({citySupport:-10,treasury:-6},[],'組合は納税拒否をほのめかした。王都の金脈が揺らいでいる。',0,['商人の納税拒否']),ignored:eff({citySupport:-5},[],'商人たちは返答を得られず、静かに帳簿を閉じた。')}},

let state={turn:1,season:'春',maxSelectable:1,params:{territory:5,treasury:50,stability:50,prestige:50,military:50,nobleSupport:50,citySupport:50,churchSupport:50,diplomacy:50},hand:['assault','guard','treasury','brotherCharge','wifeAdvice'],selectedCaseIds:[],assignments:{},resultQueue:[],lastBattle:null,consumedCards:[],gainedCards:[]};
let battle=null;
function $(id){return document.getElementById(id)}
function setScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')}
function paramHud(){return Object.entries(state.params).map(([k,v])=>`<span class="param">${PARAM_LABELS[k]} ${v}</span>`).join('')}
function showIntro(){setScreen('screenIntro');$('screenIntro').innerHTML=`<div class="topbar">私は王である　衝突プロトタイプ</div><div class="resultBody"><div class="resultCard"><h2>第${state.turn}ターン　16歳 ${state.season}</h2><p>王国には、今日も複数の火種が届いている。</p><p>どの案件に向き合い、誰を送るかを選んでください。</p><div class="storyLine">選ばなかった案件も、世界に影響を残します。</div><br><button onclick="showMain()">案件一覧へ</button></div></div>`}
function visibleCases(){let pool=cases.filter(c=>!(c.id==='tutorial_butler'&&state.turn>2)); if(state.turn<=2) return pool.slice(0,10); let nonTut=pool.filter(c=>c.id!=='tutorial_butler'); let start=(state.turn-1)%5; return nonTut.slice(start).concat(nonTut.slice(0,start)).slice(0,5)}
function showMain(){setScreen('screenMain');const vis=visibleCases(); const html=`<div class="topbar"><b>第${state.turn}ターン　16歳 ${state.season}</b>${paramHud()}</div><div class="mainGrid"><div class="map"><div class="mapTitle">仮世界地図</div><div class="gridMap">${Array.from({length:81},(_,i)=>`<div class="tile ${i%11===0?'enemy':i%3===0?'own':'neutral'}"></div>`).join('')}</div></div><div class="caseList">${vis.map(c=>caseCard(c)).join('')}</div><div class="bottom"><div><div class="cardsMini">${state.hand.map(id=>`<span class="miniCard">${cardDefs[id]?.name||id}</span>`).join('')}</div><div class="small">案件を選択してください。特別枠「老執事との訓練」は第2ターンまで残ります。</div></div><div class="mainActions"><div class="selectLimit">対応可能数 <button onclick="setLimit(1)">1</button><button onclick="setLimit(2)">2</button><button onclick="setLimit(3)">3</button> 現在:${state.maxSelectable}</div><button ${state.selectedCaseIds.length?'':'disabled'} onclick="showFormation()">布陣へ</button></div></div></div>`;$('screenMain').innerHTML=html}
function caseCard(c){let cls=c.special==='tutorial'?'tutorial':c.special==='desperate'?'desperate':c.special==='growth'?'growth':'';let sel=state.selectedCaseIds.includes(c.id)?'selected':'';return `<div class="caseCard ${cls} ${sel}" onclick="toggleCase('${c.id}')"><div class="caseTitle">${c.title}</div><div class="caseMeta">${c.category} / 難易度：${DIFF[c.difficulty].label} / ライン：${c.lineName}</div><div class="caseStory">${c.intro}</div><div class="caseEffects">推奨：${c.recommended.map(id=>actors[id]?.name||id).join('・')}　放置：${c.ignoreText}</div><div class="caseEffects">主な報酬：${c.rewards}</div></div>`}
function setLimit(n){state.maxSelectable=n; while(state.selectedCaseIds.length>n) state.selectedCaseIds.pop(); showMain()}
function toggleCase(id){let a=state.selectedCaseIds; if(a.includes(id)) a.splice(a.indexOf(id),1); else { if(a.length>=state.maxSelectable) return; a.push(id); state.assignments[id]=state.assignments[id]||'albrecht'; } showMain()}
function showFormation(){setScreen('screenFormation'); const selected=state.selectedCaseIds.map(id=>cases.find(c=>c.id===id)); const usedActors=new Set(Object.values(state.assignments)); $('screenFormation').innerHTML=`<div class="topbar">布陣確認 ${paramHud()}</div><div class="formationBody"><div class="formationLanes">${[0,1,2].map(i=>formationLane(selected[i],i)).join('')}</div><div class="unhandled"><b>未対応案件</b><br>${visibleCases().filter(c=>!state.selectedCaseIds.includes(c.id)).map(c=>`${c.title}：${c.ignoreText}`).join('<br>')||'なし'}</div><div class="formationActions"><button onclick="showMain()">戻る</button><button onclick="startBattle()">この布陣で開始</button></div></div>`}
function formationLane(c,i){ if(!c) return `<div class="formationLane empty"><h3>戦線${i+1}</h3><p>未選択</p></div>`; let assigned=state.assignments[c.id]||'albrecht'; let counts=Object.values(state.assignments).filter(Boolean); return `<div class="formationLane"><h3>戦線${i+1}</h3><b>${c.title}</b><p class="small">${c.category} / ${DIFF[c.difficulty].label}<br>敵：${c.enemy}<br>ライン：${c.lineName}</p><div class="actorBtns">${Object.values(actors).map(a=>{let disabled=counts.includes(a.id)&&assigned!==a.id;return `<div class="actorBtn ${assigned===a.id?'chosen':''} ${disabled?'disabled':''}" onclick="assignActor('${c.id}','${a.id}')"><span>${a.name}</span><span class="small">速${a.speed} 押${a.push} 安${a.stability}</span></div>`}).join('')}</div></div>`}
function assignActor(caseId,actorId){state.assignments[caseId]=actorId;showFormation()}
function startBattle(){let selected=state.selectedCaseIds.map((id,i)=>cases.find(c=>c.id===id)); battle={phase:'countdown',startTs:0,lastTs:0,elapsed:0,royalUsed:false,royalTarget:null,lanes:selected.map((c,i)=>makeLane(c,i)),results:[],pendingStop:false}; setScreen('screenBattle'); renderBattle(true); setTimeout(()=>countdown(3),50)}
function makeLane(c,i){let a=actors[state.assignments[c.id]||'albrecht']; let cycle={1:3.4,2:3.1,3:2.8,4:2.5,5:2.2}[a.speed]||2.8; return {laneId:i+1,case:c,actor:a,line:c.initialLine,visualLine:c.initialLine,status:'running',cycle,offset:i*.4,nextImpact:1.2+i*.4,clashStart:0,tapUsed:false,lastJudge:'',lastDelta:0,combo:0,queuedCards:[],activeEffects:[],history:[c.initialLine],judges:{Perfect:0,Great:0,Good:0,Early:0,Late:0,'No Order':0}}}
function countdown(n){ if(n>0){renderBattle(true,n); setTimeout(()=>countdown(n-1),800)} else {renderBattle(true,'開始'); setTimeout(()=>{battle.phase='running';battle.startTs=performance.now();battle.lastTs=battle.startTs;requestAnimationFrame(tick)},500)}}
function tick(ts){ if(!battle||battle.phase!=='running') return; let dt=(ts-battle.lastTs)/1000; battle.lastTs=ts; battle.elapsed=(ts-battle.startTs)/1000; updateBattle(dt); renderBattle(false); if(battle.elapsed>=24||battle.lanes.every(l=>l.status==='done')) return finishBattle(); requestAnimationFrame(tick)}
function updateBattle(dt){for(const l of battle.lanes){if(l.status==='done')continue; if(battle.elapsed>=l.nextImpact && !l.tapUsed){resolveInput(l,null)} if(battle.elapsed>=l.nextImpact+.75){scheduleNext(l)} }}
function scheduleNext(l){ if(l.status==='done') return; if(l.line>=100||l.line<=-100||battle.elapsed>=24){l.status='done';return;} l.nextImpact=battle.elapsed+l.cycle; l.tapUsed=false; l.lastJudge=''; l.lastDelta=0;}
function handleLaneInput(laneId){ if(!battle||battle.phase!=='running') return; let targets=battle.lanes.filter(l=>l.status==='running'); if(targets.length===1) laneId=targets[0].laneId; let l=battle.lanes.find(x=>x.laneId===laneId); if(!l||l.tapUsed) return; resolveInput(l,battle.elapsed)}
function resolveInput(l,t){let diff=t==null?null:(t-l.nextImpact); let judge;if(t==null) judge='No Order'; else if(diff<-0.5) judge='Early'; else if(diff<-0.22) judge='Good'; else if(diff<-0.08) judge='Great'; else if(diff<=0) judge='Perfect'; else judge='Late'; let card=l.queuedCards.shift(); let delta=calcDelta(l,judge,card); l.line=Math.max(-100,Math.min(100,l.line+delta)); l.history.push(l.line); l.lastJudge=judge+(card?` + ${cardDefs[card].name}`:''); l.lastDelta=delta; l.tapUsed=true; l.judges[judge]=(l.judges[judge]||0)+1; if(['Perfect','Great'].includes(judge)) l.combo++; else l.combo=0; if(l.line>=100||l.line<=-100) l.status='done'; setTimeout(()=>{let el=document.querySelector(`#impact${l.laneId}`); if(el){el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash')} let j=document.querySelector(`#judge${l.laneId}`); if(j){j.classList.remove('show');void j.offsetWidth;j.classList.add('show')}},0)}
function calcDelta(l,judge,cardId){let effectiveJudge=judge; if(l.activeEffects.some(e=>e.type==='wifeAdvice'&&e.remaining>0)&&judge==='Late') effectiveJudge='Good'; let base={Perfect:18,Great:11,Good:5,Early:0,Late:-18,'No Order':-8}[effectiveJudge]; let delta=base+(l.actor.push-3)*2-(3-3)*2; if(delta<0){delta+=(l.actor.defense-3)*2+(l.actor.stability-3)} if(cardId){ if(cardId==='assault'){ if(delta>0)delta+=8; if(judge==='Late')delta-=6;} if(cardId==='guard'){ if(delta<0)delta=Math.ceil(delta/2); else delta-=3;} if(cardId==='treasury'){ if(delta>0)delta+=14;} if(cardId==='brotherCharge'){ if(delta>0)delta+=12; l.cycle=Math.max(1.9,l.cycle-.25); actors.brother.fatigue++;} if(cardId==='wifeAdvice'){ l.activeEffects.push({type:'wifeAdvice',remaining:2}); actors.wife.fatigue++;} }
 l.activeEffects.forEach(e=>{if(e.remaining>0)e.remaining--}); let d=DIFF[l.case.difficulty]; delta=delta>=0?delta*d.pos:delta*d.neg; return Math.max(-30,Math.min(30,Math.round(delta)))}
function renderBattle(full=false,countText=null){ if(!battle) return; if(full){$('screenBattle').innerHTML=`<div class="battleTop"><div class="timer">残り <span id="timerText">24.0</span>秒</div><button id="royalBtn" onclick="openRoyalCommand()">王の采配</button></div><div class="battleArea" id="battleArea"></div><div id="rcOverlay" class="overlay"></div>${countText?`<div id="count" class="countdown">${countText}</div>`:''}`; let area=$('battleArea'); area.innerHTML=battle.lanes.map(l=>laneHtml(l,battle.lanes.length)).join('')+`<div class="battleHelp">PC: W/S/X　1戦線時はSpaceも有効。タブレットは各戦線をタップ。</div>`; } else {let c=$('count'); if(c)c.remove();}
 let remain=Math.max(0,24-(battle.elapsed||0)); let tt=$('timerText'); if(tt)tt.textContent=remain.toFixed(1); let rb=$('royalBtn'); if(rb)rb.disabled=battle.royalUsed||battle.phase!=='running'; for(const l of battle.lanes){let laneEl=$(`lane${l.laneId}`); if(laneEl){laneEl.classList.toggle('done',l.status==='done'); let pct=Math.max(-100,Math.min(100,l.line)); let fill=$(`fill${l.laneId}`); if(fill){fill.style.left=pct>=0?'50%':`${50+pct/2}%`; fill.style.width=`${Math.abs(pct)/2}%`; fill.style.background=pct>=0?'#e5c24c':'#b34236';} let lt=$(`lineText${l.laneId}`); if(lt)lt.textContent=`${l.line>=0?'+':''}${l.line}`; let j=$(`judge${l.laneId}`); if(j)j.textContent=l.lastJudge?`${l.lastJudge} ${l.lastDelta>=0?'+':''}${l.lastDelta}`:''; let q=$(`queued${l.laneId}`); if(q)q.innerHTML=l.queuedCards.map(id=>`<span class="qcard">${cardDefs[id].name}</span>`).join(''); let pos=lineToImpact(l.line); let left=$(`left${l.laneId}`),right=$(`right${l.laneId}`); let phase=Math.max(0,1-Math.abs((battle.elapsed-l.nextImpact))/1.0); if(left)left.style.left=`${Math.min(pos-95, 60+phase*(pos-150))}px`; if(right)right.style.left=`${Math.max(pos+20, 860-phase*(860-pos-100))}px`; }} }
}
function laneHtml(l,count){let h=480/count; let key=count===1?'SPACE':l.laneId===1?'W':l.laneId===2?'S':'X'; return `<div class="lane" id="lane${l.laneId}" style="height:${h}px" onclick="handleLaneInput(${l.laneId})"><div class="laneHeader"><span class="keyBadge">${key}</span><span>${l.case.title}</span><span class="small">担当:${l.actor.name} / 敵:${l.case.enemy}</span><div class="lineBar"><div class="lineFill" id="fill${l.laneId}"></div><div class="lineCenter"></div></div><span class="lineText" id="lineText${l.laneId}">${l.line}</span></div><div class="actor left" id="left${l.laneId}">${l.actor.name}</div><div class="actor right" id="right${l.laneId}">${l.case.enemy}</div><div class="impact" id="impact${l.laneId}"></div><div class="judge" id="judge${l.laneId}"></div><div class="queued" id="queued${l.laneId}"></div><div class="doneText">決着済み</div></div>`}
function lineToImpact(line){return 500+(line*2.2)}
function openRoyalCommand(){ if(!battle||battle.royalUsed||battle.phase!=='running')return; battle.phase='royalCommand'; battle.royalUsed=true; let overlay=$('rcOverlay'); overlay.classList.add('active'); battle.rcTarget=battle.lanes.find(l=>l.status==='running')?.laneId||1; battle.rcQueue=[]; renderRoyal()}
function renderRoyal(){let overlay=$('rcOverlay');let assigned=new Set(battle.lanes.map(l=>l.actor.id)); overlay.innerHTML=`<div class="modal"><h2>王の采配</h2><p>対象戦線を1つ選び、カードを好きなだけ投入します。再開後、1衝突につき1枚ずつ発動します。</p><div class="rcLanes">${battle.lanes.map(l=>`<div class="rcLane ${battle.rcTarget===l.laneId?'selected':''}" onclick="battle.rcTarget=${l.laneId};renderRoyal()"><b>戦線${l.laneId}</b><br>${l.case.title}<br><span class="small">${l.status==='done'?'決着済み':'ライン '+l.line}</span></div>`).join('')}</div><div class="handGrid">${state.hand.map(id=>{let cd=cardDefs[id];let disabled=cd.actorId&&assigned.has(cd.actorId);return `<div class="cardBtn ${disabled?'disabled':''}" onclick="addRoyalCard('${id}')"><b>${cd.name}</b><br><span class="small">${cd.type}</span><br><span class="small">${disabled?'担当者として出陣中':cd.desc}</span></div>`}).join('')}</div><div class="queueBox"><b>投入予定：</b> ${battle.rcQueue.map(id=>cardDefs[id].name).join(' → ')||'なし'}</div><div class="modalActions"><button onclick="battle.rcQueue.pop();renderRoyal()">1枚戻す</button><button onclick="battle.rcQueue=[];renderRoyal()">全て戻す</button><button onclick="closeRoyalCommand()">決定して再開</button></div></div>`}
function addRoyalCard(id){battle.rcQueue.push(id);renderRoyal()}
function closeRoyalCommand(){let l=battle.lanes.find(x=>x.laneId===battle.rcTarget); if(l) l.queuedCards.push(...battle.rcQueue); $('rcOverlay').classList.remove('active'); battle.phase='running'; battle.lastTs=performance.now(); requestAnimationFrame(tick)}
function finishBattle(){battle.phase='finished'; let selectedIds=state.selectedCaseIds; let ignored=visibleCases().filter(c=>!selectedIds.includes(c.id)); let laneResults=battle.lanes.map(l=>makeLaneResult(l)); state.lastBattle={lanes:laneResults,ignored:ignored.map(c=>({case:c,effect:c.effects.ignored}))}; applyResults(state.lastBattle); state.resultQueue=[...laneResults.map(r=>({type:'lane',data:r})),{type:'ignored',data:state.lastBattle.ignored},{type:'summary',data:state.lastBattle}]; showNextResult()}
function rankFromLine(x){if(x>=100)return'completeWin';if(x>=50)return'majorWin';if(x>=15)return'minorWin';if(x>=-14)return'draw';if(x>=-49)return'minorLoss';if(x>-100)return'majorLoss';return'completeLoss'}
function makeLaneResult(l){let rank=rankFromLine(l.line); let e=l.case.effects[rank]||eff(); let used=l.history.length; return {case:l.case,rank,finalLine:l.line,actor:l.actor,judges:l.judges,effect:e,usedCards:[],story:e.story}}
function applyResults(res){let apply=e=>{if(!e)return; for(const[k,v] of Object.entries(e.params||{})) state.params[k]=Math.max(0,Math.min(100,(state.params[k]||0)+v)); if(e.territory) state.params.territory=Math.max(0,state.params.territory+e.territory); (e.gainCards||[]).forEach(c=>state.gainedCards.push(c));}; res.lanes.forEach(r=>apply(r.effect)); res.ignored.forEach(r=>apply(r.effect)); state.selectedCaseIds=[]; state.assignments={};}
function showNextResult(){setScreen('screenResult'); let item=state.resultQueue.shift(); if(!item){state.turn++;showIntro();return;} if(item.type==='lane') showLaneResult(item.data); else if(item.type==='ignored') showIgnoredResult(item.data); else showSummaryResult(item.data)}
function fmtParams(obj){let arr=[]; for(const[k,v] of Object.entries(obj||{})){if(v)arr.push(`${PARAM_LABELS[k]||k} ${v>0?'+':''}${v}`)} return arr.join('<br>')||'なし'}
function showLaneResult(r){$('screenResult').innerHTML=`<div class="topbar">戦線結果 ${paramHud()}</div><div class="resultBody"><div class="resultCard"><h2>${r.case.title}</h2><div class="resultGrid"><div class="resultBox"><b>結果</b><br>${RANK_LABEL[r.rank]}<br>最終ライン：${r.finalLine>=0?'+':''}${r.finalLine}<br>担当：${r.actor.name}</div><div class="resultBox"><b>影響</b><br>${fmtParams(r.effect.params)}${r.effect.territory?`<br>領土 ${r.effect.territory>0?'+':''}${r.effect.territory}`:''}<br>${(r.effect.gainCards||[]).length?'入手：'+r.effect.gainCards.join('、'):''}</div></div><div class="storyLine">${r.story||'結果は静かに記録された。'}</div><br><button onclick="showNextResult()">次へ</button></div></div>`}
function showIgnoredResult(list){$('screenResult').innerHTML=`<div class="topbar">未対応案件 ${paramHud()}</div><div class="resultBody"><div class="resultCard"><h2>未対応案件</h2>${list.length?list.map(x=>`<div class="resultBox"><b>${x.case.title}</b><br>${fmtParams(x.effect.params)}${x.effect.territory?`<br>領土 ${x.effect.territory>0?'+':''}${x.effect.territory}`:''}<div class="small">${x.effect.story||x.case.ignoreText}</div></div>`).join('<br>'):'<p>未対応案件はありません。</p>'}<br><button onclick="showNextResult()">次へ</button></div></div>`}
function showSummaryResult(){let gained=state.gainedCards.splice(0); $('screenResult').innerHTML=`<div class="topbar">ターン総括 ${paramHud()}</div><div class="resultBody"><div class="resultCard"><h2>第${state.turn}ターン総括</h2><div class="summaryList">現在の国勢<br>${Object.entries(state.params).map(([k,v])=>`${PARAM_LABELS[k]}：${v}`).join('<br>')}<br><br>${gained.length?'入手カード：'+gained.join('、'):'入手カード：なし'}</div><br><button onclick="state.turn++;showIntro()">次ターンへ</button></div></div>`}
window.addEventListener('keydown',e=>{if(!battle||battle.phase!=='running')return; let k=e.key.toLowerCase(); if(k==='w')handleLaneInput(1); if(k==='s')handleLaneInput(2); if(k==='x')handleLaneInput(3); if(e.code==='Space')handleLaneInput(1)});
showIntro();
</script>
</body>
</html>
