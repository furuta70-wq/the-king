  100%{opacity:1;filter:none;transform:scale(1)}
}

.openingTransitionVeil{
  position:absolute;
  inset:0;
  z-index:300;

}

  0%{opacity:0}
  38%{opacity:1}
  100%{opacity:0}
}

function mapSignedKey(value){
  const v=Number(value)||0;
  if(v>0)return "+"+v;
  if(v<0)return String(v);
  return "0";
}
function mapNewsTextFor(key,before,after){
  const dir=after>before?"plus":"minus";
  return MAP_NEWS_LABELS[key]?.[dir]||"大陸の勢力圏に変化が生じた";
}
function pushMapNews(key,before,after){
  if(before===after)return;
  State.mapNews=State.mapNews||[];
  State.mapNews.push({key,before,after,text:mapNewsTextFor(key,before,after)});
}
function renderMapLayersHtml(changedKey=null, scaleClass=""){
  const layers=[];
  const base=typeof MAP_LAYER_URLS!=="undefined"?MAP_LAYER_URLS:null;
  if(!base)return "";
  layers.push(`<img class="mapLayer baseBottom ${scaleClass}" src="${base.base.bottom}" draggable="false">`);
  for(const def of MAP_BORDER_DEFS){
    const value=State.map?.[def.key]||0;
    if(value===0)continue;
    const k=mapSignedKey(value);
    const url=base[def.key]?.[k];
    if(!url)continue;
    layers.push(`<img class="mapLayer dynamic ${def.key===changedKey?'changed':''} ${scaleClass}" src="${url}" draggable="false">`);
  }
  layers.push(`<img class="mapLayer baseTop ${scaleClass}" src="${base.base.top}" draggable="false">`);
  return layers.join("");
}

function prepareMapNewsQueue(){
  const raw=State.mapNews||[];
  if(!raw.length)return [];
  const scored=raw.map((item,idx)=>({
    ...item,
    originalIndex:idx,
    importance:mapNewsImportance(item)
  })).sort((a,b)=>b.importance-a.importance||a.originalIndex-b.originalIndex);

  if(scored.length<=3)return scored;

  const shown=scored.slice(0,3);
  const rest=scored.slice(3);
  shown.push({
    key:null,
    before:0,
    after:0,
    summary:true,
    text:`ほかにも${rest.length}か所で勢力圏が揺らいでいます。大陸の均衡は、静かに次の局面へ移りつつあります。`
  });
  return shown;
}
function mapNewsImportance(item){
  const key=item.key||"";
  let score=1;
  if(key.startsWith("altrant"))score+=3;
  if(key==="altrantLoire"||key==="altrantRick"||key==="altrantRuthenia")score+=1;
  if(key.startsWith("azraq"))score+=2;
  if(Math.abs((item.after||0)-(item.before||0))>=2)score+=2;
  if(Math.abs(item.after||0)>=3)score+=1;
  return score;
}

function showMapNews(){

}

function shouldShowBattleTutorial(){
  return battle&&battle.lanes&&battle.lanes.some(l=>l.case?.id==="tutorial_butler")&&!State.tutorialBattleSeen;
}
function showBattleTutorialOverlay(){
  if(!shouldShowBattleTutorial())return false;
  State.tutorialBattleSeen=true;
  const screen=$("screenBattle");
  if(!screen)return false;
  const dim=document.createElement("div");
  dim.className="tutorialDim";
  dim.id="tutorialDim";
  const box=document.createElement("div");
  box.className="tutorialOverlay";
  box.id="tutorialOverlay";
  box.innerHTML=`<h2>衝突の基本</h2><p>敵とぶつかる直前にTAPします。</p><p>近いほど判定が良くなり、Perfectなら大きく押し返せます。</p><p>陛下、焦らず。相手と間合いが重なる、その一瞬でございます。</p><button class="tutorialStartBtn" onclick="closeBattleTutorial(event)">開始する</button>`;
  screen.appendChild(dim);
  screen.appendChild(box);
  dim.addEventListener("click",closeBattleTutorial);
  box.addEventListener("click",closeBattleTutorial);
  return true;
}
function closeBattleTutorial(ev){
  if(ev){
    ev.preventDefault();
    ev.stopPropagation();
  }
  const dim=$("tutorialDim");
  const box=$("tutorialOverlay");
  if(dim)dim.remove();
  if(box)box.remove();
  if(!battle||battle.phase==="running")return;
  battle.phase="running";
  battle.start=performance.now();
  battle.last=battle.start;
  sfx("start");
  requestAnimationFrame(Battle.tick);
}

t)/1000;Battle.update(dt*battle.speedFactor);View.updateBattle();if(battle.elapsed>=CONFIG.battleSeconds||battle.lanes.every(l=>l.status==='done'))return setTimeout(Flow.finishBattle,450);requestAnimationFrame(Battle.tick)},update(dt){for(const l of battle.lanes){if(l.cardEffectT>0){l.cardEffectT=Math.max(0,l.cardEffectT-dt);if(l.cardEffectT===0)l.cardEffectLabel=''}if(l.status==='done')continue;if(l.phase==='approach'){l.playerStun=Math.max(0,l.playerStun-dt);l.enemyStun=Math.max(0,l.enemyStun-dt);const d0=Battle.distance(l);if(d0<=0&&!l.collided){Battle.collide(l);continue}const distBoost=Battle.distBoost(l,d0);const pReady=l.playerStun<=0,eReady=l.enemyStun<=0;l.playerVel=pReady?Battle.approachVelocity(l.playerVel,l.speed*distBoost*l.tempo,dt):0;l.enemyVel=eReady?Battle.approachVelocity(l.enemyVel,l.enemySpeed*distBoost*l.tempo,dt):0;l.playerX+=l.playerVel*dt;l.enemyX-=l.enemyVel*dt;if(Battle.distance(l)<=0&&!l.collided){Battle.fixContact(l);Battle.collide(l)}}else if(l.phase==='hitstop'){l.hitstopT-=dt;if(l.hitstopT<=0){l.phase='recoil';l.recoilT=0}}else if(l.phase==='recoil'){l.recoilT+=dt;const t=clamp(l.recoilT/l.recoilDur,0,1);const e=1-Math.pow(1-t,3);l.playerX=l.recoilStartP+(l.recoilEndP-l.recoilStartP)*e;l.enemyX=l.recoilStartE+(l.recoilEndE-l.recoilStartE)*e;if(t>=1){if(l.line>=100||l.line<=-100){l.status='done'}else{l.phase='approach';l.landT=.28;l.startT=.26;l.collided=false;l.tapped=false;l.tapHidden=false;l.tapRespawn=.34;l.storedJudge=null;l.lastJudge='';l.lastDelta=0;l.playerVel=l.speed*TUNING.accel.minSlide;l.enemyVel=l.enemySpeed*TUNING.accel.minSlide;l.tapJustSpawned=true}}}}},approachVelocity(v,target,dt){const next=v+(target-v)*clamp(TUNING.accel.rate*dt,0,1);return Math.max(target*TUNING.accel.minSlide,next)},tap(id){audio();if(!battle||battle.phase!=='running')return;const l=battle.lanes.find(x=>x.id===id);if(!l||l.status==='done')return;if(l.tapped){Battle.feedback(l,l.storedJudge||'Normal','input');return}const d=Battle.distance(l);let j;if(l.phase!=='approach')j='Bad';else if(d>CONFIG.readyPx)j='So fast!';else if(Math.abs(d)<=CONFIG.perfectPx)j='Perfect!';else if(Math.abs(d)<=CONFIG.goodPx)j='Good';else if(d>0)j='Normal';else j='Bad';l.tapPressT=.24;Battle.feedback(l,j,'input');if(j==='So fast!')return;l.tapped=true;l.tapJustSpawned=false;l.storedJudge=j;if(d<=0&&!l.collided){Battle.fixContact(l);Battle.collide(l)}},fixContact(l){const overlap=CONFIG.actorW*CONFIG.overlapRatio;const x=Battle.clashX(l);l.playerX=x-CONFIG.actorW+overlap;l.enemyX=x-overlap},collide(l){if(l.collided)return;l.collided=true;Battle.fixContact(l);let judge=l.storedJudge||'Bad';l.lastJudge=judge;let delta=Battle.delta(l,judge);const collisionLine=Battle.lineFromX(Battle.clashX(l));l.line=clamp(collisionLine+delta,-100,100);l.lastDelta=delta;if(['Perfect!','Good'].includes(judge))l.combo++;else l.combo=0;l.hitReadyT=.18;Battle.feedback(l,judge,'clash');const profile=Battle.recoilProfile(judge,delta,l.enemyProfile);l.recoilStartP=l.playerX;l.recoilStartE=l.enemyX;l.recoilEndP=l.playerX-profile.playerKb;l.recoilEndE=l.enemyX+profile.enemyKb;if(l.line>=100){l.recoilEndE=TUNING.finish.winEnemyX;l.recoilEndP=l.playerX-TUNING.finish.winPlayerBack}else if(l.line<=-100){l.recoilEndP=TUNING.finish.lossPlayerX;l.recoilEndE=l.enemyX+TUNING.finish.lossEnemyBack}if(l.line>=100||l.line<=-100){setTimeout(()=>{const f=$(`finish${l.id}`);if(f){f.textContent=l.line>=100?'完全勝利':'完全敗北';f.classList.remove('show');void f.offsetWidth;f.classList.add('show')}},0)}l.playerStun=profile.playerStun;l.enemyStun=profile.enemyStun;l.recoilT=0;l.recoilDur=profile.dur;l.clashCount++;l.tempo=clamp(1+l.clashCount*.08+(judge==='Bad'?.06:judge==='Perfect!'?-.04:0),1,1.45);l.hitstopT=Battle.hitstop(judge,l);l.phase='hitstop'},recoilProfile(judge,delta){const positive=delta>=0;const key=TUNING.recoil[judge]?judge:'Bad';const table={...TUNING.recoil[key]};if(!positive){table.playerKb=Math.max(table.playerKb,TUNING.recoil.Bad.playerKb*.88);table.enemyKb=Math.min(table.enemyKb,TUNING.recoil.Bad.enemyKb*1.2);table.playerStun=Math.max(table.playerStun,TUNING.recoil.Bad.playerStun*.82);table.enemyStun=Math.min(table.enemyStun,TUNING.recoil.Bad.enemyStun*1.15)}const pow=clamp(Math.abs(delta)/40,.75,1.5);const ep=arguments[2]||{};table.playerKb=Math.round(table.playerKb*(positive?.92:pow)*(ep.pressure||1));table.enemyKb=Math.round(table.enemyKb*(positive?pow:.88)/(ep.weight||1));table.dur=clamp(table.dur+pow*.035,.30,.50);return table},delta(l,judge){let effective=judge;if(l.active.includes('wifeAdvice')&&judge==='Bad')effective='Normal';let base=TUNING.judgeDelta[effective]??-18;const card=l.queuedCards.shift();if(card){Battle.cardEffect(l,card,effective);base+=l.cardDelta||0;l.cardDelta=0}base+=(l.actor.push-3)*3;if(base<0)base+=(l.actor.defense-3)*3+(l.actor.stability-3)*2;const ep=l.enemyProfile||ENEMY_ARCHETYPES.standard;const dp=l.diff||DIFFICULTY_PROFILES.normal;const mult=base>=0?(dp.damageToEnemy/(ep.stability||1)):(dp.damageToPlayer*(ep.pressure||1));return Math.round(clamp(base*mult,-64,64))},cardEffect(l,card,judge){l.cardDelta=0;l.cardUsed=card;l.cardEffectLabel=`${DATA.cards[card].name} 発動`;l.cardEffectT=1.6;sfx('card');if(card==='assault')l.cardDelta=judge==='Bad'?-8:18;if(card==='guard'&&judge==='Bad')l.cardDelta=20;if(card==='royal'&&l.actor.id==='albrecht')l.cardDelta=14;if(card==='wifeAdvice'){l.active.push('wifeAdvice');if(judge==='Bad')l.cardDelta=24}if(card==='butler')l.cardDelta=12},result(l){const rank=Battle.rank(l.line);const effect=l.case.effects[rank];return{case:l.case,actor:l.actor,rank,finalLine:l.line,effect,story:effect.story,label:{completeWin:'完全勝利',majorWin:'優勢勝利',minorWin:'小勝利',draw:'膠着',minorLoss:'小敗北',majorLoss:'劣勢敗北',completeLoss:'完全敗北'}[rank]}},rank(x){if(x>=100)return'completeWin';if(x>=50)return'majorWin';if(x>=15)return'minorWin';if(x>=-14)return'draw';if(x>=-49)return'minorLoss';if(x>-100)return'majorLoss';return'completeLoss'},distance(l){return l.enemyX-(l.playerX+CONFIG.actorW-CONFIG.actorW*CONFIG.overlapRatio)},clashX(l){return (l.playerX+CONFIG.actorW-CONFIG.actorW*CONFIG.overlapRatio+l.enemyX)/2},xFromLine(line){return 500+clamp(line,-100,100)*3.35},lineFromX(x){return clamp(Math.round((x-500)/3.35),-100,100)},distBoost(l,d){const ep=l.enemyProfile||ENEMY_ARCHETYPES.standard;if(ep.id==='cunning'){return d<150?ep.nearBoost:(d>320?ep.farBoost:.86+Math.sin((battle?.elapsed||0)*8+l.seed)*.16)}return d>260?(ep.farBoost||CONFIG.farBoost):d<80?(ep.nearBoost||CONFIG.nearBoost):1},hitstop(judge,l){const base={'Perfect!':.14,Good:.10,Normal:.06,Bad:.12}[judge]||.04;return base*((l.enemyProfile&&l.enemyProfile.hitstop)||1)},feedback(l,text,kind){const fx=FX_LABELS[text]||{};/* tapFb removed: center judge only */if(kind==='clash'){['spark'].forEach(id=>{const e=$(`${id}${l.id}`);if(e){const cls='show';e.classList.remove(cls);void e.offsetWidth;e.classList.add(cls);setTimeout(()=>e.classList.remove(cls),360)}});const j=$(`judge${l.id}`);if(j){j.textContent=fx.label||text;j.classList.remove('show');void j.offsetWidth;j.classList.add('show')}const d=$(`delta${l.id}`);if(d){d.textContent='';d.classList.remove('show')}const lane=$(`lane${l.id}`);if(lane){lane.classList.remove('laneShake','fxPerfect','fxGood','fxNormal','fxBad');void lane.offsetWidth;lane.classList.add('laneShake');if(fx.laneClass){lane.classList.add(fx.laneClass);setTimeout(()=>lane.classList.remove(fx.laneClass),620)}}}sfx(text==='Perfect!'?'perfect':text==='Good'?'good':text==='Bad'?'bad':'tap')}};
function enemyImgFor(c){return IMG[c.enemyImg||'soldier']}
function audio(){if(!soundOn)return null;try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx}catch(e){return null}}
function beep(f=440,d=.06,type='sine',g=.05){const ctx=audio();if(!ctx)return;const o=ctx.createOscillator(),gn=ctx.createGain();o.type=type;o.frequency.value=f;gn.gain.setValueAtTime(g,ctx.currentTime);gn.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+d);o.connect(gn);gn.connect(ctx.destination);o.start();o.stop(ctx.currentTime+d)}
function noise(d=.08,g=.08){const ctx=audio();if(!ctx)return;const b=ctx.createBuffer(1,ctx.sampleRate*d,ctx.sampleRate),a=b.getChannelData(0);for(let i=0;i<a.length;i++)a[i]=(Math.random()*2-1)*(1-i/a.length);const s=ctx.createBufferSource(),gn=ctx.createGain();s.buffer=b;gn.gain.setValueAtTime(g,ctx.currentTime);gn.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+d);s.connect(gn);gn.connect(ctx.destination);s.start()}
function sfx(n){if(n==='reveal'){beep(360,.05,'triangle',.035);setTimeout(()=>beep(540,.06,'triangle',.032),70);setTimeout(()=>beep(720,.07,'triangle',.028),145)}if(n==='select'){beep(620,.045,'triangle',.038);setTimeout(()=>beep(820,.04,'triangle',.028),46)}if(n==='assign'){beep(510,.04,'triangle',.035);setTimeout(()=>beep(670,.035,'triangle',.025),42)}if(n==='cancel')beep(260,.055,'triangle',.025);if(n==='tap')beep(420,.035,'triangle',.025);if(n==='good'){beep(700,.05,'triangle',.04);noise(.04,.025)}if(n==='perfect'){beep(880,.045,'triangle',.055);setTimeout(()=>beep(1320,.06,'triangle',.045),45);noise(.055,.045)}if(n==='bad'){beep(180,.09,'sawtooth',.05);noise(.06,.035)}if(n==='card'){beep(520,.04,'triangle',.05);setTimeout(()=>beep(920,.06,'triangle',.045),55)}if(n==='start'){beep(440,.06,'square',.04);setTimeout(()=>beep(660,.06,'square',.04),70);setTimeout(()=>beep(880,.08,'square',.045),140)}if(n==='warn')beep(240,.08,'square',.045);if(n==='caseReveal'){beep(360,.045,'triangle',.035);setTimeout(()=>beep(540,.055,'triangle',.035),50);setTimeout(()=>beep(720,.065,'triangle',.032),105)}if(n==='casePick'){beep(620,.045,'triangle',.04);setTimeout(()=>beep(920,.045,'triangle',.032),45)}if(n==='caseCancel')beep(310,.055,'triangle',.035);if(n==='assign'){beep(480,.035,'triangle',.035);setTimeout(()=>beep(680,.04,'triangle',.03),38)}}
window.addEventListener('keydown',e=>{if(!battle||battle.phase!=='running')return;if(e.code==='Space')Battle.tap(battle.lanes[0]?.id);if(e.key.toLowerCase()==='w')Battle.tap(1);if(e.key.toLowerCase()==='s')Battle.tap(2);if(e.key.toLowerCase()==='x')Battle.tap(3)});

const Opening={
showTitle(){
  setScreen('screenOpening');
  $('screenOpening').innerHTML=`<div class="openingTitle openingFadeIn" onclick="Opening.showStory()"><img class="openingTitleImg" src="${TITLE_IMG}" draggable="false" alt=""><div class="startCue">画面を押して始める</div></div>`;
},

  const opening=$('screenOpening');
  const title=opening.querySelector('.openingTitle');
  if(title){
    title.classList.add('openingFadeOut');
    setTimeout(()=>Opening.renderStory(),340);
  }else{
    Opening.renderStory();
  }
},

  setScreen('screenOpening');
  $('screenOpening').innerHTML=`<div class="openingStoryScreen openingFadeIn" onclick="Opening.startGame()"><div class="openingStoryBox storyEnter"><div class="openingStoryText"><div class="openingPara">十六歳の春。<br>アルブレヒトは王となった。</div><div class="openingPara">５人の選帝侯は年若い彼を侮り、隣国は抜け目なく国境をうかがう。<br>17聖紀初頭、アルトラント公国の舵取りは困難を極めた。</div><div class="openingPara">彼の治世は決して長いものではない。<br>しかしその生涯は、今なお親しく語り継がれている。<span class="openingCite">（『近世ショートッパ史概説』より）</span></div><div class="openingPara"><span class="quote">「鷲の羽ばたきは二十度目の冬を越えることはない」</span><span class="openingCite">（アルブレヒト誕生の日の占い師の言葉）</span></div></div><div class="storyCue">▼</div></div></div>`;
},

    story.classList.add('openingFadeOut');

};
Opening.showTitle();
