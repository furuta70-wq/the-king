function shouldInjectLandBorderSkirmish(top){
  if(!top||!top.key||State.turn===1)return false;
  if(top.value>=7)return true;
  if(top.value>=5)return Math.random()<.85;
  if(top.value>=3)return Math.random()<.65;
  return false;
}
function ensureLandBorderSkirmishCase(out,all,count=5){
  const top=topLandBorderTension();
  if(!shouldInjectLandBorderSkirmish(top))return out;
  if(out.some(c=>caseTensionKeys(c).includes(top.key)))return out;
  const ids=landBorderSkirmishIds(top.key);
  const candidates=ids.map(id=>all.find(c=>c.id===id)).filter(Boolean).filter(c=>!caseBlockedByProgress(c));
  if(!candidates.length)return out;
  const start=(State.turn*2+candidates.length)%candidates.length;
  const picked=[...candidates.slice(start),...candidates.slice(0,start)].find(c=>!out.includes(c));
  if(!picked)return out;
  if(out.length<count){out.push(picked);return out;}
  const replaceIndex=[...out].map((c,i)=>({c,i})).reverse().find(x=>!x.c.marriageCandidate&&!x.c.unlockActor&&!x.c.requiresFlag&&!caseMeta(x.c).requiresFlag)?.i;
  if(replaceIndex!==undefined)out[replaceIndex]=picked;
  return out;
}

function changeMapParam(key,delta){const before=State.map?.[key]||0;const changed=changeWorldValue('map',key,delta);const after=State.map?.[key]||0;if(changed)recordMapNews(key,before,after);return changed}

function changeInfluence(key,delta){if(!State.influence)State.influence=emptyMapValues();const d=mapDef(key);if(!d)return 0;let before=State.influence[key]||0;let beforeMap=State.map?.[key]||0;let next=before+(Number(delta)||0);let moved=0;while(next>=100&&State.map[key]<d.max){State.map[key]++;next-=100;moved++}while(next<=-100&&State.map[key]>d.min){State.map[key]--;next+=100;moved--}State.influence[key]=clamp(next,-99,99);if(moved)recordMapNews(key,beforeMap,State.map[key]||0);return moved}
function applyWorldEffect(e={}){for(const[k,v]of Object.entries(e.tension||{}))changeTension(k,v);for(const[k,v]of Object.entries(e.map||{}))changeMapParam(k,v);for(const[k,v]of Object.entries(e.influence||{}))changeInfluence(k,v)}

function caseBgKey(c){if(!c)return'grass';if(CASE_BG[c.id])return CASE_BG[c.id];const text=`${c.title||''} ${c.category||''} ${c.lineName||''} ${c.enemy||''}`;if(/港|貿易|交易|商業|セーフェアラ/.test(text))return'port';if(/王宮|選帝侯|宮廷|会議|折衝|外交団|使節|聖庁|リック|ルテニア/.test(text))return'palace';if(/村|農民|一揆|病院|地主|都市|民衆/.test(text))return'village';if(/森|狩猟|猪|鹿|狼|馬|獣/.test(text))return'forest';return'grass'}
function laneBgStyle(c,laneCount=1){const key=caseBgKey(c);const url=BG[key]||BG.grass;const count=clamp(Math.round(Number(laneCount)||1),1,3);const posTable={grass:{1:'center 58%',2:'center 70%',3:'center 82%'},palace:{1:'center 54%',2:'center 68%',3:'center 80%'},village:{1:'center 60%',2:'center 76%',3:'center 88%'},forest:{1:'center 56%',2:'center 72%',3:'center 84%'},port:{1:'center 58%',2:'center 72%',3:'center 84%'}};const pos=(posTable[key]&&posTable[key][count])||'center 75%';return `background-image:linear-gradient(90deg,rgba(6,17,30,.18),rgba(6,17,30,.04),rgba(6,17,30,.18)),url('${url}');--bgPos:${pos};background-repeat:no-repeat;background-color:#172337;`}

function laneDisplayName(c){return c?.lineName||c?.title||'戦線'}
function lanePowerInfo(l){
  const diffScore={tutorial:1.1,easy:.75,normal:0,hard:-.85,desperate:-1.65,growth:-.35}[l.case?.difficulty]??0;
  const ep=l.enemyProfile||{};
  const actorScore=(l.actor?.push||3)*.45+(l.actor?.stability||3)*.30+(l.actor?.defense||3)*.25;
  const enemyScore=(ep.pressure||1)*2.0+(ep.stability||1)*1.5+(ep.weight||1)*.7-diffScore;
  const score=actorScore-enemyScore;
  if(score>=1.15)return{label:'有利',cls:'adv'};
  if(score>=.35)return{label:'やや有利',cls:'sadv'};
  if(score<=-1.15)return{label:'不利',cls:'dis'};
  if(score<=-.35)return{label:'やや不利',cls:'sdis'};
  return{label:'互角',cls:'even'};
}

function assignFlashClass(kind,id){
  const f=State.assignFlash;
  if(!f||f.kind!==kind||f.id!==id)return '';
  return 'flashIn';
}
function routeFlashClass(kind,id){
  const f=State.assignFlash;
  if(!f||f.caseId!==id)return '';
  return f.kind===kind?'routeFlash':f.kind==='card'&&kind==='card'?'cardRouteFlash':'';
}

{id:'training_university_lecture',title:'大学講義への臨席',category:'成長・学問',difficulty:'normal',ignoreType:'機会損失',once:true,enemy:'反論する法学教授',lineName:'知識の主導権',initialLine:-5,enemyImg:'elector2',intro:'シュテルンベルク大学で、法学と神学をめぐる公開講義が開かれた。王が耳を傾けるだけなら拍手で終わる。問いを投げれば、学者たちは王を相手として認める。',effects:makeEffects({win:{prestige:4,churchSupport:2},loss:{prestige:-2,churchSupport:-1},ignored:{prestige:-1},stories:['王の問いは講堂を静めた。学者たちは、王が剣だけでなく言葉の戦場にも立てることを知った。','講義は無事に終わったが、王の存在は儀礼の範囲を越えなかった。','王の欠席は大学に冷ややかに記録され、知識人たちは王宮から距離を置いた。']})},
{id:'training_occult_inquiry',title:'怪異調査への同行',category:'成長・怪異',difficulty:'hard',ignoreType:'くすぶる',once:true,enemy:'森の怪異',lineName:'恐れの克服',initialLine:-15,enemyImg:'ghost',intro:'黒い森で、夜ごと古い鐘の音が聞こえるという。兵は怯え、村人は祈り、老いた猟師は「王が見に来ねば噂は王を食う」と告げた。',effects:makeEffects({win:{prestige:5,stability:2},loss:{prestige:-3,stability:-2},ignored:{stability:-1},stories:['王は森の闇に踏み込み、恐怖の正体を見極めた。以後、怪異の噂はただ王を縛るものではなくなる。','調査は半ばで終わり、怪異は消えなかった。だが王は恐れを見た経験だけは得た。','森の鐘は鳴り続け、村々では王でさえ怪異を避けたと語られた。']})},

// ===== 通常案件：政争・宗教・大国外交 =====
{id:'landlord',title:'悪徳地主の排除',category:'内政・裁き',difficulty:'normal',ignoreType:'放置不可',enemy:'悪徳地主',lineName:'裁きの主導権',enemyImg:'elector4',initialLine:-10,intro:'ある地主が借金を盾に農民の土地を奪い、私兵まで雇っているという訴えが届いた。だが、その地主は有力貴族の縁者だった。',effects:makeEffects({win:{stability:6,prestige:4,nobleSupport:-2},loss:{stability:-6,prestige:-3},ignored:{stability:-3},stories:['悪徳地主は裁かれた。農民たちは王の名を初めて味方として口にした。','裁きは下ったが、貴族たちは王の手元を警戒している。','地主の私兵はさらに大きな顔で村道を歩くようになった。']})},
{id:'elector',title:'選帝侯との折衝',category:'政争',difficulty:'hard',ignoreType:'放置不可',enemy:'筆頭選帝侯',lineName:'議場の流れ',enemyImg:'elector1',initialLine:-20,intro:'選帝侯たちは礼儀正しく頭を下げた。だが卓上に並ぶ沈黙のすべてが、若き王の力量を試していた。',effects:makeEffects({win:{prestige:9,nobleSupport:5},loss:{prestige:-9,nobleSupport:-7},ignored:{prestige:-3,nobleSupport:-2},stories:['議場の流れは王へ傾いた。選帝侯たちはしばらく沈黙を選ぶだろう。','折衝はかろうじて保たれた。だが目の奥の疑いは消えない。','選帝侯たちは、若き王の沈黙を弱さとして記憶した。']})},
{id:'rick',title:'リックの要請',category:'宗教・外交',difficulty:'hard',ignoreType:'くすぶる',enemy:'リック聖庁使節',lineName:'信仰と国益',enemyImg:'rickKing',initialLine:-15,intro:'リックから聖地支援の要請が届いた。応じれば教会は喜ぶが、国庫と兵は削られる。拒めば信仰の敵と見なされかねない。',effects:makeEffects({win:{churchSupport:7,diplomacy:3,treasury:-2,influence:{azraqRick:-35},tension:{azraqRick:1}},loss:{churchSupport:-7,diplomacy:-2,influence:{azraqRick:25},tension:{azraqRick:1}},ignored:{churchSupport:-1,tension:{azraqRick:1}},stories:['聖庁使節は満足げに十字を切った。王国の信仰上の立場は守られた。','要請への返答は曖昧にまとまった。信仰と国益の綱引きは続く。','リックの使節は不満を隠さず、王宮を去った。']})},
{id:'ruthenia',title:'ルテニアの外交団',category:'外交',difficulty:'desperate',ignoreType:'放置不可',enemy:'ルテニア外交団長',lineName:'交渉主導権',enemyImg:'rutheniaKing',initialLine:-30,intro:'ルテニアの外交団は、笑みを浮かべたまま王宮へ入った。彼らの礼儀正しさは、剣よりも冷たい圧力を帯びている。',effects:makeEffects({win:{diplomacy:10,prestige:8,influence:{altrantRuthenia:30,azraqRuthenia:-25},tension:{altrantRuthenia:-1,azraqRuthenia:1}},loss:{diplomacy:-10,prestige:-8,troops:-120,influence:{altrantRuthenia:-40},tension:{altrantRuthenia:2}},ignored:{diplomacy:-4,prestige:-2,influence:{altrantRuthenia:-15},tension:{altrantRuthenia:1}},stories:['外交団の笑みが消えた。若き王は侮れない相手として記録された。','会談は冷えたまま終わった。ルテニアはまだこちらを測っている。','外交団は勝ち誇って去った。次に届くのは、要求の書簡かもしれない。']})},

// ===== 重要案件：弟帰還 =====
// brother_return_01 は一度きり。大きく失敗した場合のみ brother_return_02 を解禁する。
{id:'brother_return_01',title:'リックからの弟帰還',category:'宗教・外交・家族',difficulty:'hard',ignoreType:'くすぶる',once:true,unlockActor:'brother',danger:1,enemy:'リック聖庁使節',lineName:'帰国交渉',enemyImg:'rickKing',initialLine:-15,intro:'リック神聖国から、腹違いの弟に関する書簡が届いた。幼い頃より聖庁の庇護下で育てられてきた少年は、今や王弟として政治的価値を帯びている。呼び戻せば王家は強まる。だがリックは、ただで手放す気などない。',effects:makeEffects({win:{prestige:6,diplomacy:2,tension:{altrantRick:1}},loss:{prestige:-6,churchSupport:-3,tension:{altrantRick:2}},ignored:{prestige:-2,tension:{altrantRick:1}},stories:['弟は堂々と帰国し、王宮の前で兄に膝をついた。リック側は不満を残しながらも、王家の正統な権利を認めざるを得なかった。','弟は帰国したが、兄を見る目にはわずかな距離があった。彼にとってリックは、単なる異国ではなく第二の故郷だった。','弟の帰国は拒まれた。聖庁は彼を「信仰に守られた王家の血」として抱え込み、アルトラントへの圧力を強めた。']})},
{id:'brother_return_02',title:'弟帰還の再交渉',category:'宗教・外交・家族',difficulty:'hard',ignoreType:'放置不可',once:true,requiresFlag:'brotherReturnRetryUnlocked',unlockActor:'brother',danger:1,enemy:'リック枢機卿代理',lineName:'再交渉',enemyImg:'rickKing',initialLine:-20,intro:'前回の交渉決裂を受け、リック神聖国は弟の帰国にさらに重い条件を付けてきた。だが、王家の血を異国に抱え込まれたままでは、宮廷にも選帝侯にも不安が残る。今度こそ、譲れるものと譲れぬものを見極めねばならない。',effects:makeEffects({win:{prestige:7,diplomacy:2,churchSupport:2,tension:{altrantRick:-1}},loss:{prestige:-7,churchSupport:-4,diplomacy:-3,tension:{altrantRick:2}},ignored:{prestige:-3,churchSupport:-2,tension:{altrantRick:1}},stories:['再交渉はついに実を結んだ。弟は聖庁の影を背負いながらも帰国し、アルトラント王家は失われかけた血を取り戻した。','条件は重かったが、弟は帰国した。王宮の廊下には、安堵と警戒が同時に満ちている。','再交渉も決裂した。リックは弟を手放さず、王宮では「王家の血を取り戻せなかった」という失望が広がった。']})},


{id:'brother_persuasion',title:'弟への説得',category:'王朝・兄弟',difficulty:'hard',ignoreType:'放置不可',once:true,requiresFlag:'brotherPersuasionUnlocked',danger:2,enemy:'弟派の貴族たち',lineName:'兄弟の距離',enemyImg:'brotherLate',initialLine:-18,intro:'王宮の奥で、弟を担ごうとする貴族たちの動きが露わになった。だが弟はまだ名乗らない。兄が直接向き合えば、刃を抜く前に止められるかもしれない。',effects:makeEffects({win:{prestige:5,stability:6,nobleSupport:3},loss:{prestige:-6,stability:-5,nobleSupport:-5},ignored:{prestige:-5,stability:-6,nobleSupport:-6},stories:['兄は弟の沈黙の奥に残っていた迷いをつかんだ。弟派は足場を失い、反逆の火は一度消えた。','弟は一歩だけ退いたが、貴族たちはなお彼の名を欲している。兄弟の距離は残ったままだ。','説得は届かなかった。弟の周囲では、もはや血筋を旗にする準備が整いつつある。']})},
{id:'brother_rebellion',title:'弟の反逆',category:'王朝・内乱',difficulty:'desperate',ignoreType:'放置不可',once:true,requiresFlag:'brotherRebellionUnlocked',danger:3,enemy:'ルートヴィヒ',lineName:'兄弟の決裂',enemyImg:'brotherLate',initialLine:-28,intro:'王宮の大広間で、弟は初めて兄の前に本当の名を掲げた。「我が名はルートヴィヒ！　愛しい兄上に歯向かう、愚かな弟だ！」　その背後には、王家の血を別の旗印にしようとする者たちが集まっている。',effects:makeEffects({win:{prestige:-5,stability:-6,nobleSupport:-4,churchSupport:-2},loss:{prestige:-12,stability:-12,nobleSupport:-10,churchSupport:-4},ignored:{prestige:-8,stability:-10,nobleSupport:-8},stories:['反逆は鎮圧された。ルートヴィヒは倒れ、最後まで兄を憎んだのか、それとも救いを求めたのか、誰にも分からなかった。王宮には勝利ではなく、血縁を失った沈黙だけが残った。','王は弟の軍勢を押し返したが、決着はつかなかった。ルートヴィヒの名は、もはや隠された弟ではなく、反王派の旗印として広がった。','反逆は王宮を揺るがした。ルートヴィヒの名は貴族たちの密談に刻まれ、王の正統性には深い亀裂が入った。']})},
// ===== 重要案件：婚姻候補 =====
// 婚姻案件は once:true。成功で妻が采配者に加入し、大きく失敗すると rejectedSpouses に入る。
{id:'marriage_wife1_childhood',title:'ヘレーネ・ヴィンターとの婚姻',category:'私生活・内政',difficulty:'easy',ignoreType:'機会損失',once:true,marriageCandidate:'wife1',unlockSpouse:'wife1',danger:0,enemy:'宮廷の反対派',lineName:'婚姻の機運',enemyImg:'elector4',initialLine:0,intro:'王宮の古い庭で、ヘレーネ・ヴィンターは昔と同じようにアルブレヒトを見つめていた。選帝侯も隣国も、この婚姻に大きな利益を見出さない。だが、疲れた王のそばに誰が立つべきかを、宮廷の誰もが考え始めていた。',effects:makeEffects({win:{stability:7,citySupport:5,prestige:2},loss:{stability:-4,prestige:-3},ignored:{stability:-1},stories:['ヘレーネは王妃となった。民は政略ではない婚姻に温かく反応し、若き王の孤独は少しだけ和らいだ。','婚姻は成立したが、選帝侯たちは政治的価値の薄さを冷ややかに見ていた。','宮廷はヘレーネを王妃にふさわしくないと退けた。王は私情すら守れぬ存在として、静かな傷を負った。']})},
{id:'marriage_wife2_loire',title:'ロアール王女との縁談',category:'外交・婚姻',difficulty:'normal',ignoreType:'くすぶる',once:true,marriageCandidate:'wife2',unlockSpouse:'wife2',danger:1,enemy:'ロアール婚姻使節',lineName:'縁談交渉',enemyImg:'loireKing',initialLine:-5,intro:'ロアール王国から、王女との縁談が持ち込まれた。西方国境の火種を鎮めるには、これ以上ない提案である。だがその婚姻は、アルトラントがロアールの華やかな宮廷文化に飲み込まれる危険も孕んでいた。',effects:makeEffects({win:{diplomacy:6,nobleSupport:4,influence:{altrantLoire:25},tension:{altrantLoire:-2}},loss:{diplomacy:-5,prestige:-3,influence:{altrantLoire:-25},tension:{altrantLoire:2}},ignored:{tension:{altrantLoire:1}},stories:['王女は誇り高く嫁ぎ、ロアール側もアルトラントを対等な婚姻相手として認めた。西方国境に、久しぶりの静けさが訪れた。','婚姻は成立したが、条件の一部でロアール側に譲歩した。宮廷の一部は不満を抱いている。','縁談は破談となり、ロアールではアルトラント王宮への嘲笑が広がった。']})},
{id:'marriage_wife3_rick',title:'リックの聖女との婚姻',category:'宗教・婚姻',difficulty:'normal',ignoreType:'くすぶる',once:true,marriageCandidate:'wife3',unlockSpouse:'wife3',danger:1,enemy:'リック聖庁使節',lineName:'信仰の条件',enemyImg:'rickKing',initialLine:-5,intro:'リック神聖国は、聖女と呼ばれる高貴な娘を王妃候補として示した。婚姻が成立すれば、教会は王権を祝福するだろう。だが同時に、アルトラントの王座は聖庁の視線から逃れられなくなる。',effects:makeEffects({win:{churchSupport:8,diplomacy:3,tension:{altrantRick:-1,azraqRick:1}},loss:{churchSupport:-8,diplomacy:-2,tension:{altrantRick:2}},ignored:{churchSupport:-1},stories:['聖女は王妃となり、教会は王の統治に祝福を与えた。信仰と王権は、ひとまず同じ卓についた。','婚姻は成立したが、聖庁は王宮内に発言力を求めてきた。','聖女との婚姻は破談となり、聖庁はアルトラント王を不信の目で見るようになった。']})},
{id:'marriage_wife4_ruthenia',title:'ルテニア姫との政略婚',category:'大国外交・婚姻',difficulty:'hard',ignoreType:'放置不可',once:true,marriageCandidate:'wife4',unlockSpouse:'wife4',danger:2,enemy:'ルテニア婚姻使節',lineName:'同盟条件',enemyImg:'rutheniaKing',initialLine:-20,intro:'ルテニア連合国から、姫君との婚姻話が持ち込まれた。受け入れれば北東の巨人と血縁を結べる。だが、その手を取ることは、選帝侯たちにも隣国にも「アルトラントはルテニアへ傾いた」と告げるに等しかった。',effects:makeEffects({win:{diplomacy:9,prestige:7,influence:{altrantRuthenia:35},tension:{altrantRuthenia:-2}},loss:{diplomacy:-8,prestige:-6,nobleSupport:-3,influence:{altrantRuthenia:-35},tension:{altrantRuthenia:2}},ignored:{diplomacy:-2,tension:{altrantRuthenia:1}},stories:['姫は王妃となったが、王はルテニアに従属しなかった。大国との婚姻を、対等な同盟へ変えたのだ。','婚姻は成立したが、宮廷ではルテニアの影響力を警戒する声が強まった。','婚姻交渉は決裂した。ルテニアは、アルトラントを対等な相手ではなく、揺さぶるべき小国として見た。']})},
{id:'marriage_wife5_azraq',title:'アズラク皇女との婚姻',category:'南方外交・婚姻',difficulty:'hard',ignoreType:'くすぶる',once:true,marriageCandidate:'wife5',unlockSpouse:'wife5',danger:2,enemy:'アズラク婚姻使節',lineName:'異文化婚姻',enemyImg:'azraqKing',initialLine:-20,intro:'アズラク帝国から、皇女との婚姻という驚くべき提案が届いた。聖地をめぐりリックと対立する帝国と血を結ぶことは、大陸の常識を揺らす。だが、それは南方に新しい道を開く唯一の選択かもしれなかった。',effects:makeEffects({win:{diplomacy:7,treasury:5,prestige:5,tension:{azraqRick:-2,azraqLoire:-1}},loss:{diplomacy:-6,churchSupport:-5,tension:{azraqRick:2,altrantRick:1}},ignored:{tension:{azraqRick:1}},stories:['皇女は王妃として迎えられた。敵味方の境界を越えた婚姻は、大陸中の宮廷に衝撃を与えた。','婚姻は成立したが、教会と保守貴族は露骨に顔を曇らせた。','婚姻は破談となった。リックは安堵し、アズラクは侮辱と受け取った。']})},
{id:'marriage_wife6_treuval',title:'トレウヴァル戦姫との盟約婚',category:'辺境・軍事・婚姻',difficulty:'hard',ignoreType:'くすぶる',once:true,marriageCandidate:'wife6',unlockSpouse:'wife6',danger:2,enemy:'トレウヴァル戦姫',lineName:'盟約の気勢',enemyImg:'wife6',initialLine:-15,intro:'北西の荒れ地から、トレウヴァルの戦姫が王宮へ来た。彼女は花嫁というより、剣を携えた同盟そのものだった。受け入れれば辺境の力を得る。拒めば、彼女の勢力は再び国境の向こうで牙を研ぐだろう。',effects:makeEffects({win:{troops:220,prestige:6,stability:3,tension:{altrantTreuval:-2}},loss:{prestige:-6,nobleSupport:-3,tension:{altrantTreuval:2}},ignored:{tension:{altrantTreuval:1}},stories:['戦姫は王妃となり、トレウヴァルの戦士たちは王旗の下に膝をついた。辺境は恐怖ではなく力となった。','婚姻は成立したが、宮廷の貴族たちは戦姫の振る舞いに顔をしかめた。','戦姫は婚姻を拒み、剣を抜いて王宮を去った。辺境では、再び戦の歌が聞こえ始めた。']})},

// ===== 通常案件：商業外交 =====
{id:'seafeara',title:'セーフェアラの貿易',category:'商業・外交',difficulty:'normal',ignoreType:'くすぶる',enemy:'セーフェアラ商業使節',lineName:'交易条件',enemyImg:'seafearaKing',initialLine:0,intro:'海の商業連盟セーフェアラが、港湾使用権と引き換えに大規模な交易協定を持ちかけてきた。利益は大きいが、主導権を渡せば王国の商人は飲み込まれる。',effects:makeEffects({win:{treasury:10,diplomacy:4,citySupport:3,tension:{azraqLoire:-1}},loss:{treasury:-3,diplomacy:-4,citySupport:-5,influence:{azraqLoire:20},tension:{azraqLoire:1}},ignored:{treasury:-1},stories:['交易協定は王国側の条件でまとまった。港には新しい帆が並ぶ。','利益は出たが、商人たちはセーフェアラのしたたかさを思い知った。','港の商人たちは機会を逃したと不満げに帳簿を閉じた。']})},

// ===== 第1波追加案件：五選帝侯 =====
{id:'elector_leopold_mine_collapse',title:'銀山の落盤',category:'財政・民心',difficulty:'easy',ignoreType:'悪化注意',enemy:'レオポルトの鉱山代官',lineName:'救助と補償',enemyImg:'peasant',initialLine:0,intro:'ヴァイセンブルク銀山で坑道が崩れ、鉱夫たちが閉じ込められた。代官は採掘再開を急ぐが、遺族たちは救助と補償を求めて坑口を囲んでいる。',effects:makeEffects({win:{stability:5,citySupport:4,treasury:-2},loss:{stability:-3,treasury:-2},ignored:{stability:-2},stories:['救助と補償が行われ、鉱夫たちは王の名を覚えた。銀は減ったが、人心は王の側へ戻った。','救助は遅れ、銀山労働者の不満が残った。坑道の奥に残った怒りは、まだ消えていない。','「王は銀だけを見て人を見ない」という噂が、銀山地帯に広がった。']})},
{id:'elector_leopold_bad_coin',title:'悪貨の流入',category:'財政・交易',difficulty:'normal',ignoreType:'悪化注意',enemy:'レオポルト・フォン・ヴァイセンブルク',lineName:'貨幣信用',enemyImg:'rutheniaKing',initialLine:-5,intro:'東方から粗悪な銀貨が流れ込み、王都の商人たちが良貨を隠し始めた。レオポルトは即時回収を主張するが、強引に進めれば市場が凍りつく。',effects:makeEffects({win:{treasury:4,prestige:3,influence:{altrantRuthenia:15}},loss:{treasury:-4,citySupport:-4,influence:{altrantRuthenia:-20}},ignored:{treasury:-2,tension:{altrantRuthenia:1}},stories:['悪貨の流通は抑え込まれ、王国貨幣への信頼が守られた。商人たちは再び銀貨を秤に乗せる。','商人たちは銀貨を信用しなくなり、物価と不満が同時に上がった。','ルテニア商人は市場の混乱に乗じ、東方貨幣の影響力を広げた。']})},
{id:'elector_leopold_war_tax',title:'軍資金の臨時税',category:'財政・軍事',difficulty:'hard',ignoreType:'放置不可',enemy:'反対する都市代表',lineName:'課税承認',enemyImg:'peasant',initialLine:-15,intro:'国境の緊張が高まり、兵の維持費が膨らんだ。レオポルトは臨時税を提案するが、都市代表は「王の戦争を市民の財布で払わせるのか」と反発している。',effects:makeEffects({win:{treasury:8,troops:80,nobleSupport:2,citySupport:-2},loss:{citySupport:-7,stability:-4,prestige:-3},ignored:{treasury:-3,troops:-60},stories:['税は限定的に認められ、軍資金が確保された。都市は不満を残したが、国境の兵は給金を受け取った。','都市の反発が強まり、選帝侯会議でも王の財政運営が疑われた。','兵の維持費は国庫を削り、次の軍事案件に暗い影を落とした。']})},
{id:'elector_emil_dormitory_fire_tax',title:'学寮の暖炉税',category:'大学・内政',difficulty:'easy',ignoreType:'くすぶる',enemy:'エーミール・フォン・シュテルンベルク',lineName:'学寮支援',enemyImg:'peasant',initialLine:0,intro:'シュテルンベルク大学の学寮で冬の燃料費が払えず、貧しい学生たちが講義を欠席し始めた。財務官は「学生は兵にも税にもならぬ」と切り捨てるが、エーミールは静かに王へ陳情する。',effects:makeEffects({win:{prestige:3,stability:2,treasury:-1},loss:{prestige:-2},ignored:{prestige:-1},stories:['学生支援が認められ、王に仕える若い書記官候補が育ち始めた。','大学側は王宮の冷淡さを記録し、学者たちの協力は鈍った。','貧しい学生が大学を去り、官僚育成の芽は細った。']})},
{id:'elector_emil_satire_pamphlet',title:'印刷工房の風刺冊子',category:'世論・文化',difficulty:'normal',ignoreType:'悪化注意',enemy:'大学印刷工房の親方',lineName:'世論の流れ',enemyImg:'loireKing',initialLine:-5,intro:'王都に、アルブレヒトを「羽の軽い若鷲」と揶揄する風刺冊子が出回った。紙質と装飾はロアール風で、背後に西方の宮廷詩人がいるとの噂もある。',effects:makeEffects({win:{prestige:4,citySupport:2,influence:{altrantLoire:10}},loss:{prestige:-5,citySupport:-2,influence:{altrantLoire:-15}},ignored:{prestige:-2,tension:{altrantLoire:1}},stories:['過度な弾圧を避けつつ出所を探り、王権批判を議論の場へ引き戻した。','取り締まりは裏目に出て、王を笑う冊子がさらに広まった。','ロアール宮廷で若王を嘲る芝居が流行し始めた。']})},
{id:'elector_emil_royal_law_commentary',title:'王権法案の注釈戦争',category:'法・政争',difficulty:'hard',ignoreType:'放置不可',enemy:'反対派法学者',lineName:'法案整理',enemyImg:'elector2',initialLine:-15,intro:'王権改革の草案に対し、大学の法学者たちが次々と注釈書を出した。ある者は王権を支え、ある者は選帝侯の古権を守る。紙上の論争は、やがて議場の票を動かし始めている。',effects:makeEffects({win:{prestige:7,nobleSupport:3,stability:4},loss:{prestige:-6,nobleSupport:-5,stability:-3},ignored:{prestige:-2,nobleSupport:-2},stories:['法案の論点は整理され、王権改革は若王の独断ではなく法の整備として語られた。','注釈戦争は選帝侯側に傾き、王権改革は危険思想として扱われた。','議論は散らばり、どの条文も決まらないまま時間だけが過ぎた。']})},
{id:'elector_clarissa_orphan_food',title:'孤児院の食糧不足',category:'福祉・民衆',difficulty:'easy',ignoreType:'悪化注意',enemy:'クラリッサ・フォン・ハイリヒブルン',lineName:'救済の手',enemyImg:'peasant',initialLine:0,intro:'冬が長引き、聖泉女侯の孤児院で食糧が不足した。王都では舞踏会が続く一方、子供たちは一日一食で耐えている。クラリッサは王へ援助を求める。',effects:makeEffects({win:{stability:5,citySupport:6,treasury:-2},loss:{citySupport:-3},ignored:{citySupport:-5},stories:['孤児院に食糧が届き、民衆は王が小さな声にも耳を傾けることを知った。','教会が独力で対応したが、王宮への失望は残った。','「王は子供を見捨てた」という噂が、王都の路地に広まった。']})},
{id:'elector_clarissa_pilgrim_bandits',title:'巡礼路の盗賊',category:'巡礼・治安',difficulty:'normal',ignoreType:'悪化注意',enemy:'巡礼者代表',lineName:'巡礼路保護',enemyImg:'peasant',initialLine:-5,intro:'聖泉へ向かう巡礼者が街道で襲われている。リックからも抗議が届き始め、巡礼路の安全は信仰と外交の問題になりつつあった。',effects:makeEffects({win:{churchSupport:4,diplomacy:2},loss:{churchSupport:-4},ignored:{tension:{altrantRick:1}},stories:['巡礼路は安全化され、聖泉へ向かう列に安堵が戻った。','巡礼者は減少し、リック側の不満がくすぶった。','リックは巡礼者保護を理由に、王国内での発言権を求め始めた。']})},
{id:'elector_clarissa_azraq_refugees',title:'アズラク難民の流入',category:'難民・宗教',difficulty:'hard',ignoreType:'放置不可',enemy:'アズラク避難民代表',lineName:'受け入れ秩序',enemyImg:'peasant',initialLine:-15,intro:'南方で戦乱が起き、多数の難民が巡礼路へ流れ込んできた。受け入れれば負担は大きい。拒めば教会が反発する。クラリッサは、王の裁きを待っている。',effects:makeEffects({win:{citySupport:4,churchSupport:5},loss:{stability:-5},ignored:{churchSupport:-6},stories:['難民は秩序ある形で受け入れられ、王国は慈悲と統治を両立させた。','都市で暴動が起き、難民と住民のあいだに深い溝が残った。','教会は王宮の沈黙に怒り、聖泉からの祈りは冷たいものになった。']})},
{id:'elector_rosen_first_ball',title:'薔薇宮の初舞踏会',category:'宮廷・威信',difficulty:'easy',ignoreType:'機会損失',enemy:'コンラート・フォン・ローゼンフェルト',lineName:'宮廷の視線',enemyImg:'elector4',initialLine:0,intro:'ローゼンフェルト宮で、若き王を迎える初めての大舞踏会が開かれる。コンラートは笑顔で招待状を差し出したが、その場には王を値踏みする貴族たちが集まっていた。',effects:makeEffects({win:{prestige:4,nobleSupport:3},loss:{prestige:-3,nobleSupport:-2},ignored:{prestige:-2},stories:['アルブレヒトはぎこちなさを見せながらも、王として場を制した。貴族たちは若王を侮れない存在として見た。','舞踏会での小さな失態が大げさに語られ、宮廷中の笑い話になった。','ローゼンフェルト宮は王抜きで華やかに盛り上がり、王宮の存在感は薄れた。']})},
{id:'elector_rosen_loire_etiquette',title:'ロアール式礼法の流行',category:'宮廷・文化外交',difficulty:'normal',ignoreType:'悪化注意',enemy:'エレオノーラ・フォン・ローゼンフェルト',lineName:'宮廷様式',enemyImg:'loireKing',initialLine:-5,intro:'王都の若い貴族たちの間で、ロアール式の礼法、服飾、詩作が流行し始めた。文化交流にも見えるが、エレオノーラは「憧れは、時に従属より深く人を縛ります」と警告する。',effects:makeEffects({win:{prestige:4,nobleSupport:2,influence:{altrantLoire:15}},loss:{prestige:-4,nobleSupport:-3,influence:{altrantLoire:-20}},ignored:{prestige:-2,influence:{altrantLoire:-10}},stories:['ロアール文化は取り入れられたが、アルトラント独自の宮廷様式として再構成された。','王都貴族はロアール宮廷を上位の手本と見なし始めた。','宮廷でアルトラント風の作法は古臭いものとして扱われた。']})},
{id:'elector_rosen_bride_slander',title:'王妃候補への中傷文書',category:'婚姻・宮廷',difficulty:'hard',ignoreType:'放置不可',enemy:'宮廷婦人派閥',lineName:'噂の出所',enemyImg:'elector4',initialLine:-15,intro:'王妃候補の一人を貶める中傷文書が、宮廷の控室に置かれていた。筆跡は巧妙に隠されているが、背後には他国の使節、貴族婦人、選帝侯家の利害が絡んでいるらしい。',effects:makeEffects({win:{prestige:5,nobleSupport:3,diplomacy:2},loss:{prestige:-5,diplomacy:-3},ignored:{nobleSupport:-2,diplomacy:-2},stories:['エレオノーラの助けで噂の出所を探り、婚姻外交は守られた。','中傷は広がり、候補者との関係に傷がついた。','宮廷は王妃候補を品定めする噂で満ち、婚姻案件の空気は悪化した。']})},
{id:'elector_gerhard_fort_repair',title:'冬前の砦補修',category:'辺境・軍事',difficulty:'easy',ignoreType:'悪化注意',enemy:'ゲルハルト・フォン・アイゼンヴァルト',lineName:'砦の備え',enemyImg:'altrantSoldier',initialLine:0,intro:'東方国境の小砦では、冬を前に外壁の石が崩れ始めていた。王都の財務官は「小さな砦に金をかけすぎる」と渋るが、ゲルハルトは泥のついた手袋を机に置き、短く言った。「落ちる時は、まず小さい砦からだ」',effects:makeEffects({win:{troops:60,prestige:2,treasury:-1,influence:{altrantRuthenia:10}},loss:{troops:-40,prestige:-2},ignored:{troops:-60,influence:{altrantRuthenia:-10}},stories:['砦は冬を越える備えを得た。辺境の兵たちは、王都が自分たちを見捨てていないと知った。','補修は半端に終わり、守備兵の不満が残った。','冬の間に砦の一部が崩れ、国境防衛に不安が残った。']})},
{id:'elector_gerhard_conscription_list',title:'徴兵名簿の焼却',category:'徴兵・農村',difficulty:'normal',ignoreType:'悪化注意',enemy:'辺境村の村長',lineName:'徴兵調整',enemyImg:'peasant',initialLine:-5,intro:'アイゼンヴァルト領の村で、徴兵名簿が焼かれた。村人たちは「畑を守る男まで奪われれば、冬を越せない」と訴える。ゲルハルトは厳罰を求めるが、村の事情もまた現実だった。',effects:makeEffects({win:{troops:90,stability:3,citySupport:1},loss:{stability:-5,troops:-50},ignored:{troops:-80,stability:-3},stories:['徴兵数を調整し、村の防衛民兵として組み込んだ。王命と生活の折り合いがついた。','処罰だけが先に立ち、村人たちは王国軍を恨むようになった。','名簿焼却は他の村にも広がり始めた。']})},
{id:'elector_gerhard_ruthenia_scouts',title:'ルテニア斥候の越境',category:'国境・諜報',difficulty:'hard',ignoreType:'放置不可',enemy:'ルテニア斥候隊',lineName:'国境主導権',enemyImg:'rutheniaSoldier',initialLine:-15,intro:'東方の森で、ルテニア斥候が捕らえられた。持っていた地図には、砦の井戸、穀倉、退路まで印が付けられている。ゲルハルトは即時報復を主張するが、軽率に動けば国境衝突へ発展する。',effects:makeEffects({win:{prestige:6,troops:80,influence:{altrantRuthenia:30},tension:{altrantRuthenia:-1}},loss:{prestige:-5,troops:-80,influence:{altrantRuthenia:-35},tension:{altrantRuthenia:2}},ignored:{influence:{altrantRuthenia:-25},tension:{altrantRuthenia:1}},stories:['斥候を交渉材料にし、ルテニアの出方を封じた。国境の主導権は王国側に残った。','報復と抗議が噛み合わず、ルテニアは逆にアルトラントの挑発だと主張した。','ルテニアは地形情報を得たまま、次の圧力を強めた。']})},

{id:'local_market_prices',title:'王都市場の物価騒ぎ',category:'都市・経済',difficulty:'easy',ignoreType:'くすぶる',enemy:'市場の商人代表',lineName:'市場の沈静',enemyImg:'peasant',initialLine:0,intro:'王都の市場で小麦の値が急に上がり、庶民が商人の店先に詰めかけた。商人は輸送費の高騰を訴え、民衆は買い占めを疑っている。',effects:makeEffects({win:{citySupport:4,stability:2,treasury:-1},loss:{citySupport:-3},ignored:{stability:-2},stories:['価格調査と備蓄放出で、市場の混乱は抑えられた。','市場の不満は残り、商人と民衆は互いを疑った。','民衆は王都行政を疑い、物価の噂はさらに広がった。']})},
{id:'local_guild_dispute',title:'職人組合の親方争い',category:'都市・産業',difficulty:'easy',ignoreType:'くすぶる',enemy:'鍛冶職人組合',lineName:'組合調停',enemyImg:'peasant',initialLine:0,intro:'王都の鍛冶職人組合で、古参親方と若手職人が製法と価格をめぐって対立した。武具の納入にも遅れが出始めている。',effects:makeEffects({win:{troops:40,citySupport:3},loss:{citySupport:-2},ignored:{troops:-40},stories:['組合規約は整い、武具納入は安定した。','職人たちの不満は残り、工房の火は重く揺れた。','武具不足が軍事案件に影を落とし始めた。']})},
{id:'local_capital_fire',title:'王都の大火',category:'内政・災害',difficulty:'normal',ignoreType:'放置不可',enemy:'消防組と市民代表',lineName:'消火指揮',enemyImg:'peasant',initialLine:-5,intro:'乾いた夜風の中、王都の職人街で火が上がった。倉庫、宿屋、教会裏の貧民小屋まで火の手が迫っている。',effects:makeEffects({win:{stability:4,citySupport:4,treasury:-2},loss:{treasury:-4,citySupport:-5},ignored:{stability:-5},stories:['消火と避難は進み、被害は最小限に抑えられた。','職人街は焼け、税収と民心が落ちた。','王都には大きな傷が残り、焼け跡の煙は数日消えなかった。']})},
{id:'local_sewer_plague',title:'下水溝の疫病臭',category:'福祉・都市',difficulty:'normal',ignoreType:'悪化注意',enemy:'王都医師団',lineName:'疫病封じ',enemyImg:'plague',initialLine:-5,intro:'王都の下水溝から悪臭が立ち、貧民街で熱病が広がり始めた。医師団は清掃と隔離を求めるが、商人たちは店を閉じることに反対している。',effects:makeEffects({win:{stability:5,citySupport:3,treasury:-2},loss:{stability:-5},ignored:{stability:-3,churchSupport:-2},stories:['清掃と施療が進み、疫病は広がる前に封じ込められた。','病は残り、民衆不安が広がった。','悪臭は消えず、次の疫病の影が王都に残った。']})},
{id:'local_seed_shortage',title:'春の種籾不足',category:'農村・食糧',difficulty:'easy',ignoreType:'悪化注意',enemy:'農村代表',lineName:'作付け支援',enemyImg:'peasant',initialLine:0,intro:'長雨で保存していた種籾が傷み、春の播種が危ぶまれている。村々は貸与を求めるが、財務官は国庫負担を嫌がっている。',effects:makeEffects({win:{stability:3,treasury:-1},loss:{treasury:-2},ignored:{treasury:-3,stability:-2},stories:['種籾は貸し出され、秋の収穫は守られた。','一部の村は作付けを諦め、畑には空白が残った。','翌年の税収低下が避けられなくなった。']})},
{id:'local_bridge_collapse',title:'橋の崩落',category:'街道・交易',difficulty:'normal',ignoreType:'悪化注意',enemy:'街道監督官',lineName:'橋の修復',enemyImg:'peasant',initialLine:-5,intro:'王都と銀山を結ぶ橋が崩れ、荷馬車が川辺に足止めされている。商人は修復を急かし、村人は通行税の免除を求めている。',effects:makeEffects({win:{treasury:3,citySupport:2},loss:{treasury:-3},ignored:{treasury:-4},stories:['橋は修復され、交易路は守られた。','輸送は滞り、国庫収入が落ちた。','商人たちは別ルートへ流れ始めた。']})},
{id:'local_road_bandits',title:'街道の盗賊団',category:'治安・軍事',difficulty:'normal',ignoreType:'放置不可',enemy:'仮面の盗賊団',lineName:'街道治安',enemyImg:'peasant',initialLine:-5,intro:'王都へ向かう街道で、仮面をつけた盗賊団が荷馬車を襲っている。旅籠には商人と巡礼者が足止めされ、不安が広がっている。',effects:makeEffects({win:{treasury:2,churchSupport:2,stability:3},loss:{troops:-40,stability:-3},ignored:{treasury:-2,churchSupport:-2},stories:['盗賊は討たれ、街道の信用は取り戻された。','討伐は不十分で、襲撃は続いた。','交易と巡礼に悪影響が出始めた。']})},
{id:'local_port_smuggling',title:'港の密輸倉庫',category:'港・商業',difficulty:'normal',ignoreType:'悪化注意',enemy:'港湾役人',lineName:'密輸摘発',enemyImg:'seafearaKing',initialLine:-5,intro:'港の倉庫から、関税を逃れた香辛料と武器部品が見つかった。背後にはセーフェアラ商人の影があるが、証拠は薄い。',effects:makeEffects({win:{treasury:4,citySupport:2,influence:{azraqLoire:-10}},loss:{treasury:-2,influence:{azraqLoire:15}},ignored:{treasury:-3},stories:['密輸網は摘発され、港湾税は守られた。','商人たちは証拠を隠し、港の帳簿には穴が残った。','外国商館は港で力を増した。']})},
{id:'local_fort_dry_well',title:'砦の井戸枯れ',category:'国境・軍事',difficulty:'normal',ignoreType:'悪化注意',enemy:'砦守備隊長',lineName:'補給維持',enemyImg:'altrantSoldier',initialLine:-5,intro:'東方小砦の井戸が枯れ、兵たちは雪解け水に頼っている。ルテニア斥候が近いという噂もあり、補給の遅れは命取りになる。',effects:makeEffects({win:{troops:60,influence:{altrantRuthenia:10}},loss:{troops:-60,prestige:-2},ignored:{influence:{altrantRuthenia:-15}},stories:['補給路は整い、砦は維持された。','守備隊の士気は下がり、兵たちは王都の遅さを嘆いた。','国境防衛は薄くなり、東方の森は不穏さを増した。']})},
{id:'local_treuval_signal_fire',title:'夜霧の狼煙',category:'国境・不穏',difficulty:'hard',ignoreType:'放置不可',enemy:'辺境見張り兵',lineName:'警戒判断',enemyImg:'treuvalSoldier',initialLine:-15,intro:'夜霧の中、トレウヴァル方面の丘に狼煙が上がった。襲撃の合図か、氏族間の儀礼か、それとも王国を試す罠か。早すぎる動員は挑発になり、遅れれば村が焼かれる。',effects:makeEffects({win:{troops:80,influence:{altrantTreuval:20},tension:{altrantTreuval:-1}},loss:{troops:-100,stability:-4,tension:{altrantTreuval:2}},ignored:{influence:{altrantTreuval:-20},tension:{altrantTreuval:1}},stories:['偵察と警戒は整い、襲撃は未然に防がれた。','小村が襲われ、辺境の不安が増した。','トレウヴァル側は国境の弱さを知った。']})},

// ===== 第2波追加案件：五選帝侯の残り通常案件 =====
{id:'elector_leopold_seafeara_loan',title:'セーフェアラ銀行団の融資条件',category:'財政・商業外交',difficulty:'normal',ignoreType:'悪化注意',enemy:'アルバロ・デ・メンドーサ',lineName:'借款条件',enemyImg:'seafearaKing',initialLine:-5,intro:'セーフェアラ銀行団が、低利の融資を申し出た。ただし担保は港湾税の一部と、王国銀山の将来収益である。レオポルトは沈黙したまま契約書を見ている。',effects:makeEffects({win:{treasury:10,diplomacy:3,citySupport:2},loss:{treasury:4,nobleSupport:-4,citySupport:-3,influence:{azraqLoire:10}},ignored:{treasury:-1},stories:['借款は王国側に有利な条件でまとまり、国庫は一息ついた。だが商業連盟との結びつきは確かに深まった。','不利な条項を飲まされ、港の商人と貴族は王宮の判断を疑った。','資金不足は続き、軍事にも福祉にも細い影を落とした。']})},
{id:'elector_leopold_secret_pact',title:'白銀公の密約疑惑',category:'財政・政争',difficulty:'hard',ignoreType:'放置不可',enemy:'セーフェアラ密使',lineName:'密約調査',enemyImg:'seafearaKing',initialLine:-15,intro:'セーフェアラ商館から、白銀公宛の暗号書簡が押収された。中身は不明だが、王宮では「レオポルトが造幣権を担保に独自融資を受けた」と囁かれている。',effects:makeEffects({win:{prestige:7,nobleSupport:3,diplomacy:2},loss:{nobleSupport:-7,prestige:-5,citySupport:-2},ignored:{nobleSupport:-3,influence:{azraqLoire:15}},stories:['密約の真相は暴かれ、レオポルトは王国財政の枠内へ引き戻された。','証拠は曖昧なまま消え、王と白銀公のあいだに深い不信だけが残った。','選帝侯たちは、王を通さず外国と交渉してもよいと学んでしまった。']})},
{id:'elector_leopold_silver_league_pressure',title:'銀山同盟領への外圧',category:'国家危機・財政',difficulty:'desperate',ignoreType:'放置不可',enemy:'ルテニア外交団',lineName:'銀山主権',enemyImg:'rutheniaKing',initialLine:-25,intro:'ルテニア外交団が、ヴァイセンブルク銀山の採掘権に関する古い証文を持ち出した。彼らは「係争地の保護」を名目に、東方軍の進駐をちらつかせている。レオポルトは王を試すように言った。「陛下。財布を守れぬ王に、剣は守れますかな」',effects:makeEffects({win:{prestige:10,treasury:8,nobleSupport:5,influence:{altrantRuthenia:45},tension:{altrantRuthenia:-1}},loss:{treasury:-8,prestige:-8,influence:{altrantRuthenia:-55},tension:{altrantRuthenia:2}},ignored:{treasury:-5,map:{altrantRuthenia:-1},tension:{altrantRuthenia:2}},stories:['ルテニアの要求は退けられ、銀山同盟領は王国のもとに留まった。白銀公は初めて、王を財政上の主君として認めた。','銀山の一部権益が揺らぎ、ルテニアの影響が東方から食い込んだ。','ルテニアは「保護権」を既成事実化し、地図上の勢力圏が不利に動いた。']})},
{id:'elector_emil_rick_theology_debate',title:'リック神学者との公開討論',category:'宗教・大学',difficulty:'normal',ignoreType:'悪化注意',enemy:'リック神学者',lineName:'討論の秩序',enemyImg:'rickKing',initialLine:-5,intro:'リックから高名な神学者が来訪し、シュテルンベルク大学で公開討論を求めた。受ければ学問の威信は上がるが、議論が過熱すれば「王国は異端を飼っている」と聖庁に見られかねない。',effects:makeEffects({win:{prestige:4,churchSupport:3,diplomacy:2},loss:{churchSupport:-5,diplomacy:-3,tension:{altrantRick:1}},ignored:{churchSupport:-2,tension:{altrantRick:1}},stories:['討論は礼節の中で終わり、アルトラントの学問的威信が高まった。','討論は罵倒に崩れ、リック側は王国の信仰を疑った。','リックは「討論から逃げた」と解釈し、聖庁内で不信が残った。']})},
{id:'elector_emil_ruthenia_students',title:'ルテニア留学生の諜報疑惑',category:'大学・諜報',difficulty:'hard',ignoreType:'放置不可',enemy:'ルテニア留学生団',lineName:'学問と防諜',enemyImg:'rutheniaKing',initialLine:-15,intro:'シュテルンベルク大学に滞在するルテニア留学生の一人が、王国の街道測量図を写していたと告発された。ゲルハルトは即時拘束を求めるが、エーミールは「学問の門を軍靴で閉じれば、こちらの目も曇ります」と反論する。',effects:makeEffects({win:{diplomacy:4,prestige:4,influence:{altrantRuthenia:20}},loss:{diplomacy:-6,prestige:-3,tension:{altrantRuthenia:2},influence:{altrantRuthenia:-25}},ignored:{tension:{altrantRuthenia:1},influence:{altrantRuthenia:-20}},stories:['諜報網だけを摘発し、学問交流の窓口は残された。','無実の学生まで巻き込み、ルテニアとの外交問題に発展した。','測量図は東方へ流れ、国境防衛に不安が残った。']})},
{id:'elector_emil_forbidden_books',title:'禁書目録と大学封鎖',category:'宗教・大学危機',difficulty:'desperate',ignoreType:'放置不可',enemy:'リック枢機卿代理',lineName:'大学自治',enemyImg:'rickKing',initialLine:-25,intro:'リック聖王国から、シュテルンベルク大学の書物を禁書として扱うよう命令が届いた。従えば大学は屈辱を受け、拒めば聖庁との関係は破裂する。エーミールは疲れた顔で言った。「陛下。書物を守るとは、時に剣を抜くより難しいことです」',effects:makeEffects({win:{prestige:10,churchSupport:4,diplomacy:4,influence:{altrantRick:35},tension:{altrantRick:-1}},loss:{churchSupport:-8,prestige:-7,diplomacy:-5,influence:{altrantRick:-45},tension:{altrantRick:2}},ignored:{prestige:-5,citySupport:-5,map:{altrantRick:-1},tension:{altrantRick:2}},stories:['危険な文書の扱いを王国側で管理し、大学自治と信仰上の面子を両立させた。','リックは大学を疑い、王国内の聖職者にも圧力をかけた。','大学封鎖が起き、学者と学生が王宮に抗議した。リックは介入の口実を得た。']})},
{id:'elector_clarissa_loire_charity',title:'ロアール慈善使節団',category:'福祉・西方外交',difficulty:'normal',ignoreType:'くすぶる',enemy:'ロアール王妃イザベル',lineName:'慈善の主導権',enemyImg:'loireKing',initialLine:-5,intro:'ロアール王妃が、医師団と寄付金を送りたいと申し出た。しかし受け入れれば、「アルトラントは自力で民を救えない」という見方もされる。',effects:makeEffects({win:{citySupport:3,influence:{altrantLoire:15}},loss:{prestige:-3},ignored:{diplomacy:-2},stories:['協力は受け入れられたが、救済の主導権はアルトラント王の手に残った。','慈善はロアールの宣伝に利用され、王国の福祉は見劣りして見えた。','王妃の好意は無碍にされ、西方宮廷に冷淡な印象を残した。']})},
{id:'elector_clarissa_holy_spring_miracle',title:'聖泉の奇跡',category:'信仰・民衆',difficulty:'hard',ignoreType:'放置不可',enemy:'巡礼者の群れ',lineName:'熱狂の制御',enemyImg:'trickBeliever',initialLine:-15,intro:'聖泉で奇跡が起きたと噂になった。巡礼者が殺到し、商人も聖職者も群がる。クラリッサは慎重な調査を求めている。',effects:makeEffects({win:{stability:4,churchSupport:4},loss:{stability:-6},ignored:{stability:-4,churchSupport:-2},stories:['調査と誘導によって混乱は抑えられ、信仰は暴走せずに済んだ。','狂信的な熱狂が起き、聖泉都市は不安定になった。','偽預言者が台頭し、奇跡の名を使って民衆を集め始めた。']})},
{id:'elector_clarissa_spring_siege',title:'聖泉都市包囲危機',category:'宗教・主権危機',difficulty:'desperate',ignoreType:'放置不可',enemy:'リック枢機卿団',lineName:'聖泉主権',enemyImg:'rickKing',initialLine:-25,intro:'リック側が「聖泉は全信徒の財産である」と主張し、巡礼税の廃止と聖泉共同管理を要求した。拒否すれば破門騒ぎ。受け入れれば主権喪失である。',effects:makeEffects({win:{prestige:10,churchSupport:5,influence:{altrantRick:40}},loss:{prestige:-8,churchSupport:-8,influence:{altrantRick:-50}},ignored:{map:{altrantRick:-1},tension:{altrantRick:2}},stories:['アルトラント管理は守られ、聖泉は王国の秩序の中に留まった。','聖泉自治権は大きく揺らぎ、リックの影響力が巡礼都市に食い込んだ。','聖泉保護を名目に、リックは勢力圏を静かに塗り替えた。']})},
{id:'elector_rosen_seafeara_scandal',title:'セーフェアラ商人の醜聞買収',category:'宮廷・商業工作',difficulty:'normal',ignoreType:'悪化注意',enemy:'アルバロ・デ・メンドーサ',lineName:'醜聞帳簿',enemyImg:'seafearaKing',initialLine:-5,intro:'セーフェアラ商人が、宮廷貴族の恋文や借金証文を買い集めているという噂が流れた。エレオノーラは、これは単なる醜聞趣味ではなく、政治を動かすための帳簿だと見抜く。',effects:makeEffects({win:{prestige:3,nobleSupport:3,diplomacy:2},loss:{nobleSupport:-4,prestige:-2,influence:{azraqLoire:15}},ignored:{nobleSupport:-3,citySupport:-2},stories:['買収網は抑えられ、宮廷の弱みが外国商人に握られることは防がれた。','数人の貴族がセーフェアラ商館に借りを作り、王宮内の発言が鈍った。','醜聞は商館の金庫へ消え、誰が誰に操られているか分からなくなった。']})},
{id:'elector_rosen_loire_masked_ball',title:'ロアール宮廷使節の仮面舞踏会',category:'宮廷・西方外交',difficulty:'hard',ignoreType:'放置不可',enemy:'ロアール宮廷使節',lineName:'舞踏外交',enemyImg:'loireKing',initialLine:-15,intro:'ロアール宮廷から、仮面舞踏会の使節団が訪れた。音楽、衣装、詩、礼法のすべてが洗練され、アルトラント宮廷を圧倒しようとしている。コンラートは笑って言う。「陛下、これは戦です。ただし剣を抜かぬ戦です」',effects:makeEffects({win:{prestige:8,nobleSupport:4,influence:{altrantLoire:25},tension:{altrantLoire:-1}},loss:{prestige:-7,nobleSupport:-4,influence:{altrantLoire:-30},tension:{altrantLoire:1}},ignored:{prestige:-4,influence:{altrantLoire:-15}},stories:['華やかな場で主導権を奪い返し、ロアールに文化的従属ではなく対等な敬意を示させた。','ロアール使節は宮廷を魅了し、若い貴族たちは西方へ心を寄せた。','舞踏会はロアールの独壇場となり、アルトラントの威信は薄れた。']})},
{id:'elector_rosen_bribery_web',title:'薔薇宮廷の買収網',category:'宮廷・内通危機',difficulty:'desperate',ignoreType:'放置不可',enemy:'外国派の宮廷人',lineName:'宮廷主導権',enemyImg:'elector4',initialLine:-25,intro:'ローゼンフェルト宮の女官、楽師、仕立屋、借金を抱えた若貴族たちが、ロアールとセーフェアラの金でつながっていた。狙いは王を倒すことではない。王が何を決めても、宮廷の空気が先にそれを潰すようにすることだった。',effects:makeEffects({win:{prestige:10,nobleSupport:6,diplomacy:4,influence:{altrantLoire:40}},loss:{prestige:-9,nobleSupport:-8,diplomacy:-4,influence:{altrantLoire:-45},tension:{altrantLoire:2}},ignored:{nobleSupport:-6,map:{altrantLoire:-1},tension:{altrantLoire:2}},stories:['エレオノーラと協力して買収網を断ち、宮廷の主導権は王側へ戻った。','宮廷世論は外国の金と噂に操られ、王の婚姻・外交・改革に常に影が差した。','ローゼンフェルト宮は表向き忠誠を誓いながら、実質的に外国派閥の温床となった。']})},
{id:'elector_gerhard_solia_merc_unpaid',title:'ソリア傭兵の未払い',category:'軍事・傭兵',difficulty:'normal',ignoreType:'悪化注意',enemy:'ソリア傭兵隊長',lineName:'契約維持',enemyImg:'soliaSoldier',initialLine:-5,intro:'雇い入れたソリア傭兵隊が、給与の遅配に怒って野営地を封鎖した。隊長は契約書を掲げ、「金が出ぬなら、われらは別の雇い主へ行く」と告げる。ゲルハルトは歯を食いしばり、王都からの返答を待っている。',effects:makeEffects({win:{troops:140,diplomacy:2,treasury:-3,influence:{altrantSolia:10}},loss:{troops:-120,diplomacy:-3,influence:{altrantSolia:-15}},ignored:{troops:-180,tension:{altrantSolia:1}},stories:['未払いは整理され、傭兵契約は維持された。ソリアとの軍事的信用も保たれた。','傭兵の一部が離脱し、ソリア側に王国の支払い能力を疑われた。','傭兵隊は去り、国境の兵力が薄くなった。']})},
{id:'elector_gerhard_independent_sortie',title:'辺境伯の独断出兵',category:'軍事・王権',difficulty:'hard',ignoreType:'放置不可',enemy:'ゲルハルト・フォン・アイゼンヴァルト',lineName:'軍権統制',enemyImg:'elector5',initialLine:-15,intro:'ゲルハルトが王命を待たず、辺境兵を動かした。理由は「敵が来る前に村を避難させるため」だという。だが選帝侯が独断で軍を動かす前例は、王権にとって危険だった。',effects:makeEffects({win:{prestige:6,nobleSupport:3,troops:100},loss:{prestige:-6,nobleSupport:-5,stability:-3},ignored:{prestige:-4,nobleSupport:-4,influence:{altrantRuthenia:-15}},stories:['出兵の必要性は認められたが、軍権は王命の枠内へ戻された。ゲルハルトも王の判断を受け入れた。','ゲルハルトは王都の遅さに失望し、辺境では王より辺境伯の命令が優先され始めた。','軍事指揮系統は二重化し、選帝侯の独自軍事行動が常態化した。']})},
{id:'elector_gerhard_ironwood_mobilization',title:'鉄森国境の総動員',category:'東方危機・軍事',difficulty:'desperate',ignoreType:'放置不可',enemy:'ルテニア近衛軍',lineName:'総動員',enemyImg:'rutheniaSoldier',initialLine:-25,intro:'ルテニア近衛軍が国境近くで大演習を始めた。兵の数は演習にしては多く、補給路も本気で組まれている。ゲルハルトは王に最後の確認を求めた。「陛下。ここで引けば、東の村は紫の旗を見ることになります」',effects:makeEffects({win:{prestige:11,troops:180,nobleSupport:4,influence:{altrantRuthenia:50},tension:{altrantRuthenia:-2}},loss:{prestige:-9,troops:-220,stability:-5,influence:{altrantRuthenia:-60},tension:{altrantRuthenia:2}},ignored:{troops:-150,map:{altrantRuthenia:-1},tension:{altrantRuthenia:2}},stories:['総動員は秩序立って進み、ルテニア軍は国境を越えずに退いた。ゲルハルトは、王が戦場の現実を理解したと認めた。','動員は混乱し、辺境の村々は避難に失敗した。ルテニアは係争地への影響力を強めた。','ルテニアは演習を既成事実化し、国境の勢力圏が不利に動いた。']})},

{id:'local_theatre_riot',title:'劇場の暴動未遂',category:'文化・世論',difficulty:'normal',ignoreType:'悪化注意',enemy:'劇場支配人',lineName:'観客の熱',enemyImg:'peasant',initialLine:-5,intro:'王都劇場で、王政を揶揄する芝居に観客が沸いた。忠誠派の若者たちが劇場へ押しかけ、上演中止を迫っている。',effects:makeEffects({win:{prestige:3,citySupport:3},loss:{prestige:-4},ignored:{citySupport:-3},stories:['芝居は禁止されず、過激な衝突だけが抑えられた。王都は息をついた。','検閲か暴力のどちらかで評判を落とし、劇場街の空気は荒れた。','王都世論は荒れ、笑い声と怒号が同じ夜に響いた。']})},
{id:'local_livestock_disease',title:'家畜病の広がり',category:'農村・福祉',difficulty:'normal',ignoreType:'悪化注意',enemy:'牧場主たち',lineName:'隔離と補償',enemyImg:'plague',initialLine:-5,intro:'北方の牧場で牛の病が広がり、乳と肉の供給が減り始めた。感染した家畜を処分すべきか、村ごとに意見が割れている。',effects:makeEffects({win:{stability:4,treasury:-2},loss:{stability:-5,treasury:-2},ignored:{citySupport:-3},stories:['補償つきで隔離と処分が進み、食糧不安は抑えられた。','村人は病を隠し、感染はさらに広がった。','食糧価格は上がり、王都の台所にも不安が届いた。']})},
{id:'local_tax_collector_missing',title:'徴税官の行方不明',category:'内政・治安',difficulty:'hard',ignoreType:'放置不可',enemy:'徴税官の部下',lineName:'徴税秩序',enemyImg:'peasant',initialLine:-15,intro:'辺境の村へ向かった徴税官が戻らない。村は「知らない」と答え、代官は見せしめを求めている。だが強硬に出れば一揆の火種になる。',effects:makeEffects({win:{treasury:3,stability:3},loss:{stability:-6,treasury:-3},ignored:{treasury:-5,stability:-4},stories:['真相を調べ、処罰と減免を使い分けた。徴税の秩序はかろうじて保たれた。','村と王国の対立は深まり、次の税はさらに重く感じられた。','徴税拒否は広がり、王国の手は村々から遠のいた。']})},
{id:'local_salt_price',title:'塩の値上がり',category:'商業・生活',difficulty:'easy',ignoreType:'くすぶる',enemy:'塩商人代表',lineName:'生活物価',enemyImg:'peasant',initialLine:0,intro:'保存食に欠かせない塩の値が上がり、冬支度をする民が不安を訴えている。商人は輸送難を理由にするが、買い占めの噂もある。',effects:makeEffects({win:{stability:3,citySupport:2},loss:{citySupport:-2},ignored:{stability:-2},stories:['在庫調査と価格調整で、冬前の混乱は抑えられた。','庶民の不満は残り、塩商人への疑いが続いた。','冬の安定は静かに下がり、人々は小さな不安を抱えたまま桶を閉じた。']})},
{id:'local_cargo_soaked',title:'船荷の水没',category:'港・外交',difficulty:'normal',ignoreType:'くすぶる',enemy:'外国船の船長',lineName:'港の信用',enemyImg:'seafearaKing',initialLine:-5,intro:'嵐で港の桟橋が壊れ、セーフェアラ船の積荷が水をかぶった。船長は王国側の管理責任を主張し、港の商人は天災だと反発している。',effects:makeEffects({win:{diplomacy:3,treasury:-1},loss:{diplomacy:-4,treasury:-2},ignored:{citySupport:-2,diplomacy:-2},stories:['賠償と修繕は最小限にまとまり、港の信用は守られた。','商業連盟との関係は悪化し、港の帳簿に不満が残った。','港の信用は落ち、船長たちは別の港を噂し始めた。']})},
{id:'local_pilgrim_inn_beds',title:'巡礼宿の寝台争い',category:'巡礼・福祉',difficulty:'easy',ignoreType:'くすぶる',enemy:'巡礼宿の女主人',lineName:'宿の秩序',enemyImg:'trickBeliever',initialLine:0,intro:'巡礼者が増え、聖泉へ向かう宿で寝台の奪い合いが起きた。リックから来た巡礼者と地元民の間に小さな衝突が生まれている。',effects:makeEffects({win:{churchSupport:3,diplomacy:1},loss:{churchSupport:-2},ignored:{tension:{altrantRick:1}},stories:['宿と施療所の受け入れは整い、巡礼者は安心して眠れた。','巡礼者の不満は残り、小さな衝突が尾を引いた。','リック側から苦情が届き、巡礼路の空気が少し硬くなった。']})},
{id:'local_small_monastery_bell',title:'小修道院の鐘',category:'宗教・地方',difficulty:'normal',ignoreType:'悪化注意',enemy:'小修道院長',lineName:'地方聖職',enemyImg:'rickKing',initialLine:-5,intro:'地方の小修道院が、王命より聖庁の命令を優先すると宣言した。村人たちは戸惑い、代官は閉鎖を求めている。',effects:makeEffects({win:{churchSupport:3,prestige:2,influence:{altrantRick:10}},loss:{churchSupport:-4,tension:{altrantRick:1}},ignored:{influence:{altrantRick:-15}},stories:['修道院は王国秩序の中に戻され、鐘は村と王国の双方へ鳴った。','宗教権威との対立は強まり、地方の空気が冷えた。','リックの影響は地方に広がり、王命は鐘の音にかき消され始めた。']})},
{id:'local_infirmary_herb_garden',title:'施療院の薬草畑',category:'福祉・農村',difficulty:'easy',ignoreType:'くすぶる',enemy:'施療院の薬師',lineName:'薬草栽培',enemyImg:'plague',initialLine:0,intro:'施療院の薬草畑が不足し、薬師たちは山村に栽培協力を求めている。だが村人は、食用の畑を薬草に変えることを嫌がっている。',effects:makeEffects({win:{churchSupport:2,stability:2,treasury:-1},loss:{churchSupport:-2},ignored:{stability:-1},stories:['薬草栽培は奨励され、施療の備えが増えた。','薬師と村人の溝は残り、施療院には不満が残った。','次の疫病に備える力は、少し足りないままだった。']})},
{id:'local_deserter_return',title:'逃亡兵の帰郷',category:'軍事・農村',difficulty:'hard',ignoreType:'放置不可',enemy:'逃亡兵の母親',lineName:'軍紀と慈悲',enemyImg:'altrantSoldier',initialLine:-15,intro:'国境勤務から逃げた若い兵が、故郷の納屋に隠れていた。処刑すれば規律は守れる。赦せば兵たちは甘えを見る。だが母親は王の慈悲を求めている。',effects:makeEffects({win:{troops:50,stability:3,prestige:2},loss:{troops:-90,stability:-4},ignored:{troops:-120},stories:['罰と再編入を組み合わせ、軍紀と民心はかろうじて両立した。','軍も村も納得せず、逃亡兵の名は苦い例として残った。','逃亡は広がり、国境の列は目に見えて薄くなった。']})},
{id:'local_border_dual_loyalty',title:'境界村の二重忠誠',category:'国境・外交',difficulty:'hard',ignoreType:'放置不可',enemy:'境界村の村長',lineName:'村の帰属',enemyImg:'loireSoldier',initialLine:-15,intro:'ロアールとの境界村で、村人たちが両国に税を納めていることが判明した。村長は「どちらにも逆らえば焼かれる」と言う。',effects:makeEffects({win:{stability:2,influence:{altrantLoire:25}},loss:{influence:{altrantLoire:-30},tension:{altrantLoire:1}},ignored:{influence:{altrantLoire:-20}},stories:['村の保護を約束し、王国側へ引き戻した。境界の民はようやく一つの旗を見上げた。','村はロアールへ傾き、境界の線は地図より先に人の心で動いた。','勢力圏は静かに塗り替わり、村人は強い方へ従うようになった。']})}
,

{id:'crisis_leopold_mine_riot',title:'銀山労働者の暴動',category:'財政・民衆危機',difficulty:'hard',ignoreType:'放置不可',requiresFlag:'crisis_leopold_mine_riot',once:true,danger:2,enemy:'鉱夫代表',lineName:'銀山秩序',enemyImg:'peasant',initialLine:-20,intro:'落盤事故の補償が遅れ、ヴァイセンブルク銀山で鉱夫たちが坑口を占拠した。代官は兵での鎮圧を求めるが、鉱夫たちは「王は銀だけを救い、人は救わぬ」と叫んでいる。',effects:makeEffects({win:{stability:5,citySupport:4,treasury:-2},loss:{stability:-7,citySupport:-6,treasury:-4},ignored:{treasury:-5,stability:-3},stories:['補償と安全規則が定められ、銀山は再開した。レオポルトは不満げだが、王の裁定を認めざるを得なかった。','鎮圧は流血を生み、銀山地帯の民心は大きく離れた。銀は戻っても、坑道の怒りは消えない。','採掘停止が長引き、国庫収入は落ちた。坑口には、王を恨む沈黙だけが残った。']})},
{id:'crisis_leopold_port_tax_pact',title:'港湾税譲渡の密約疑惑',category:'財政・密約危機',difficulty:'desperate',ignoreType:'放置不可',requiresFlag:'crisis_leopold_port_tax_pact',once:true,danger:3,enemy:'セーフェアラ密使',lineName:'密約摘発',enemyImg:'seafearaKing',initialLine:-30,intro:'セーフェアラ商館から流出した契約草案には、港湾税の一部と銀山収益を担保にする条項があった。署名欄には白銀公の印章に似た痕跡がある。真偽を誤れば、財政も選帝侯の信頼も崩れる。',effects:makeEffects({win:{prestige:10,treasury:6,nobleSupport:4,influence:{azraqLoire:-20}},loss:{prestige:-8,nobleSupport:-7,treasury:-5,influence:{azraqLoire:35}},ignored:{map:{altrantLoire:-1},treasury:-6,nobleSupport:-5},stories:['密約の構造は暴かれ、セーフェアラの金融圧力は退けられた。レオポルトは王国財政を王のもとに戻した。','疑惑は曖昧なまま残り、外国資本は王国財政に深く食い込んだ。','港湾税の一部は事実上セーフェアラに握られ、地図にない支配が港から広がった。']})},

{id:'crisis_emil_loire_satire_play',title:'ロアール風刺劇の上演',category:'文化・世論危機',difficulty:'hard',ignoreType:'悪化注意',requiresFlag:'crisis_emil_loire_satire_play',once:true,danger:2,enemy:'ロアール劇団',lineName:'世論反転',enemyImg:'loireKing',initialLine:-20,intro:'ロアールから来た劇団が、若き王を笑い者にする芝居を王都近くで上演しようとしている。禁じれば小心者と笑われ、許せば王の威信が舞台の上で切り刻まれる。',effects:makeEffects({win:{prestige:7,citySupport:3,influence:{altrantLoire:20}},loss:{prestige:-7,nobleSupport:-4,influence:{altrantLoire:-25}},ignored:{prestige:-4,influence:{altrantLoire:-15}},stories:['上演は政治討論の場へ転じ、王を嘲る芝居は逆に王権の宣伝となった。','芝居は大成功し、若い貴族たちは王を陰で笑うようになった。','ロアール宮廷文化は王国世論を侵食し、笑いは静かな従属の形を取り始めた。']})},
{id:'crisis_emil_holy_inquiry',title:'聖庁特使の査問会',category:'宗教・大学危機',difficulty:'desperate',ignoreType:'放置不可',requiresFlag:'crisis_emil_holy_inquiry',once:true,danger:3,enemy:'リック枢機卿代理',lineName:'査問調停',enemyImg:'rickKing',initialLine:-30,intro:'リック聖王国の特使が、大学の講義録と印刷物を査問すると宣言した。大学は閉門を叫び、聖職者は従順を求める。アルブレヒトは、学問の自由と信仰の正統性を同じ卓で守らねばならない。',effects:makeEffects({win:{prestige:10,churchSupport:5,diplomacy:4,influence:{altrantRick:35}},loss:{prestige:-8,churchSupport:-8,diplomacy:-5,tension:{altrantRick:2}},ignored:{map:{altrantRick:-1},prestige:-5,citySupport:-5},stories:['査問権は王国側の共同調査に置き換えられ、大学も聖庁も完全な敗者にはならなかった。','リックは王国の信仰を疑い、大学は王を裏切り者と見た。','大学封鎖と聖庁介入が同時に進み、学問の鐘は重く沈んだ。']})},

{id:'crisis_clarissa_refugee_quarter',title:'難民居住区問題',category:'民衆・難民危機',difficulty:'hard',ignoreType:'放置不可',requiresFlag:'crisis_clarissa_refugee_quarter',once:true,danger:2,enemy:'都市住民代表',lineName:'居住区秩序',enemyImg:'peasant',initialLine:-20,intro:'受け入れたアズラク難民の居住区で、火事と乱闘が起きた。都市住民は追放を求め、クラリッサは保護を訴える。南方の戦乱は、王都の路地裏にまで届いていた。',effects:makeEffects({win:{stability:5,citySupport:3,diplomacy:3},loss:{stability:-8,citySupport:-5,churchSupport:-3},ignored:{stability:-5,tension:{azraqRick:1}},stories:['居住区は整備され、難民は労働力と交易の橋へ変わり始めた。','暴動は広がり、宗教対立と治安悪化が同時に起きた。','難民は地下社会へ流れ、都市不安は慢性化した。']})},
{id:'crisis_clarissa_false_prophet',title:'預言者の反乱',category:'宗教・民衆危機',difficulty:'desperate',ignoreType:'放置不可',requiresFlag:'crisis_clarissa_false_prophet',once:true,danger:3,enemy:'偽預言者',lineName:'熱狂鎮静',enemyImg:'trickBeliever',initialLine:-30,intro:'聖泉の奇跡を名乗る男が、巡礼者と貧民を集めて「王も教会も腐った」と叫び始めた。民衆は救いを求め、兵は鎮圧を求め、クラリッサは流血を恐れている。',effects:makeEffects({win:{stability:8,churchSupport:5,citySupport:4},loss:{stability:-10,churchSupport:-7,prestige:-5},ignored:{map:{altrantRick:-1},tension:{altrantRick:2},stability:-6},stories:['偽預言者の嘘は暴かれ、民衆の不満は救済政策へ吸収された。','反乱は鎮圧されたが、聖泉都市に血が流れた。','宗教的熱狂は広がり、リックは介入の口実を得た。']})},

{id:'crisis_rosen_marriage_sabotage',title:'婚姻破談工作',category:'婚姻・宮廷危機',difficulty:'hard',ignoreType:'悪化注意',requiresFlag:'crisis_rosen_marriage_sabotage',once:true,danger:2,enemy:'外国使節と宮廷婦人派閥',lineName:'噂封じ',enemyImg:'elector4',initialLine:-20,intro:'王妃候補の評判を落とす文書が、今度は王都中に広がった。噂の出所は一つではない。ロアールの詩人、セーフェアラ商人、王国内の貴族婦人たちが、それぞれ別の理由で婚姻を壊そうとしている。',effects:makeEffects({win:{prestige:6,diplomacy:4,nobleSupport:2},loss:{prestige:-6,diplomacy:-5},ignored:{nobleSupport:-3},stories:['噂の流れは断たれ、婚姻外交の主導権は王宮へ戻った。','婚姻候補の一人は深く傷つき、縁談の空気は悪化した。','以後の婚姻案件には、見えない疑念がつきまとうようになった。']})},
{id:'crisis_rosen_court_refusal',title:'宮廷派閥の王命拒否',category:'宮廷・王権危機',difficulty:'desperate',ignoreType:'放置不可',requiresFlag:'crisis_rosen_court_refusal',once:true,danger:3,enemy:'ロアール宮廷派',lineName:'王命貫徹',enemyImg:'elector4',initialLine:-30,intro:'王の命令が、宮廷の各所で遅れ、曲げられ、無視され始めた。表向き反乱ではない。だが、誰も逆らわずに王命だけが空洞化している。エレオノーラは静かに言う。「これは剣を抜かぬ反逆です」',effects:makeEffects({win:{prestige:11,nobleSupport:6,diplomacy:3,influence:{altrantLoire:35}},loss:{prestige:-10,nobleSupport:-8,diplomacy:-5,influence:{altrantLoire:-45}},ignored:{map:{altrantLoire:-1},nobleSupport:-6,prestige:-5},stories:['派閥の中心は切り崩され、王命の通る宮廷が取り戻された。','宮廷世論は外国派と貴族派に握られ、王の政策は常に妨害された。','ローゼンフェルト宮は半独立的な政治空間となった。']})},

{id:'crisis_gerhard_solia_enemy_contract',title:'ソリア傭兵の敵方契約',category:'軍事・傭兵危機',difficulty:'hard',ignoreType:'放置不可',requiresFlag:'crisis_gerhard_solia_enemy_contract',once:true,danger:2,enemy:'ソリア傭兵隊長',lineName:'再契約',enemyImg:'soliaSoldier',initialLine:-20,intro:'未払いに怒ったソリア傭兵隊が、ルテニア側から新たな契約を提示された。彼らはまだ剣を抜いていないが、契約書の上ではすでに敵になりかけている。',effects:makeEffects({win:{troops:180,diplomacy:3,treasury:-4,influence:{altrantSolia:20}},loss:{troops:-220,diplomacy:-5,influence:{altrantSolia:-30},tension:{altrantRuthenia:1}},ignored:{troops:-180,tension:{altrantSolia:2}},stories:['未払いは整理され、契約は再交渉された。傭兵たちは王国側へ戻った。','傭兵隊の一部は敵方へ移り、国境戦力は崩れた。','ソリアの信用は失われ、傭兵たちは次の雇い主を探し始めた。']})},
{id:'crisis_gerhard_ruthenia_occupation',title:'ルテニア軍の国境進駐',category:'国境・大国危機',difficulty:'desperate',ignoreType:'放置不可',requiresFlag:'crisis_gerhard_ruthenia_occupation',once:true,danger:3,enemy:'グリゴリー・オルロフ',lineName:'撤退交渉',enemyImg:'rutheniaSoldier',initialLine:-30,intro:'ルテニア軍は「治安維持」と称して、係争地の村に駐屯した。紫の旗はまだ王国の中心へ向いていない。だが、村人たちはすでに二つの主君の名を口にしている。',effects:makeEffects({win:{prestige:12,troops:150,influence:{altrantRuthenia:55},tension:{altrantRuthenia:-2}},loss:{prestige:-10,troops:-250,map:{altrantRuthenia:-1},tension:{altrantRuthenia:2}},ignored:{map:{altrantRuthenia:-1},troops:-180,prestige:-6},stories:['外交と軍事圧力が噛み合い、ルテニア軍は係争地から撤退した。','係争地は事実上ルテニアの影響下に置かれた。','国境線ではなく、勢力圏が静かに塗り替わった。']})},

{id:'country_loire_gift',title:'薔薇色の贈り物',category:'ロアール・贈答外交',difficulty:'easy',ignoreType:'悪化注意',enemy:'ロアール使節',lineName:'返礼の格',enemyImg:'loireKing',initialLine:0,intro:'ロアール宮廷から、絹織物、香水、細工時計が贈られてきた。表向きは友好の印だが、品の豪華さは「アルトラント宮廷は田舎者だ」と言外に語っている。',effects:makeEffects({win:{prestige:3,diplomacy:2},loss:{prestige:-3,nobleSupport:-2},ignored:{influence:{altrantLoire:-10}},stories:['王国独自の返礼が対等さを示した。','宮廷貴族たちはロアールの優雅さに圧倒された。','ロアールの優雅さだけが噂になった。']})},

{id:'country_solia_alliance_breach',title:'山岳同盟の契約破棄危機',category:'ソリア・同盟危機',difficulty:'desperate',ignoreType:'放置不可',enemy:'レナートとクラウディア',lineName:'同盟再交渉',enemyImg:'soliaKing',initialLine:-30,intro:'ソリア同盟は、傭兵契約と山岳通行の一時停止を通告してきた。理由は未払い、スタント教徒への扱い、そしてアルトラントが大国の圧力に弱すぎるという判断だった。',effects:makeEffects({win:{diplomacy:8,troops:200,influence:{altrantSolia:45},tension:{altrantSolia:-2}},loss:{diplomacy:-8,troops:-260,treasury:-4,influence:{altrantSolia:-50},tension:{altrantSolia:2}},ignored:{map:{altrantSolia:-1},troops:-220,diplomacy:-5},stories:['支払い、宗教保護、通行権を再整理し、ソリアを緩衝同盟へ引き戻した。','ソリアは契約を縮小し、傭兵と山岳路を同時に失った。','山岳路は閉じ、ソリア傭兵は他国へ流れた。']})},
{id:'country_azraq_copper_caravan',title:'赤銅の隊商',category:'アズラク・交易',difficulty:'easy',ignoreType:'悪化注意',enemy:'アズラク隊商長',lineName:'隊商受入',enemyImg:'azraqKing',initialLine:0,intro:'南方から赤銅色の駱駝飾りをつけた隊商が到着した。香辛料、染料、天文学書、青い陶器が並び、市場はざわめく。',effects:makeEffects({win:{treasury:4,citySupport:2,diplomacy:1},loss:{treasury:-2,citySupport:-2},ignored:{treasury:-2,influence:{azraqLoire:10}},stories:['隊商を受け入れ、市場に新しい富と知識を入れた。','南方交易への不信が残った。','隊商はセーフェアラ港へ流れた。']})},
{id:'country_azraq_prayer_time',title:'リャム教徒商人の礼拝時間',category:'アズラク・宗教交易',difficulty:'normal',ignoreType:'悪化注意',enemy:'リャム教徒商人代表',lineName:'礼拝管理',enemyImg:'azraqKing',initialLine:-5,intro:'アズラク商人たちが、港の倉庫街に小さな礼拝場所と礼拝時間の保障を求めた。トリック司祭は反発し、商人組合は港の利益を訴える。',effects:makeEffects({win:{treasury:3,diplomacy:2,citySupport:2,churchSupport:-1},loss:{treasury:-3,diplomacy:-3,churchSupport:-3},ignored:{stability:-3,tension:{azraqRick:1}},stories:['礼拝は王国法の管理下で認められ、交易と秩序は両立した。','宗教的反発が強まり、商人が港を避け始めた。','無許可礼拝と反発が同時に広がった。']})},
{id:'country_azraq_prisoner_exchange',title:'聖地捕虜の交換交渉',category:'聖地・仲裁外交',difficulty:'normal',ignoreType:'悪化注意',enemy:'カラ・ムスタファ・アガ',lineName:'捕虜交換',enemyImg:'azraqKing',initialLine:-5,intro:'リックとアズラクが奪い合う聖地で、双方の捕虜が増えている。アズラク側はアルトラントを仲裁役に選び、リック側は不快感を隠さない。',effects:makeEffects({win:{diplomacy:5,prestige:3,tension:{azraqRick:-1}},loss:{diplomacy:-4,tension:{azraqRick:1},churchSupport:-2},ignored:{tension:{azraqRick:1}},stories:['捕虜交換が成立し、聖地戦線の緊張は一時的に下がった。','交渉は決裂し、双方がアルトラントを疑った。','聖地戦線の憎悪が増した。']})},
{id:'country_azraq_zahra_festival',title:'ザフラ皇妹の祝祭招待',category:'アズラク・異文化外交',difficulty:'hard',ignoreType:'悪化注意',enemy:'ザフラ・ハトゥン',lineName:'祝祭作法',enemyImg:'azraqKing',initialLine:-15,intro:'アズラク皇妹ザフラが、砂漠部族の祝祭へアルトラント使節を招いた。舞、詩、馬上競技、部族長たちの誓い。礼を誤れば部族全体への侮辱になる。',effects:makeEffects({win:{diplomacy:6,prestige:4,treasury:2},loss:{diplomacy:-5,prestige:-4},ignored:{diplomacy:-3,influence:{azraqLoire:10}},stories:['祝祭の作法を尊重し、部族長たちとの細い信頼を結んだ。','無作法が笑い者になり、南方で名が軽く扱われた。','ザフラの好意は失われた。']})},
{id:'country_azraq_water_fort',title:'水源砦の共同通行権',category:'アズラク・聖地補給',difficulty:'hard',ignoreType:'悪化注意',enemy:'イブラヒム・パシャ・アル＝ザリーフ',lineName:'水源協定',enemyImg:'azraqKing',initialLine:-15,intro:'聖地へ向かう隊商路上の水源砦をめぐり、アズラクは共同通行権の承認を求めてきた。リックは当然反発する。',effects:makeEffects({win:{diplomacy:5,treasury:3,tension:{azraqRick:-1},influence:{azraqRick:20}},loss:{diplomacy:-4,tension:{azraqRick:2},influence:{azraqRick:25},churchSupport:-3},ignored:{tension:{azraqRick:1},treasury:-2},stories:['民間通行を認めつつ、軍事利用を制限する妥協を作った。','アズラクは補給路を力で確保しようとし、リックとの緊張が上がった。','水源砦をめぐる小競り合いが続いた。']})},
{id:'country_azraq_safar_truce',title:'サファル皇帝の聖地停戦案',category:'アズラク・聖地停戦',difficulty:'desperate',ignoreType:'放置不可',enemy:'サファル・アル＝ハーディル',lineName:'停戦仲介',enemyImg:'azraqKing',initialLine:-30,intro:'アズラク皇帝サファルは、リックと奪い合う聖地について一季限りの停戦案を示した。どちらも完全な譲歩はできない。アルトラントは、火種の中央へ招かれた。',effects:makeEffects({win:{prestige:12,diplomacy:7,tension:{azraqRick:-2},influence:{azraqRick:30},churchSupport:2},loss:{prestige:-9,diplomacy:-7,tension:{azraqRick:2},churchSupport:-4},ignored:{tension:{azraqRick:2},map:{azraqRick:-1},stability:-4},stories:['巡礼期間限定の停戦と保護区を成立させ、双方に面子を残した。','停戦案は崩れ、両国は互いの不誠実を非難した。','聖地戦線は激化し、難民と不信が広がった。']})},
{id:'country_seafeara_trading_house',title:'港湾商館の開設願い',category:'セーフェアラ・商館',difficulty:'easy',ignoreType:'悪化注意',enemy:'セーフェアラ商館代理人',lineName:'商館条件',enemyImg:'seafearaKing',initialLine:0,intro:'セーフェアラ商業連盟が、王国港に常設商館を置きたいと願い出た。港の商人は利益を期待し、貴族たちは外国の足場を警戒している。',effects:makeEffects({win:{treasury:4,citySupport:3,diplomacy:1},loss:{treasury:2,citySupport:-2,influence:{azraqLoire:10}},ignored:{treasury:-2,diplomacy:-1},stories:['商館は認められたが、港湾法と王国税の下に置かれた。','商館側に有利な条件を許し、港の主導権が曖昧になった。','交易機会を逃した。']})},
{id:'country_seafeara_exchange_rate',title:'為替相場の揺さぶり',category:'セーフェアラ・金融',difficulty:'normal',ignoreType:'悪化注意',enemy:'アルバロ・デ・メンドーサ',lineName:'為替信用',enemyImg:'seafearaKing',initialLine:-5,intro:'王国銀貨の為替相場が、セーフェアラ商館の帳簿を境に急に揺れ始めた。アルバロは「市場の判断です」と微笑む。',effects:makeEffects({win:{treasury:5,prestige:3,influence:{azraqLoire:-10}},loss:{treasury:-4,prestige:-3,influence:{azraqLoire:20}},ignored:{treasury:-3,citySupport:-2},stories:['為替操作の構造を見抜き、銀貨の信用を守った。','王国銀貨は安く見積もられ、交易で不利になった。','商人たちはセーフェアラの決済貨幣へ流れた。']})},
{id:'country_seafeara_smuggling_fleet',title:'密輸船団の夜明け',category:'セーフェアラ・密輸',difficulty:'normal',ignoreType:'悪化注意',enemy:'セーフェアラ船長',lineName:'密輸摘発',enemyImg:'seafearaKing',initialLine:-5,intro:'夜明け前、港の沖合に灯りを消した小船団が見つかった。積荷は香辛料だけではなく、火器部品も混じっているらしい。',effects:makeEffects({win:{treasury:4,prestige:2,citySupport:2},loss:{treasury:-3,prestige:-2,influence:{azraqLoire:15}},ignored:{treasury:-4,stability:-2},stories:['密輸を摘発しつつ、合法交易の道は残した。','証拠は海へ捨てられ、商館は取り締まりを笑った。','港では税を払う者が愚かだという空気が広がった。']})},
{id:'country_seafeara_debt_ledger',title:'貴族借金帳簿の流出',category:'セーフェアラ・政争金融',difficulty:'hard',ignoreType:'悪化注意',enemy:'借金を抱えた貴族',lineName:'帳簿管理',enemyImg:'seafearaKing',initialLine:-15,intro:'セーフェアラ銀行家が握る貴族たちの借金帳簿が、一部だけ王都に流出した。公開すれば政争、隠せば脅迫の材料になる。',effects:makeEffects({win:{prestige:6,nobleSupport:3,treasury:-2},loss:{nobleSupport:-7,prestige:-5,influence:{azraqLoire:25}},ignored:{nobleSupport:-5,diplomacy:-2},stories:['帳簿を王国管理下に置き、外国金融による貴族操作を防いだ。','借金貴族たちはセーフェアラに逆らえなくなった。','宮廷の発言は、誰の金で動いているか分からなくなった。']})},
{id:'country_seafeara_insurance_refusal',title:'海上保険の支払い拒否',category:'セーフェアラ・港湾信用',difficulty:'hard',ignoreType:'悪化注意',enemy:'セーフェアラ保険組合',lineName:'保険交渉',enemyImg:'seafearaKing',initialLine:-15,intro:'嵐で沈んだ王国商船について、セーフェアラ保険組合が支払いを拒んだ。理由は「航路申告の不備」。保険なしでは遠洋交易に出られない。',effects:makeEffects({win:{treasury:5,citySupport:4,diplomacy:2},loss:{treasury:-5,citySupport:-4,diplomacy:-3},ignored:{treasury:-4,influence:{azraqLoire:15}},stories:['契約の抜け穴を突き、支払いと新規条件を引き出した。','王国商人は高い保険料を飲まされた。','王国港の遠洋交易は縮小した。']})},
{id:'country_seafeara_trade_sanction',title:'終身総督の交易制裁',category:'セーフェアラ・金融封鎖',difficulty:'desperate',ignoreType:'放置不可',enemy:'マルチェロ・ヴァン・オルセオ',lineName:'制裁撤回',enemyImg:'seafearaKing',initialLine:-30,intro:'セーフェアラ終身総督マルチェロは、王国港への信用状発行を停止すると通告した。砲声はない。だが商船は来ず、銀は動かず、港は静まっていく。',effects:makeEffects({win:{prestige:10,treasury:10,diplomacy:5,influence:{azraqLoire:-30},tension:{azraqLoire:-1}},loss:{treasury:-10,citySupport:-8,diplomacy:-6,influence:{azraqLoire:45},tension:{azraqLoire:2}},ignored:{map:{altrantLoire:-1},treasury:-8,citySupport:-6},stories:['港湾税、銀貨決済、商館権限を再交渉し、制裁を撤回させた。','港は金融網から外され、商人たちは他国港へ逃げた。','交易制裁が既成事実化し、港湾勢力圏が不利に動いた。']})},
{id:'country_treuval_guest_law',title:'客人の掟',category:'トレウヴァル・文化理解',difficulty:'easy',ignoreType:'悪化注意',enemy:'遭難したトレウヴァル戦士',lineName:'客人保護',enemyImg:'treuvalSoldier',initialLine:0,intro:'吹雪の夜、国境村に傷ついたトレウヴァル戦士が担ぎ込まれた。村人は襲撃者の仲間ではないかと怯え、兵は捕虜として縛るべきだと言う。',effects:makeEffects({win:{prestige:2,stability:2,influence:{altrantTreuval:15}},loss:{influence:{altrantTreuval:-15},tension:{altrantTreuval:1}},ignored:{tension:{altrantTreuval:1}},stories:['客人として治療し、身柄を丁重に返した。','扱いが粗雑だと受け取られ、氏族の不満が残った。','王国は客人を見捨てる地だと語られた。']})},
{id:'country_treuval_stolen_horn',title:'奪われた角杯',category:'トレウヴァル・名誉',difficulty:'normal',ignoreType:'悪化注意',enemy:'ダグダン・マク・ロクラン',lineName:'角杯返還',enemyImg:'treuvalKing',initialLine:-5,intro:'トレウヴァルの有力族長ダグダンが、氏族の角杯を盗まれたと怒鳴り込んできた。杯はただの酒器ではなく、誓約の証だという。',effects:makeEffects({win:{prestige:3,diplomacy:2,influence:{altrantTreuval:20}},loss:{prestige:-3,tension:{altrantTreuval:1},influence:{altrantTreuval:-20}},ignored:{tension:{altrantTreuval:1},influence:{altrantTreuval:-15}},stories:['角杯を探し出し、王国の裁きで返還した。','杯の行方は曖昧なまま、氏族は侮辱されたと感じた。','若者たちが報復を叫び始めた。']})},
{id:'country_treuval_winter_fleet',title:'冬越えの船団',category:'トレウヴァル・港',difficulty:'normal',ignoreType:'悪化注意',enemy:'フィンガル・マク・ローワン',lineName:'港の秩序',enemyImg:'treuvalKing',initialLine:-5,intro:'北方海が荒れ、トレウヴァルの小船団がアルトラントの港へ避難してきた。港の商人は粗野な船乗りを嫌がるが、老詩人フィンガルは静かに警告する。',effects:makeEffects({win:{treasury:2,citySupport:2,influence:{altrantTreuval:20}},loss:{citySupport:-3,tension:{altrantTreuval:1}},ignored:{influence:{altrantTreuval:-15},prestige:-2},stories:['避難を認め、港の規律も守った。','港で小競り合いが起こった。','トレウヴァルの歌に王国の冷たさが残った。']})},
{id:'country_treuval_war_princess_trial',title:'戦姫の試し合い',category:'トレウヴァル・武勇',difficulty:'hard',ignoreType:'悪化注意',enemy:'ブリギッド・オ・ルーア',lineName:'試し合い',enemyImg:'treuvalSoldier',initialLine:-15,intro:'赤毛の女戦士ブリギッドが、王国軍との試し合いを求めてきた。同盟とは言葉ではなく、背中を預けられるかどうかだ。',effects:makeEffects({win:{prestige:6,troops:100,influence:{altrantTreuval:30},tension:{altrantTreuval:-1}},loss:{prestige:-5,troops:-80,influence:{altrantTreuval:-25}},ignored:{prestige:-3,tension:{altrantTreuval:1}},stories:['王国軍の規律と勇気が示され、ブリギッドの敬意を得た。','試し合いは荒れ、王国軍は笑われた。','ブリギッドは王国を臆病と見なした。']})},
{id:'country_treuval_black_wolf_raid',title:'黒狼コルムの襲撃',category:'トレウヴァル・国境襲撃',difficulty:'hard',ignoreType:'放置不可',enemy:'コルム・黒狼',lineName:'襲撃制止',enemyImg:'treuvalSoldier',initialLine:-15,intro:'若き狂戦士コルムが、狼皮をかぶった若者たちを率いて国境村を襲った。ブラン王は公式には関与を否定するが、完全に止められてもいない。',effects:makeEffects({win:{stability:4,troops:80,influence:{altrantTreuval:25},tension:{altrantTreuval:-1}},loss:{stability:-6,troops:-100,tension:{altrantTreuval:2},influence:{altrantTreuval:-30}},ignored:{map:{altrantTreuval:-1},stability:-4,tension:{altrantTreuval:2}},stories:['襲撃を止め、ブラン王に氏族内の統制を求めた。','村は被害を受け、辺境民は守りを疑った。','コルムの名は若者たちの英雄になった。']})},
{id:'country_treuval_great_council',title:'鉄灰王の大評議会',category:'トレウヴァル・氏族危機',difficulty:'desperate',ignoreType:'放置不可',enemy:'ブラン・マク・エイディン',lineName:'氏族評議',enemyImg:'treuvalKing',initialLine:-30,intro:'トレウヴァル各氏族が、鉄灰王ブランの大広間に集まった。アルトラントの使者は、同盟者として迎えられるか、獲物として見られるかの境に立たされた。',effects:makeEffects({win:{prestige:12,troops:180,influence:{altrantTreuval:55},tension:{altrantTreuval:-2}},loss:{prestige:-9,troops:-180,influence:{altrantTreuval:-55},tension:{altrantTreuval:2}},ignored:{map:{altrantTreuval:-1},tension:{altrantTreuval:2},stability:-5},stories:['客人の掟、国境の現実、誓約の重さを示し、氏族連合を荒々しい同盟者へ向けた。','評議会は王国を弱い獲物と見なし、襲撃の声が強まった。','トレウヴァルは王国抜きで方針を決めた。']})},

{id:"infra_stone_bridge",title:"王立街道の石橋",category:"建築・街道整備",difficulty:"normal",ignoreType:'悪化注意',once:true,danger:1,enemy:"街道監督官",lineName:"石橋建設",enemyImg:'peasant',initialLine:-10,intro:"大河にかかる古い木橋が限界を迎え、商人も軍も足止めされている。石橋を架ければ国は便利になるが、費用も人手も大きい。",effects:makeEffects({win:{"treasury":4,"troops":60,"stability":2},loss:{"treasury":-4},ignored:{"treasury":-2},stories:["王立街道に石橋が架かり、交易と軍の移動は安定した。","工期は延び、国庫だけが大きく削られた。","古い木橋は限界のまま残り、街道案件に不安が続いた。"]})},
{id:"infra_royal_library",title:"星文伯の王立図書館",category:"建築・学問制度",difficulty:"hard",ignoreType:'悪化注意',once:true,danger:2,enemy:"エーミール・フォン・シュテルンベルク",lineName:"図書館建設",enemyImg:"elector2",initialLine:-18,intro:"エーミールが王立図書館の建設を提案した。知識を集めれば官僚と法学者は育つが、検閲や禁書問題も王宮へ集まる。",effects:makeEffects({win:{"prestige":6,"stability":4},loss:{"churchSupport":-4,"prestige":-3},ignored:{"nobleSupport":-2},stories:["王立図書館は完成し、学問と官僚制は王宮のもとで強化された。","禁書騒ぎが起こり、宗教対立まで王宮に持ち込まれた。","大学都市が知の主導権を握り続け、王宮の改革は遅れた。"]})},
{id:"infra_infirmary_wing",title:"聖泉施療院の新棟",category:"建築・福祉制度",difficulty:"normal",ignoreType:'悪化注意',once:true,danger:1,enemy:"クラリッサ・フォン・ハイリヒブルン",lineName:"新棟建設",enemyImg:'plague',initialLine:-12,intro:"巡礼者と貧民が増え、聖泉施療院は廊下まで患者で埋まった。クラリッサは新棟建設を求めるが、財務官は恒常支出を恐れる。",effects:makeEffects({win:{"citySupport":5,"churchSupport":4,"treasury":-3},loss:{"treasury":-5},ignored:{"stability":-2},stories:["聖泉施療院の新棟は完成し、疫病と民衆救済への備えが強まった。","建設費は膨らみ、施療院は救いと負担の象徴になった。","患者は廊下にあふれ、次の疫病への不安が残った。"]})},
{id:"infra_star_fort",title:"鉄森国境の星形要塞",category:"建築・軍事制度",difficulty:"desperate",ignoreType:'悪化注意',once:true,danger:3,enemy:"ゲルハルト・フォン・アイゼンヴァルト",lineName:"要塞建設",enemyImg:'rutheniaSoldier',initialLine:-30,intro:"ゲルハルトは、東方国境に新式の星形要塞を築くべきだと主張した。完成すればルテニアへの抑止力になるが、建設中は国庫も兵も縛られる。",effects:makeEffects({win:{"troops":220,"influence":{"altrantRuthenia":45}},loss:{"treasury":-8,"troops":-100},ignored:{"tension":{"altrantRuthenia":1}},stories:["鉄森国境の星形要塞は完成し、東方国境の勢力圏を押し返した。","未完成要塞は財政の傷となり、兵站にも重くのしかかった。","ルテニア演習への備えは遅れ、東方の緊張は増した。"]})},
{id:"infra_rose_theatre",title:"薔薇宮の新劇場",category:"建築・宮廷文化",difficulty:"hard",ignoreType:'悪化注意',once:true,danger:2,enemy:"コンラートとエレオノーラ",lineName:"劇場建設",enemyImg:'peasant',initialLine:-18,intro:"コンラート夫妻は、ロアールに対抗できる王立劇場の建設を提案した。華やかな事業だが、民衆は「飢えより芝居か」と冷ややかだ。",effects:makeEffects({win:{"prestige":7,"nobleSupport":4,"influence":{"altrantLoire":20}},loss:{"citySupport":-5,"prestige":-4},ignored:{"influence":{"altrantLoire":-15}},stories:["薔薇宮の新劇場は完成し、宮廷文化と威信は大きく高まった。","贅沢批判が広がり、民衆の目には王宮が遠く見えた。","ロアール文化の影響は強まり、王都の趣味は西へ傾いた。"]})},
{id:"infra_drydock",title:"港の乾ドック",category:"建築・港湾制度",difficulty:"hard",ignoreType:'悪化注意',once:true,danger:2,enemy:"港湾商人たち",lineName:"乾ドック建設",enemyImg:'seafearaKing',initialLine:-18,intro:"港湾商人たちが、大型船を修理できる乾ドック建設を求めている。造ればセーフェアラ依存を減らせるが、商業連盟は快く思わない。",effects:makeEffects({win:{"treasury":6,"citySupport":4,"influence":{"azraqLoire":-20}},loss:{"treasury":-6,"nobleSupport":-3},ignored:{"treasury":-3,"influence":{"azraqLoire":15}},stories:["港の乾ドックは完成し、海運と交易の自立性は増した。","工事利権と借金が膨らみ、港湾整備は苦い噂を残した。","船の修理は外国港頼みのまま残り、商業連盟への依存が深まった。"]})},
