updateBattle(){const remain=Math.max(0,CONFIG.battleSeconds-(battle.elapsed||0));const tt=$('timerText');if(tt)tt.textContent=remain.toFixed(1);const tf=$('timeFill');if(tf)tf.style.width=`${clamp(remain/CONFIG.battleSeconds*100,0,100)}%`;const tb=$('timerBox');if(tb)tb.classList.toggle('danger',remain<=5);const bc=$('battleClock');if(bc){bc.textContent=remain.toFixed(1);bc.classList.toggle('danger',remain<=5)}const fc=$('finalCount');if(fc){const sec=Math.ceil(remain);const show=remain<=3.05&&remain>0.05;if(show&&fc.textContent!==String(sec)){fc.textContent=sec;fc.classList.remove('show');void fc.offsetWidth;fc.classList.add('show')}if(!show)fc.textContent=''}for(const l of battle.lanes){if(l.tapRespawn>0)l.tapRespawn=Math.max(0,l.tapRespawn-(1/60));const lane=$(`lane${l.id}`);if(!lane)continue;lane.classList.toggle('done',l.status==='done');lane.classList.toggle('stun',l.phase==='approach'&&(l.playerStun>0||l.enemyStun>0));const pct=clamp(l.line,-100,100);const fill=$(`fill${l.id}`);if(fill){fill.style.left=pct>=0?'50%':`${50+pct/2}%`;fill.style.width=`${Math.abs(pct)/2}%`;fill.style.background=pct>=0?'#e5c24c':'#b34236'}const lt=$(`lineText${l.id}`);if(lt)lt.textContent=`${l.line>=0?'+':''}${l.line}`;const d=Battle.distance(l);let grow=0;if(l.phase==='approach')grow=1-clamp(d/CONFIG.readyPx,0,1);if(d<0)grow=Math.max(0,1-Math.abs(d)/64);const effort=l.phase==='approach'?grow:0;const time=battle.elapsed||0;const shake=Math.sin(time*24+l.seed)*effort*3.2;const bob=Math.sin(time*18+l.seed)*effort*3.0;const lean=2+effort*8;const losing=l.phase==='recoil'&&l.lastDelta<0,winning=l.phase==='recoil'&&l.lastDelta>0;const pStun=l.phase==='approach'&&l.playerStun>0,eStun=l.phase==='approach'&&l.enemyStun>0;const pose=l.phase==='recoil'?Math.min(1,l.recoilT/l.recoilDur):0;const left=$(`left${l.id}`),right=$(`right${l.id}`);if(left){left.style.left=`${l.playerX}px`;left.classList.toggle('straining',effort>.45);left.classList.toggle('bracing',losing||pStun);left.style.transform const Flow={pendingEvent(){return DATA.events.find(e=>e.id!=='butler_report'&&e.when===State.turn&&!State.shownEvents[e.id])},chooseEvent(id,idx){const ev=DATA.events.find(e=>e.id===id),ch=ev.choices[idx];State.shownEvents[id]=true;if(ch.hidden)for(const[k,v]of Object.entries(ch.hidden))State.params[k]=(State.params[k]||0)+v;if(ch.flags)Object.assign(State,ch.flags);$('screenMain').innerHTML=`<div class="topbar"><b>${periodLabel()}</b>${paramHud()}</div><div class="modalShade"><div class="modalBox"><h2>${ev.title}</h2><div class="dialogText">${ch.result}</div><div class="choices"><button onclick="View.main()">続ける</button></div></div></div>`},revealYear(){audio();sfx('reveal');State.yearStoryRead=true;State.justRevealed=true;View.main()},toggleCase(id){audio();const wasSelected=State.selected.includes(id);let changed=false;if(wasSelected){sfx('cancel');State.selected=State.selected.filter(x=>x!==id);delete State.assignments[id];if(State.cardAssignment?.caseId===id)State.cardAssignment=null;changed=true}else{if(State.selected.length>=3){sfx('warn');View.showWarn()}else{State.selected.push(id);sfx('select');changed=true}}if(!changed)return;const canPatch=$('screenMain').classList.contains('active')&&document.querySelector('.casePanel:not(.storyMode)');if(canPatch)View.refreshMainSelection(id);else View.main()},toAssign(){if(!State.selected.length)return;State.cursor=State.selected.findIndex(id=>!State.assignments[id]);if(State.cursor<0)State.cursor=0;View.assign()},chooseLane(i){State.cursor=i;View.assign()},assignActor(id){audio();const cid=State.selected[State.cursor];if(!cid)return;const used=Object.entries(State.assignments).filter(([c])=>c!==cid).map(([,a])=>a);if(used.includes(id))return;sfx('assign');State.assignments[cid]=id;const next=State.selected.findIndex(x=>!State.assignments[x]);if(next>=0)State.cursor=next;View.assign()},assignCard(id){audio();const cid=State.selected[State.cursor];if(!cid)return;if(State.cardAssignment?.caseId===cid&&State.cardAssignme
