{id:'occult_white_stag',title:'白鹿の国境越え',category:'怪異・動物・国境',difficulty:'normal',ignoreType:'悪化注意',danger:1,enemy:'白鹿を追う猟師たち',lineName:'禁猟林調停',enemyImg:'deer',initialLine:-5,intro:'国境の森に、白い鹿が現れた。アルトラントの村人は王国の吉兆だと言い、ロアール側の猟師は「我らの森から逃げた聖獣だ」と主張する。たった一頭の鹿をめぐり、村人、司祭、貴族猟師が集まり始めている。',effects:makeEffects({win:{prestige:4,stability:3,influence:{altrantLoire:15}},loss:{stability:-4,tension:{altrantLoire:1}},ignored:{influence:{altrantLoire:-10}},stories:['鹿は殺されず、両国共同の禁猟林として扱われた。白鹿の噂は、国境の緊張を少しだけ和らげた。','鹿は争いの中で傷つき、双方が相手を責めた。吉兆は怨みに変わりかけた。','白鹿伝説だけが独り歩きし、国境村の感情は荒れた。']})},
{id:'occult_black_boar',title:'黒猪の畑荒らし',category:'怪異・動物・農村',difficulty:'easy',ignoreType:'くすぶる',danger:0,enemy:'巨大な黒猪',lineName:'狩猟隊',enemyImg:'boar',initialLine:0,intro:'巨大な黒猪が農村の畑を荒らし、冬越し用の作物を食い散らしている。村人は退治を求めるが、近隣貴族は「王家の狩猟林の獲物だ」と勝手な捕獲を禁じている。',effects:makeEffects({win:{stability:3,citySupport:2,treasury:1},loss:{stability:-3,treasury:-2},ignored:{treasury:-3},stories:['王命で狩猟隊が出され、村の作物と狩猟権の折り合いがついた。','猪退治は遅れ、農民は王も貴族も自分たちを見ていないと感じた。','畑の被害は広がり、徴税にも影響が出始めた。']})},
{id:'occult_marsh_dragon',title:'沼地の龍',category:'怪異・治水',difficulty:'hard',ignoreType:'悪化注意',danger:2,enemy:'龍を恐れる村人たち',lineName:'沼地鎮静',enemyImg:'dragon',initialLine:-15,intro:'南の沼地で「龍が出た」という噂が広がった。実際には、霧の中で家畜が消え、沼の水位が急に上がっている。村人は祈祷を求め、技師は排水工事を進言する。',effects:makeEffects({win:{stability:5,treasury:3,prestige:3},loss:{stability:-5,churchSupport:-3},ignored:{treasury:-3,stability:-4},stories:['迷信は笑われず、祈りと治水工事の両方で沼地は鎮められた。','工事は反発を招き、龍を怒らせたという噂が広がった。','沼地の村は見捨てられたと感じ、移住が始まった。']})},
{id:'occult_old_castle_ghost',title:'古城の幽霊',category:'怪異・幽霊・治安',difficulty:'normal',ignoreType:'悪化注意',danger:1,enemy:'古城の青白い光',lineName:'幽霊調査',enemyImg:'ghost',initialLine:-5,intro:'廃れた古城で夜ごと青白い光が揺れ、幽霊が出ると噂になった。近隣の村人は近づかず、城を相続した若い貴族は領地経営もできずに困り果てている。',effects:makeEffects({win:{prestige:3,stability:4,treasury:2},loss:{prestige:-2,stability:-3},ignored:{stability:-4},stories:['幽霊騒ぎの正体は暴かれた。古城は密輸と盗賊の隠れ家になっていた。','調査隊は成果を出せず、噂はさらに大きくなった。','古城周辺は治安の空白地となった。']})},
{id:'occult_dead_king_ghost',title:'故王の亡霊',category:'怪異・幽霊・王権',difficulty:'desperate',ignoreType:'放置不可',danger:3,enemy:'故王の亡霊の噂',lineName:'追悼儀礼',enemyImg:'deadKing',initialLine:-30,intro:'夜の王宮で、故王の亡霊を見たという噂が広がった。亡霊は何も語らず、ただ玉座の前に立っていたという。若き日から王権を背負ってきたアルブレヒトにとって、それは迷信では片づけられない重さを持っていた。',effects:makeEffects({win:{prestige:8,stability:6,nobleSupport:3},loss:{prestige:-7,stability:-6},ignored:{stability:-5,nobleSupport:-4},stories:['王は亡霊騒ぎを恐怖ではなく追悼儀礼へ変え、故王の名のもとに王国の結束を示した。','宮廷は、故王が現王を責めているのではないかと囁き始めた。','予言と亡霊の噂が結びつき、王権への不安は深まった。']})},
{id:'occult_witch_trial',title:'森の魔女裁判',category:'怪異・魔女・法',difficulty:'hard',ignoreType:'放置不可',danger:2,enemy:'告発された老女',lineName:'審問と法',enemyImg:'witch',initialLine:-15,intro:'疫病と不作が続く森の村で、一人の老女が魔女だと告発された。村人は処刑を求め、司祭は慎重な審問を求め、法学者は証拠なき裁きを恐れている。',effects:makeEffects({win:{stability:5,prestige:4,churchSupport:2},loss:{stability:-6,churchSupport:-4},ignored:{prestige:-5,stability:-7},stories:['村の恐怖を受け止めながら、証拠なき処刑は防がれた。疫病と不作の現実対策も始まった。','裁判は混乱し、村人は王国法を冷たいものと感じた。','私刑が起こり、宗教と法の権威は傷ついた。']})},
{id:'occult_witch_hunt',title:'森奥の魔女討伐',category:'怪異・魔女・治安',difficulty:'desperate',ignoreType:'放置不可',requiresFlag:'occult_witch_hunt_unlocked',once:true,danger:3,enemy:'森奥の魔女',lineName:'討伐隊',enemyImg:'witch',initialLine:-30,intro:'森の奥で、黒い山羊の角を飾った小屋が見つかった。村では家畜が死に、子どもが悪夢を見て、井戸の水が黒く濁ったという。老女は魔女だと名乗り、捕らえに来た兵へ笑った。「王の法は、森の根までは届かぬよ」',effects:makeEffects({win:{prestige:8,stability:6,churchSupport:4},loss:{prestige:-6,stability:-7,churchSupport:-3},ignored:{stability:-8,influence:{altrantRick:-20}},stories:['魔女の儀式は止められ、恐怖に怯えた村は王国法の下へ戻った。迷信と本当の悪事も切り分けられた。','討伐隊は森で道を失い、魔女の噂はさらに強まった。村人は王国より呪いを恐れるようになった。','森の村々で魔女信仰と私刑が広がり、王の支配は薄れた。']})},
{id:'occult_witch_pilgrimage',title:'魔女の森の巡礼',category:'怪異・魔女信仰',difficulty:'hard',ignoreType:'放置不可',requiresFlag:'occult_witch_pilgrimage_unlocked',once:true,danger:2,enemy:'森へ向かう巡礼者',lineName:'巡礼制止',enemyImg:'witch',initialLine:-20,intro:'討伐隊が戻らなかった。魔女は生きている。そんな噂が広がる中、病人、不幸な農民、子を失った母たちが森へ向かい始めた。「王も司祭も助けてくれない。魔女様なら助けてくれる」と。',effects:makeEffects({win:{stability:4,churchSupport:3},loss:{stability:-6,churchSupport:-5},ignored:{map:{altrantRick:-1}},stories:['巡礼者たちは保護され、魔女信仰の拡大はひとまず止まった。','森に新たな集落が生まれ、王国の外側に救いを求める人々が集まり始めた。','森は事実上の治外法権となり、勢力圏に影を落とした。']})},
{id:'occult_witch_hunt_chain',title:'魔女狩りの連鎖',category:'怪異・魔女・民衆不安',difficulty:'hard',ignoreType:'放置不可',requiresFlag:'occult_witch_hunt_chain_unlocked',danger:2,enemy:'告発を始めた村人たち',lineName:'私刑制止',enemyImg:'witch',initialLine:-20,intro:'魔女がいるなら、他にもいるはずだ。村人たちは次々と助産師、薬草師、隣人を告発し始めた。恐怖は、一人の魔女よりも速く村々を駆けている。',effects:makeEffects({win:{stability:5},loss:{stability:-7},ignored:{citySupport:-5},stories:['証拠なき告発は禁止され、村人たちは恐怖より法を見るよう命じられた。','私刑が発生し、王国法の届かぬ夜が村を覆った。','村同士の復讐が始まり、告発は新たな告発を生んだ。']})},
{id:'occult_witch_treasure',title:'魔女の財宝',category:'怪異・魔女・黒幕',difficulty:'normal',ignoreType:'悪化注意',requiresFlag:'occult_witch_treasure_unlocked',once:true,danger:1,enemy:'地下室の古い印章',lineName:'財宝調査',enemyImg:'witch',initialLine:-5,intro:'小屋の地下から、古金貨、銀器、貴族の印章が見つかった。どう見ても魔女が作れる量ではない。誰かが資金を流していた。',effects:makeEffects({win:{treasury:4,prestige:3},loss:{prestige:-3},ignored:{prestige:-2},stories:['財宝は記録され、黒幕の手がかりが得られた。魔女騒ぎは、単なる迷信ではない別の顔を見せ始めた。','財宝の横領疑惑が出て、討伐の正しさに曇りが生じた。','証拠は消え、森の小屋には空の地下室だけが残った。']})},
{id:'occult_witch_public_trial',title:'魔女裁判',category:'怪異・魔女・公開裁判',difficulty:'desperate',ignoreType:'放置不可',requiresFlag:'occult_witch_survives',once:true,danger:3,enemy:'捕らえられた魔女',lineName:'公開裁判',enemyImg:'witch',initialLine:-30,intro:'ついに魔女が捕らえられた。だが村人の証言は食い違う。ある者は悪魔の使いと言い、ある者は病人を救ったと言う。王は、恐怖と感謝が混じる証言の中で裁かなければならない。',effects:makeEffects({win:{prestige:8,stability:5},loss:{stability:-8},ignored:{stability:-5,prestige:-3},stories:['公開裁判で真相は明らかにされ、王国法は恐怖の中でも崩れなかった。','判決は王国を二分し、誰も完全には納得しなかった。','魔女は脱獄したという噂が広がり、森は再び沈黙した。']})},
{id:'occult_black_gathering',title:'黒い集会',category:'怪異・魔女・秘密結社',difficulty:'desperate',ignoreType:'放置不可',requiresFlag:'occult_black_gathering_unlocked',once:true,danger:3,enemy:'森の集会',lineName:'潜入調査',enemyImg:'witch',initialLine:-30,intro:'森の奥で夜ごと火が灯る。参加者は農民、商人、下級貴族、兵士にまで広がっている。彼らは王への反乱を語ってはいない。だが、王国の外に別の共同体を作り始めている。',effects:makeEffects({win:{stability:6},loss:{stability:-10},ignored:{influence:{altrantRick:-40}},stories:['集会へ潜入し、実態は把握された。恐怖と貧しさが、魔女の名の下に人を集めていた。','集会は秘密結社化し、王国の外側にもう一つの忠誠が生まれた。','勢力圏は失われ、森の中では王名より魔女の名が囁かれた。']})},
{id:'occult_forest_witch_final',title:'森の魔女',category:'怪異・魔女・終盤特殊',difficulty:'desperate',ignoreType:'放置不可',requiresFlag:'occult_forest_witch_final_unlocked',once:true,danger:4,enemy:'森の魔女',lineName:'伝説との対決',enemyImg:'witch',initialLine:-35,intro:'長年追ってきた魔女が姿を現した。老女ではない。若くもない。醜くも美しくもない。ただ異様なほど落ち着いている。そして言う。「王よ。わたしは一人も殺しておらぬ。だが、お前たちは何人殺した？」',effects:makeEffects({win:{prestige:10,stability:8,churchSupport:4},loss:{prestige:-10,stability:-10,churchSupport:-6},ignored:{stability:-8,prestige:-6},stories:['魔女の正体と影響力は断ち切られ、王国は迷信を克服する道へ踏み出した。','魔女は伝説となり、王より長く語り継がれる存在になった。','王国は問いから目を逸らし、森には答えのない沈黙が残った。']})},{id:'late_elector_leopold_tax_stop',title:'白銀公の納税停止',category:'後半危機・財政',difficulty:'hard',ignoreType:'放置不可',danger:2,enemy:'レオポルト・フォン・ヴァイセンブルク',lineName:'納税再開',enemyImg:'elector1',initialLine:-20,intro:"白銀公が「銀山維持費の増大」を理由に王国への納税を停止した。表向きは経済問題だが、実際には王権への圧力である。他の選帝侯たちも静観している。",effects:makeEffects({win:{"treasury":8,"prestige":4},loss:{"treasury":-10,"nobleSupport":-5},ignored:{"treasury":-8,"stability":-4},stories:["譲歩と改革を組み合わせ、白銀公の納税は再開された。","他領も追随を検討し始め、王国財政の根が揺らいだ。","納税停止は続き、王国財政は目に見えて悪化した。"]})},
{id:'late_elector_emil_critique',title:'星文伯の王権批判書',category:'後半危機・正統性',difficulty:'hard',ignoreType:'放置不可',danger:2,enemy:'エーミール・フォン・シュテルンベルク',lineName:'公開討論',enemyImg:'elector2',initialLine:-20,intro:"星文伯が発表した論考が大学都市で大流行している。「王は法の上に立つべきか」。名前は出していない。しかし誰もがアルブレヒトのことだと分かる。",effects:makeEffects({win:{"prestige":6,"stability":3},loss:{"prestige":-7,"citySupport":-4},ignored:{"prestige":-5},stories:["公開討論で王権の正統性が示され、批判は制度改革の議論へ移った。","知識人層は王から離れ、大学都市は冷ややかになった。","批判だけが広がり、王の沈黙は弱さと読まれた。"]})},
{id:'late_elector_clarissa_protection',title:'聖泉女侯の民衆保護宣言',category:'後半危機・民衆',difficulty:'hard',ignoreType:'放置不可',danger:2,enemy:'クラリッサ・フォン・ハイリヒブルン',lineName:'共同救済',enemyImg:'elector3',initialLine:-20,intro:"聖泉女侯が「王国が救えぬ民は私が救う」と宣言した。人気は非常に高い。だが実質的には王権への挑戦でもある。",effects:makeEffects({win:{"citySupport":8,"churchSupport":5},loss:{"citySupport":-6,"prestige":-5},ignored:{"map":{"altrantRick":-1}},stories:["救済は共同事業として取り込まれ、民衆の信頼は王国全体へ戻った。","民衆人気は女侯へ集中し、王宮の威信は薄れた。","巡礼都市は半独立化し、勢力圏にも揺らぎが出た。"]})},
{id:'late_elector_rosen_diplomacy',title:'薔薇宮廷の独自外交',category:'後半危機・宮廷外交',difficulty:'hard',ignoreType:'放置不可',danger:2,enemy:'コンラートとエレオノーラ',lineName:'外交権整理',enemyImg:'elector4',initialLine:-20,intro:"薔薇公夫妻がロアール宮廷と独自に交渉しているという噂が流れた。本人たちは「王国の利益のため」と言う。しかし外交権は本来王のものである。",effects:makeEffects({win:{"diplomacy":5,"prestige":4},loss:{"prestige":-7,"nobleSupport":-5},ignored:{"tension":{"altrantLoire":1}},stories:["独自交渉は正式な特使制度へ再編され、外交権は王のもとへ戻った。","選帝侯外交が既成事実となり、王の声は一つでなくなった。","他の選帝侯も独自外交を始め、宮廷の秩序は緩んだ。"]})},
{id:'late_elector_gerhard_command',title:'鉄森辺境伯の軍権要求',category:'後半危機・軍権',difficulty:'desperate',ignoreType:'放置不可',danger:3,enemy:'ゲルハルト・フォン・アイゼンヴァルト',lineName:'軍権調停',enemyImg:'elector5',initialLine:-30,intro:"辺境伯が「東方防衛のため王直属軍の一部指揮権を寄越せ」と要求した。彼の主張にも理はある。しかし認めれば、王軍は王軍ではなくなる。",effects:makeEffects({win:{"troops":200,"prestige":5},loss:{"troops":-250,"prestige":-8},ignored:{"tension":{"altrantRuthenia":2}},stories:["共同司令制度が作られ、東方防衛と王権はかろうじて両立した。","辺境軍は半独立化し、王都の軍令は東で鈍った。","東方防衛は機能不全となり、緊張だけが高まった。"]})},
{id:'late_elector_joint_council',title:'五選帝侯合同評議',category:'後半危機・王権総決算',difficulty:'desperate',ignoreType:'放置不可',danger:3,enemy:'五選帝侯全員',lineName:'合同評議',enemyImg:'elector4',initialLine:-30,intro:"即位から十数年。五選帝侯が合同評議を要求した。彼らは若王を試していた。今度は統治そのものを採点する番である。",effects:makeEffects({win:{"prestige":12,"nobleSupport":10,"stability":8},loss:{"prestige":-12,"nobleSupport":-10,"stability":-8},ignored:{"prestige":-10,"stability":-6},stories:["選帝侯は王国の未来に協力を誓い、王権は一段深く根を下ろした。","王権への信頼は大きく揺らぎ、評議の後には冷たい沈黙だけが残った。","評議そのものが反王権集会へ変質した。"]})},
{id:'late_religion_stunt_autonomy',title:'スタント教徒自治要求',category:'後半危機・宗教分裂',difficulty:'hard',ignoreType:'放置不可',danger:2,enemy:'スタント教徒代表',lineName:'限定自治',enemyImg:'stuntBeliever',initialLine:-20,intro:"アルトラント各地に増えたスタント教徒たちが、礼拝所の自治と独自の婚姻記録を認めるよう求めてきた。ソリア使節は穏やかに見守っているが、実質的には後ろ盾である。",effects:makeEffects({win:{"stability":5,"citySupport":3,"influence":{"altrantSolia":20},"tension":{"altrantRick":1}},loss:{"stability":-7,"churchSupport":-5,"tension":{"altrantRick":1}},ignored:{"stability":-5,"influence":{"altrantSolia":-20}},stories:["限定自治は王国法の中に組み込まれ、地下化は避けられた。","トリック側の反発とスタント側の不満が同時に高まった。","無許可自治が各地に広がった。"]})},
{id:'late_religion_trick_march',title:'トリック司祭の抗議行進',category:'後半危機・宗教分裂',difficulty:'hard',ignoreType:'放置不可',danger:2,enemy:'トリック司祭団',lineName:'宗教会議',enemyImg:'trickBeliever',initialLine:-20,intro:"トリック司祭たちが、王都大通りで抗議行進を始めた。掲げられた言葉は「王国を正しき信仰へ戻せ」。背後にはリック聖王国の影がちらついている。",effects:makeEffects({win:{"churchSupport":5,"prestige":3,"tension":{"altrantRick":-1}},loss:{"churchSupport":-8,"prestige":-5,"tension":{"altrantRick":2}},ignored:{"churchSupport":-6,"stability":-4},stories:["抗議は弾圧されず、王国宗教会議へ吸収された。","司祭団は王を信仰の敵と見なし始めた。","行進は地方都市へ広がった。"]})},
{id:'late_religion_lyam_arson',title:'リャム教徒商館焼き討ち未遂',category:'後半危機・都市宗教',difficulty:'hard',ignoreType:'放置不可',danger:2,enemy:'アズラク使節',lineName:'商館保護',enemyImg:'trickBeliever',initialLine:-20,intro:"王都のリャム教徒商館に火を放とうとした若者たちが捕らえられた。アズラク使節は厳罰を求め、トリック司祭の一部は暴徒をかばおうとしている。",effects:makeEffects({win:{"treasury":4,"diplomacy":4,"stability":3},loss:{"diplomacy":-6,"treasury":-4,"tension":{"azraqRick":1}},ignored:{"stability":-6,"influence":{"azraqLoire":25}},stories:["暴力は裁かれ、商館保護と宗教秩序は両立された。","アズラクは王国の保護能力を疑い、国内では反リャム感情が残った。","商館は自衛を始め、都市が宗派ごとに割れた。"]})},
{id:'late_religion_three_debate',title:'三宗派公開討論',category:'後半危機・宗教論争',difficulty:'desperate',ignoreType:'放置不可',danger:3,enemy:'三宗派代表',lineName:'討論秩序',enemyImg:'trickBeliever',initialLine:-30,intro:"シュテルンベルク大学で、トリック、スタント、リャム教の代表者による公開討論が開かれることになった。成功すれば王国の理性を示せる。失敗すれば、言葉が暴動の火種になる。",effects:makeEffects({win:{"prestige":10,"stability":7,"diplomacy":4},loss:{"stability":-10,"churchSupport":-6,"citySupport":-6},ignored:{"stability":-7,"tension":{"altrantRick":1,"azraqRick":1}},stories:["討論は激しくも秩序を保ち、王国は暴力だけを裁く立場を示した。","討論は罵倒に崩れ、各宗派の民衆が街頭へ流れ出した。","討論の場を失った宗派は、それぞれ自分たちの広場で叫び始めた。"]})},
{id:'late_religion_spring_divide',title:'聖泉都市の宗派分断',category:'後半危機・聖泉都市',difficulty:'desperate',ignoreType:'放置不可',danger:3,enemy:'クラリッサと巡礼者代表',lineName:'共有空間維持',enemyImg:'trickBeliever',initialLine:-30,intro:"聖泉都市で、街区ごとに宗派の旗が掲げられ始めた。巡礼者の宿、施療院、井戸、市場までが、どの信徒に開かれるかで揉めている。クラリッサは都市そのものが裂けることを恐れている。",effects:makeEffects({win:{"churchSupport":6,"stability":6,"citySupport":4},loss:{"churchSupport":-8,"stability":-8,"influence":{"altrantRick":-35}},ignored:{"map":{"altrantRick":-1},"tension":{"altrantRick":2}},stories:["巡礼・施療・市場だけは宗派を越えた共有空間として守られた。","聖泉都市は宗派ごとに分断され、巡礼の安全は失われた。","リックは聖泉保護を名目に介入を主張した。"]})},
{id:'late_religion_religious_edict',title:'王国宗教令',category:'後半危機・国家宗教政策',difficulty:'desperate',ignoreType:'放置不可',danger:3,enemy:'五選帝侯と各国使節',lineName:'宗教令制定',enemyImg:'rickKing',initialLine:-30,intro:"長年積み重なった宗教対立を前に、王国宗教令を定める時が来た。トリックを唯一の正統とするのか。スタントを限定的に認めるのか。リャム教徒の商業礼拝を保護するのか。どの道にも敵がいる。",effects:makeEffects({win:{"prestige":12,"stability":10,"diplomacy":5,"churchSupport":4},loss:{"prestige":-12,"stability":-10,"churchSupport":-8},ignored:{"stability":-8,"tension":{"altrantRick":2,"azraqRick":1}},stories:["宗教令は信仰の優劣ではなく、王国の平和を守る法として成立した。","どの宗派からも不十分と見られ、王は信仰の裁定者として傷ついた。","宗教問題は次代へ先送りされ、各地で独自処理が始まった。"]})},
{id:'late_war_holy_total',title:'リック・アズラク聖地総力戦',category:'後半危機・大陸戦争',difficulty:'desperate',ignoreType:'放置不可',danger:3,enemy:'聖王ロレンツォとサファル皇帝',lineName:'講和仲介',enemyImg:'azraqKing',initialLine:-30,intro:"長年続いてきた聖地紛争がついに総力戦へ発展した。巡礼者は消え、隊商路は閉ざされ、各国に参戦か中立かの選択を迫る使節が押し寄せる。",effects:makeEffects({win:{"prestige":12,"diplomacy":8,"tension":{"azraqRick":-1}},loss:{"diplomacy":-10,"prestige":-8},ignored:{"treasury":-8,"stability":-5},stories:["アルトラントは講和仲介の立場を確保した。","両陣営から敵視され、王国の中立は薄氷になった。","戦争は国境を越えて波及し、商路と民心を削った。"]})},
{id:'late_war_loire_ruthenia_secret',title:'ロアール・ルテニア秘密同盟疑惑',category:'後半危機・包囲網外交',difficulty:'hard',ignoreType:'放置不可',danger:2,enemy:'アルマンとイリーナ',lineName:'包囲網阻止',enemyImg:'loireKing',initialLine:-20,intro:"本来なら対立するはずのロアールとルテニアが、水面下で接触しているという報告が届いた。もし真実なら、アルトラントは東西から挟まれる。",effects:makeEffects({win:{"diplomacy":7},loss:{"influence":{"altrantLoire":-25,"altrantRuthenia":-25}},ignored:{"tension":{"altrantLoire":1,"altrantRuthenia":1}},stories:["真相は掴まれ、秘密同盟の成立は阻止された。","疑惑は現実となり、東西の宮廷が同じ地図を眺め始めた。","各国はアルトラント抜きで話を進めた。"]})},
{id:'late_war_solia_neutrality',title:'ソリア中立崩壊',category:'後半危機・緩衝地帯',difficulty:'hard',ignoreType:'放置不可',danger:2,enemy:'レナートとクラウディア',lineName:'中立維持',enemyImg:'soliaKing',initialLine:-20,intro:"これまで中立を維持してきたソリアで、大国からの圧力が限界に達した。どちらかの陣営へ傾く可能性がある。",effects:makeEffects({win:{"diplomacy":6,"treasury":3},loss:{"tension":{"altrantRuthenia":1,"altrantLoire":1}},ignored:{"treasury":-4},stories:["ソリアの中立維持は支援され、山岳路は緩衝地帯であり続けた。","ソリアは一方の陣営へ取り込まれ、均衡は崩れた。","山岳交易路は不安定化した。"]})},
{id:'late_war_seafeara_blockade',title:'セーフェアラ海上封鎖',category:'後半危機・経済戦争',difficulty:'desperate',ignoreType:'放置不可',danger:3,enemy:'マルチェロ・ヴァン・オルセオ',lineName:'海運網確保',enemyImg:'seafearaKing',initialLine:-30,intro:"セーフェアラが特定航路への保険発行を停止した。戦争ではない。しかし船は動かず、港は静まり返る。",effects:makeEffects({win:{"treasury":10,"citySupport":4},loss:{"treasury":-12,"citySupport":-8},ignored:{"treasury":-8},stories:["代替航路と金融網が確保され、港は息を吹き返した。","王国港は孤立し、商人たちは国外へ目を向けた。","海運商人が国外へ流出した。"]})},
{id:'late_war_treuval_campaign',title:'トレウヴァル大遠征',category:'後半危機・北方遠征',difficulty:'hard',ignoreType:'放置不可',danger:2,enemy:'ブラン王とダグダン',lineName:'通行管理',enemyImg:'treuvalKing',initialLine:-20,intro:"北方氏族が大遠征を開始した。目標はアルトラントではない。しかし通過するだけでも辺境は混乱する。",effects:makeEffects({win:{"troops":80,"diplomacy":4},loss:{"stability":-6,"troops":-120},ignored:{"tension":{"altrantTreuval":2}},stories:["補給と通行条件は管理され、辺境は大きな混乱を免れた。","略奪と衝突が発生し、辺境は傷ついた。","辺境諸侯が独自対応を始めた。"]})},
{id:'late_war_continental_peace',title:'大陸講和会議',category:'後半危機・国際秩序',difficulty:'desperate',ignoreType:'放置不可',danger:3,enemy:'全主要国',lineName:'講和会議',enemyImg:'loireKing',initialLine:-30,intro:"大陸諸国が講和会議を開催する。王国の立場を強める最後の機会でもあり、失敗すれば今後数十年の秩序から取り残される。",effects:makeEffects({win:{"prestige":15,"diplomacy":10,"influence":{"altrantRick":15,"altrantLoire":15,"altrantRuthenia":15,"altrantSolia":15,"altrantTreuval":15}},loss:{"prestige":-10,"diplomacy":-8},ignored:{"prestige":-8,"influence":{"altrantRick":-10,"altrantLoire":-10,"altrantRuthenia":-10,"altrantSolia":-10,"altrantTreuval":-10}},stories:["アルトラントは主要調停国として認められた。","会議で存在感を示せず、王国の名は議事録の端に沈んだ。","決定は他国だけで行われ、アルトラントは秩序から取り残された。"]})},
{id:'late_finance_empty_treasury',title:'国庫空白の春',category:'後半危機・財政限界',difficulty:'hard',ignoreType:'放置不可',danger:2,enemy:'白銀公レオポルトと財務官',lineName:'支出整理',enemyImg:'elector1',initialLine:-20,intro:"春の会計報告で、国庫の余力がほとんど残っていないことが明らかになった。軍費、福祉、婚姻外交、傭兵契約。どれも必要だった。だが、必要な支出も積もれば王国を沈める。",effects:makeEffects({win:{"treasury":8,"prestige":3,"nobleSupport":2},loss:{"treasury":3,"prestige":-5,"stability":-4},ignored:{"treasury":-8,"stability":-5},stories:["支出は整理され、選帝侯と都市から一時協力を引き出した。","場当たり的な借金で穴を埋め、後の財政はさらに苦しくなった。","財政破綻リスクは高まり、帳簿の余白は消えた。"]})},
{id:'late_finance_mercenary_collapse',title:'傭兵未払い総崩れ',category:'後半危機・軍制限界',difficulty:'desperate',ignoreType:'放置不可',danger:3,enemy:'ソリア傭兵隊長',lineName:'再契約整理',enemyImg:'soliaSoldier',initialLine:-30,intro:"複数の傭兵隊が、未払いを理由に同時に契約解除を求めた。彼らは敵ではない。だが、金の切れ目は剣の切れ目であり、国境守備は今にも穴が空きそうだった。",effects:makeEffects({win:{"troops":180,"treasury":-5,"diplomacy":4},loss:{"troops":-300,"prestige":-7,"tension":{"altrantRuthenia":1}},ignored:{"troops":-260,"tension":{"altrantSolia":2}},stories:["支払い計画と再契約がまとまり、精鋭だけを残して軍は再編された。","傭兵隊は離脱し、一部は他国へ売り込みに向かった。","国境兵力は一気に薄くなった。"]})},
{id:'late_finance_currency_collapse',title:'貨幣信用の崩壊',category:'後半危機・金融',difficulty:'desperate',ignoreType:'放置不可',danger:3,enemy:'セーフェアラ銀行家',lineName:'貨幣再建',enemyImg:'seafearaKing',initialLine:-30,intro:"市場で王国銀貨の受け取りを拒む商人が現れた。良貨は隠され、粗悪な貨幣だけが流れ、兵への給金も疑われ始めている。これは反乱ではない。だが、王の顔が刻まれた銀貨を誰も信じなくなる危機だった。",effects:makeEffects({win:{"treasury":6,"prestige":5,"citySupport":3},loss:{"treasury":-10,"citySupport":-7,"stability":-6},ignored:{"treasury":-8,"influence":{"azraqLoire":35}},stories:["造幣基準は改められ、回収と再鋳造は段階的に進んだ。","商人と兵は銀貨を疑い、物価と不満が跳ね上がった。","セーフェアラ決済貨幣が国内市場を侵食した。"]})},
{id:'late_finance_conscription_age',title:'徴兵年齢引き下げ論争',category:'後半危機・徴兵',difficulty:'hard',ignoreType:'放置不可',danger:2,enemy:'ゲルハルトとクラリッサ',lineName:'兵制再編',enemyImg:'elector5',initialLine:-20,intro:"兵数不足を理由に、徴兵年齢を引き下げる案が出された。軍人は必要だと言い、農村は畑が死ぬと訴え、クラリッサは若者を数字で扱うなと反対する。",effects:makeEffects({win:{"troops":120,"stability":3,"treasury":-2},loss:{"troops":200,"stability":-7,"citySupport":-5},ignored:{"troops":-120,"tension":{"altrantRuthenia":1}},stories:["徴兵を広げず、訓練民兵と退役兵再編で補った。","若者の徴兵が進み、農村と民衆の不満は高まった。","兵数不足は国境案件に影響した。"]})},
{id:'late_finance_veterans_unrest',title:'退役兵の不満',category:'後半危機・退役兵',difficulty:'normal',ignoreType:'悪化注意',danger:1,enemy:'退役兵代表',lineName:'土地と年金',enemyImg:'altrantSoldier',initialLine:-5,intro:"長年国境で戦った退役兵たちが、約束された土地と年金を求めて王都へ来た。彼らは反逆者ではない。むしろ王国を守った者たちだ。だが、約束を果たすには金と土地が足りない。",effects:makeEffects({win:{"stability":5,"troops":60,"treasury":-3},loss:{"stability":-5,"citySupport":-3},ignored:{"stability":-6,"troops":-60},stories:["土地分配と警備職への再雇用で不満は抑えられた。","退役兵たちは酒場と街道で荒れ始めた。","武器を持つ不満層が国内に残った。"]})},
{id:'late_finance_grand_reform',title:'王国大改革予算',category:'後半危機・国家改革',difficulty:'desperate',ignoreType:'放置不可',danger:3,enemy:'五選帝侯と都市代表',lineName:'改革予算',enemyImg:'elector2',initialLine:-30,intro:"老いた制度を継ぎ足してきた限界が見え始めた。軍制、税制、街道、大学、福祉、造幣。全てを少しずつ直すのでは足りない。だが、大改革には王国全体を揺らすほどの予算が必要だった。",effects:makeEffects({win:{"prestige":14,"stability":8,"treasury":-8,"nobleSupport":4},loss:{"prestige":-10,"nobleSupport":-7,"stability":-6},ignored:{"stability":-5,"treasury":-5},stories:["改革予算は通り、王国の仕組みは次代へ耐える形に変わり始めた。","予算案は利害の衝突で崩れ、王は大風呂敷を広げただけと見られた。","制度疲労は残り、終盤の難局へ影を落とした。"]})},
{id:'late_fate_thirty_redivination',title:'三十歳の再占',category:'後半危機・予言',difficulty:'normal',ignoreType:'悪化注意',danger:1,enemy:'宮廷占星術師',lineName:'不安の鎮静',enemyImg:'witch',initialLine:-5,intro:"アルブレヒトが三十歳を迎える頃、古い予言が再び語られ始めた。「鷲の羽ばたきは二十度目の冬を越えることはない」。酒宴の冗談として語る者もいれば、本気で恐れる者もいる。",effects:makeEffects({win:{"prestige":5,"stability":3},loss:{"prestige":-4,"stability":-3},ignored:{"stability":-3,"nobleSupport":-2},stories:["予言を否定せず、王の実績を示すことで不安は抑えられた。","宮廷に「残された時間」を数える空気が広がった。","噂は民衆にも広がり始めた。"]})},
{id:'late_fate_apprentice',title:'占い師の弟子',category:'後半危機・偽預言',difficulty:'hard',ignoreType:'放置不可',danger:2,enemy:'占い師の弟子を名乗る人物',lineName:'偽書調査',enemyImg:'witch',initialLine:-20,intro:"かつてアルブレヒト誕生の日に予言を告げた占い師の弟子を名乗る人物が現れた。彼は「予言には続きがある」と語り、貴族たちが密かに会い始めている。",effects:makeEffects({win:{"prestige":6,"nobleSupport":3,"stability":2},loss:{"prestige":-6,"nobleSupport":-5},ignored:{"stability":-5},stories:["偽書と本物の伝承は切り分けられ、予言は政治工作に使われなかった。","「予言の続き」が広まり、王の判断に影が差した。","貴族たちは弟子の言葉を、王命以上に気にし始めた。"]})},
{id:'late_fate_delayed_decrees',title:'王命の遅れ',category:'後半危機・王権空洞化',difficulty:'hard',ignoreType:'放置不可',danger:2,enemy:'王宮官僚と地方代官',lineName:'即時執行',enemyImg:'elector2',initialLine:-20,intro:"地方へ送られた王命が、以前より遅れて実行されるようになった。官僚たちは「確認に時間がかかった」と言う。だが本音は、運命の日が近い王の命令にどこまで従うべきか迷っているのかもしれない。",effects:makeEffects({win:{"prestige":7,"stability":5},loss:{"prestige":-7,"stability":-6},ignored:{"stability":-5,"influence":{"altrantLoire":-10,"altrantRuthenia":-10}},stories:["官僚制は再確認され、王命の即時執行が徹底された。","王命は形式だけ重く、実行は遅いものになった。","地方は王都の命令より、近くの有力者を優先し始めた。"]})},
{id:'late_fate_brother_return',title:'弟派の再結集',category:'後半危機・継承派閥',difficulty:'desperate',ignoreType:'放置不可',danger:3,enemy:'ルートヴィヒ派貴族',lineName:'弟派整理',enemyImg:'brother',initialLine:-30,intro:"運命の日が近づくにつれ、弟ルートヴィヒを中心に据えようとする貴族たちが再び動き始めた。彼らは反逆を口にしない。ただ「王国には備えが必要だ」と言う。",effects:makeEffects({win:{"stability":8,"nobleSupport":5,"prestige":5},loss:{"stability":-10,"nobleSupport":-8,"prestige":-6},ignored:{"nobleSupport":-7,"stability":-7},stories:["ルートヴィヒは敵ではなく、正式な王族補佐として位置づけられた。","弟派は王の死後を見据えた別の宮廷を作り始めた。","兄弟の信頼そのものが政争の材料になった。"]})},
{id:'late_fate_succession_law',title:'王位継承法案',category:'後半危機・継承法',difficulty:'desperate',ignoreType:'放置不可',danger:3,enemy:'五選帝侯と王族代表',lineName:'継承法制定',enemyImg:'elector2',initialLine:-30,intro:"王位継承の手続きを明文化する法案が提出された。王子、王女、弟、姪、選帝侯の承認権。誰もが納得する条文など存在しない。だが曖昧なままでは、運命の日の後に王国が裂ける。",effects:makeEffects({win:{"prestige":13,"stability":10,"nobleSupport":6},loss:{"prestige":-11,"stability":-9,"nobleSupport":-7},ignored:{"stability":-8,"nobleSupport":-5},stories:["継承順位と選帝侯承認の範囲が定められ、王国の未来は守られた。","法案は各派の利害で崩れ、継承不安がむしろ表面化した。","継承は慣習任せとなり、次代の火種が残った。"]})},
{id:'late_fate_eve_council',title:'運命の日の前夜評議',category:'最終章導線・運命の日',difficulty:'desperate',ignoreType:'放置不可',once:true,danger:3,enemy:'主要采配者と五選帝侯',lineName:'前夜評議',enemyImg:'deadKing',initialLine:-30,intro:"三十六歳の誕生日を目前に、王宮で前夜評議が開かれた。予言を信じる者も、笑い飛ばす者も、利用しようとする者もいる。だが全員が知っている。明日以降、王国は同じではいられない。",effects:makeEffects({win:{"prestige":15,"stability":12,"nobleSupport":8,"diplomacy":5},loss:{"prestige":-14,"stability":-12,"nobleSupport":-8},ignored:{"stability":-10,"prestige":-8},stories:["アルブレヒトは恐れではなく、自分が築いた制度と人々への信頼で評議をまとめた。","評議は疑念と不安に包まれ、各派は最悪の未来へ備え始めた。","王の沈黙が、最も深い不安として残った。"]})},

// ===== 第6波：王妃別案件＋王朝共通案件 =====
{id:'wife1_old_garden',title:'ヘレーネの古い庭',category:'私生活・内政',difficulty:'easy',ignoreType:'くすぶる',requiresFlag:'spouse_wife1',danger:0,enemy:'ヘレーネ',lineName:'ヘレーネの古い庭',enemyImg:'elector4',initialLine:0,intro:"王宮の古い庭で、ヘレーネは幼い頃に植えた菩提樹を見上げる。王妃となった今、その近さは王を支える力にも、宮廷の疑念にもなる。",effects:makeEffects({"win": {"prestige": 3}, "loss": {"prestige": -2}, "ignored": {}, "stories": ["古い庭は王妃の小さな居場所として整えられた。王はそこで政務の仮面を外し、王宮には穏やかな余白が戻った。", "庭の整備は進んだが、宮廷人は「王妃の私室に国費を使った」と囁いた。温もりは得たが、視線は冷たい。", "庭は荒れたまま残り、王妃は二度とその話を持ち出さなかった。王の私生活にも、薄い冬が降りた。"]})},
{id:'wife1_kitchen_relief',title:'王妃の炊き出し',category:'福祉・民心',difficulty:'normal',ignoreType:'くすぶる',requiresFlag:'spouse_wife1',danger:1,enemy:'ヘレーネ',lineName:'王妃の炊き出し',enemyImg:'peasant',initialLine:-5,intro:"ヘレーネは王都の女主人たちと冬の炊き出しを始めたいと願う。善意を制度に変えなければ、人気だけが先走る。",effects:makeEffects({"win": {"citySupport": 4, "stability": 2}, "loss": {"citySupport": -3}, "ignored": {"stability": -1}, "stories": ["ヘレーネの台所救済は、王宮の余りを民の食卓へ流す仕組みへ変わった。飢えた子どもたちは王妃の名を覚えた。", "救済は行われたが配分は乱れ、施しを受けた者と受けられなかった者の間に不満が残った。", "鍋は王宮の中だけで温まり、城外の路地には空腹の列が伸びた。王妃の優しさは届かなかった。"]})},
{id:'wife1_household_accounts',title:'王妃の家政帳簿',category:'財政・私生活',difficulty:'normal',ignoreType:'くすぶる',requiresFlag:'spouse_wife1',danger:1,enemy:'ヘレーネ',lineName:'王妃の家政帳簿',enemyImg:'elector4',initialLine:-5,intro:"ヘレーネは宮廷の支出帳簿を見て、宴席と衣装に費やされる銀貨の多さに驚く。倹約と面子の折り合いが問われる。",effects:makeEffects({"win": {"prestige": 3}, "loss": {"prestige": -2}, "ignored": {}, "stories": ["王妃は家政帳簿を整え、宮廷費の無駄を静かに削った。質素な王家という評判が、民の好感を呼んだ。", "帳簿は整理されたが、削られた出費に宮廷の小貴族たちが不満を漏らした。節約は小さな敵も生んだ。", "家政帳簿は閉じられ、浪費は続いた。民は増税を恐れ、宮廷では誰も責任を取らなかった。"]})},
{id:'wife1_village_visit',title:'ヘレーネの故郷訪問',category:'民心・地方',difficulty:'hard',ignoreType:'くすぶる',requiresFlag:'spouse_wife1',danger:2,enemy:'ヘレーネ',lineName:'ヘレーネの故郷訪問',enemyImg:'peasant',initialLine:-15,intro:"ヘレーネの故郷の村が、王妃の里として急に注目を浴びる。妻の故郷を愛しながら、公平な王でなければならない。",effects:makeEffects({"win": {"citySupport": 4, "stability": 2}, "loss": {"citySupport": -3}, "ignored": {"stability": -1}, "stories": ["ヘレーネは村の井戸端で民と同じ椀から粥を食べた。王妃の素朴さは、王家と村を結ぶ物語になった。", "訪問は成功したが、護衛と儀礼が多すぎて民との距離は縮まりきらなかった。温かさは半分だけ届いた。", "村への訪問は取りやめられた。民は「王妃も王宮の人になった」と寂しげに噂した。"]})},
{id:'wife1_children_room',title:'王宮の子ども部屋',category:'王朝・教育',difficulty:'hard',ignoreType:'くすぶる',requiresFlag:'spouse_wife1',danger:2,enemy:'ヘレーネ',lineName:'王宮の子ども部屋',enemyImg:'butler',initialLine:-15,intro:"ヘレーネは、王子や王女を豪奢な部屋だけで育てることを望まない。民の暮らしを知らぬ子は、民の王になれないという。",effects:makeEffects({"win": {"prestige": 3}, "loss": {"prestige": -2}, "ignored": {}, "stories": ["子ども部屋は質素だが明るく整えられた。王家の子らが健やかに育つ姿は、継承への不安を和らげた。", "部屋は整ったが、教育係と乳母の主導権争いが残った。子どもの笑い声の裏で派閥が動いている。", "子ども部屋の準備は遅れ、王妃は一人で不安を抱えた。王朝の未来は、まだ落ち着く場所を得ていない。"]})},
{id:'wife2_ladies_arrival',title:'ロアール侍女団の到着',category:'宮廷・外交',difficulty:'normal',ignoreType:'くすぶる',requiresFlag:'spouse_wife2',danger:1,enemy:'エレオノール',lineName:'ロアール侍女団の到着',enemyImg:'loireKing',initialLine:-5,intro:"王妃エレオノールの侍女団がロアールから到着する。洗練された礼法は魅力だが、王宮が西方色に染まる危険もある。",effects:makeEffects({"win": {"diplomacy": 4, "prestige": 2}, "loss": {"diplomacy": -4}, "ignored": {"diplomacy": -2}, "stories": ["ロアールから来た侍女たちは、王宮礼法に組み込まれた。華やかさは増したが、主導権はアルトラントが握った。", "侍女たちは受け入れられたが、宮廷ではロアール語の囁きが増えた。洗練と従属の境目は曖昧になった。", "侍女団は孤立し、王妃の周囲には見えない壁ができた。西方同盟の温度も少し下がった。"]})},
{id:'wife2_prince_first_dance',title:'王子の初舞踏',category:'王朝・宮廷',difficulty:'easy',ignoreType:'くすぶる',requiresFlag:'spouse_wife2',danger:0,enemy:'エレオノール',lineName:'王子の初舞踏',enemyImg:'loireKing',initialLine:0,intro:"幼い王子が初めての舞踏儀礼に出る。ロアール式とアルトラント式、どちらを次代の礼法にするかで宮廷が揺れる。",effects:makeEffects({"win": {"prestige": 3}, "loss": {"prestige": -2}, "ignored": {}, "stories": ["王子の初舞踏は、ぎこちなさまで愛される儀礼になった。ロアール式の優雅さは、王家の魅力として受け入れられた。", "舞踏は無事に終わったが、王子の一挙手一投足が宮廷の噂にされた。幼い継承者は早くも値踏みされている。", "舞踏会は延期され、ロアール側は冷淡に受け取った。宮廷では王家の教育不足が囁かれた。"]})},
{id:'wife2_princess_portrait',title:'王女の肖像画外交',category:'外交・王朝',difficulty:'normal',ignoreType:'くすぶる',requiresFlag:'spouse_wife2',danger:1,enemy:'エレオノール',lineName:'王女の肖像画外交',enemyImg:'loireKing',initialLine:-5,intro:"ロアールから王女の肖像画を求められる。親族への贈り物にも、将来の婚約外交にも見える申し出だった。",effects:makeEffects({"win": {"diplomacy": 4, "prestige": 2}, "loss": {"diplomacy": -4}, "ignored": {"diplomacy": -2}, "stories": ["王女の肖像画は、アルトラントの紺とロアールの薔薇を調和させた。婚姻同盟の象徴として評判になった。", "肖像画は完成したが、画家の筆はロアール趣味に寄りすぎた。王宮の古参貴族は顔をしかめた。", "肖像画の依頼は流れ、ロアール宮廷では王女を軽んじたと受け取られた。"]})},
{id:'wife2_charity_salon',title:'王妃の西方慈善会',category:'福祉・宮廷',difficulty:'hard',ignoreType:'くすぶる',requiresFlag:'spouse_wife2',danger:2,enemy:'エレオノール',lineName:'王妃の西方慈善会',enemyImg:'peasant',initialLine:-15,intro:"エレオノールがロアール式の慈善会を開き、貴族夫人たちから資金を集める。民衆人気と王妃派閥化の境目に立つ案件である。",effects:makeEffects({"win": {"citySupport": 4, "stability": 2}, "loss": {"citySupport": -3}, "ignored": {"stability": -1}, "stories": ["慈善サロンは貴婦人たちの見栄を民への救済に変えた。王妃は優雅さを政治の道具にした。", "寄付は集まったが、貴婦人たちは互いの席次を争った。救済より評判が前に出てしまった。", "サロンは噂話の場に終わり、貧民街へ届いたパンはわずかだった。王妃の評判にも傷がついた。"]})},
{id:'wife2_princess_betrothal',title:'王女の西方婚約案',category:'婚姻外交・王朝',difficulty:'desperate',ignoreType:'くすぶる',requiresFlag:'spouse_wife2',danger:3,enemy:'エレオノール',lineName:'王女の西方婚約案',enemyImg:'loireKing',initialLine:-30,intro:"ロアール王太子アルマンが、王女とロアール王族の将来婚約を提案する。西方安定と王女の自由が秤にかけられる。",effects:makeEffects({"win": {"diplomacy": 4, "prestige": 2}, "loss": {"diplomacy": -4}, "ignored": {"diplomacy": -2}, "stories": ["王女の将来婚約は、急がず含みを残す形で整えられた。ロアールとの絆は強まり、王家の選択肢も守られた。", "返答は曖昧すぎ、ロアールと国内貴族の双方に不満を残した。王女の名は早くも外交の札になった。", "打診は事実上流れた。ロアール宮廷は侮辱と受け止め、王女をめぐる噂だけが残った。"]})},
{id:'wife3_baptism_name',title:'王子の洗礼名',category:'宗教・王朝',difficulty:'normal',ignoreType:'くすぶる',requiresFlag:'spouse_wife3',danger:1,enemy:'ベアトリーチェ',lineName:'王子の洗礼名',enemyImg:'rickKing',initialLine:-5,intro:"王子の洗礼名をめぐり、リック聖王国と選帝侯が綱を引く。名は、誰の祝福を受ける王子かを示す。",effects:makeEffects({"win": {"churchSupport": 4, "prestige": 2}, "loss": {"churchSupport": -4}, "ignored": {"churchSupport": -2}, "stories": ["洗礼名は王国の伝統とリックの信仰を両立する形で選ばれた。教会は祝福し、王宮も胸をなで下ろした。", "名は決まったが、聖職者と宮廷人のどちらも完全には満足しなかった。小さな洗礼盤に大きな政治が映った。", "洗礼名をめぐる調整は遅れ、教会は王家の信心を疑い始めた。"]})},
{id:'wife3_confessor',title:'王妃の告解師',category:'宗教・宮廷',difficulty:'hard',ignoreType:'くすぶる',requiresFlag:'spouse_wife3',danger:2,enemy:'ベアトリーチェ',lineName:'王妃の告解師',enemyImg:'rickKing',initialLine:-15,intro:"ベアトリーチェの告解師が宮廷で影響力を持ち始める。信仰相談と政治介入の境界を定めねばならない。",effects:makeEffects({"win": {"churchSupport": 4, "prestige": 2}, "loss": {"churchSupport": -4}, "ignored": {"churchSupport": -2}, "stories": ["王妃の聴罪司祭は、王国法を尊重する人物に定められた。信仰は深まりながら、聖庁の干渉は抑えられた。", "司祭は迎えられたが、王宮の内情が聖庁へ漏れるのではないかという警戒が消えなかった。", "聴罪司祭の選定は荒れ、王妃は信仰と王宮の間で孤立した。"]})},
{id:'wife3_cathedral',title:'新大聖堂の建設計画',category:'建設・宗教',difficulty:'normal',ignoreType:'くすぶる',requiresFlag:'spouse_wife3',danger:1,enemy:'ベアトリーチェ',lineName:'新大聖堂の建設計画',enemyImg:'rickKing',initialLine:-5,intro:"王妃は王子誕生の感謝として新しい大聖堂建設を提案する。祈りと国庫、正統信仰と宗教不安が同時に動く。",effects:makeEffects({"win": {"churchSupport": 4, "prestige": 2}, "loss": {"churchSupport": -4}, "ignored": {"churchSupport": -2}, "stories": ["大聖堂での祈りは、王家の信仰を示す荘厳な場となった。民は鐘の音に王朝の安定を重ねた。", "儀礼は整ったが、費用と席次をめぐる不満が残った。祈りの場にも政治は入り込んだ。", "大聖堂行幸は見送られ、リック系聖職者は王家の信仰を冷たく記録した。"]})},
{id:'wife3_princess_convent',title:'王女修道院教育案',category:'教育・宗教外交',difficulty:'hard',ignoreType:'くすぶる',requiresFlag:'spouse_wife3',danger:2,enemy:'ベアトリーチェ',lineName:'王女修道院教育案',enemyImg:'rickKing',initialLine:-15,intro:"リック側は王女を名門修道院で教育するよう勧める。教養は得られるが、王女がリックの象徴になる危険もある。",effects:makeEffects({"win": {"churchSupport": 4, "prestige": 2}, "loss": {"churchSupport": -4}, "ignored": {"churchSupport": -2}, "stories": ["王女の修道院教育は、信仰教育でありながら人質化を避ける形でまとまった。王妃は安堵の涙を隠した。", "修道院行きは決まったが、帰還時期が曖昧に残った。王女の将来をめぐる不安は消えない。", "計画は聖庁主導へ傾き、王女は王宮から遠ざけられる危険を帯びた。"]})},
{id:'wife3_godparent',title:'聖王からの名付け親要求',category:'宗教・継承',difficulty:'desperate',ignoreType:'くすぶる',requiresFlag:'spouse_wife3',danger:3,enemy:'ベアトリーチェ',lineName:'聖王からの名付け親要求',enemyImg:'rickKing',initialLine:-30,intro:"聖王ロレンツォが王子の名付け親になる意向を示す。正統性の祝福か、後見権への第一歩か。",effects:makeEffects({"win": {"churchSupport": 4, "prestige": 2}, "loss": {"churchSupport": -4}, "ignored": {"churchSupport": -2}, "stories": ["代父母選びは、教会と王国貴族の均衡を保つ形で決着した。洗礼式は王朝外交の成功として語られた。", "代父母は決まったが、外された家々の不満が静かに残った。祝福の陰で派閥が数え直された。", "代父母選びはこじれ、洗礼式そのものが政治的な傷を残した。"]})},
{id:'wife4_nurse',title:'紫の乳母',category:'王朝・諜報',difficulty:'normal',ignoreType:'くすぶる',requiresFlag:'spouse_wife4',danger:1,enemy:'アナスタシア',lineName:'紫の乳母',enemyImg:'rutheniaKing',initialLine:-5,intro:"ルテニアから王子の乳母と教育係候補が送られてくる。有能だが、セルゲイ内廷長官の推薦状を持っている。",effects:makeEffects({"win": {"prestige": 3}, "loss": {"prestige": -2}, "ignored": {}, "stories": ["ルテニア人乳母は監督付きで迎えられ、異国の子守歌は王宮に新しい風を入れた。大国との縁も穏やかに保たれた。", "乳母は受け入れられたが、王子の耳に最初に届く言葉をめぐり、宮廷はざわついた。", "乳母の件は拒まれ、ルテニア側は王妃への侮辱と受け取った。"]})},
{id:'wife4_second_name',title:'王子への東方名要求',category:'継承・外交',difficulty:'normal',ignoreType:'くすぶる',requiresFlag:'spouse_wife4',danger:1,enemy:'アナスタシア',lineName:'王子への東方名要求',enemyImg:'rutheniaKing',initialLine:-5,intro:"ルテニア宮廷は王子に東方風の第二名を求める。王妃の願いと選帝侯の警戒がぶつかる。",effects:makeEffects({"win": {"diplomacy": 4, "prestige": 2}, "loss": {"diplomacy": -4}, "ignored": {"diplomacy": -2}, "stories": ["第二名はアルトラント名を主とし、ルテニア名を添える形で決まった。血縁は示しつつ、王朝の中心は守られた。", "名は決まったが、どちらの宮廷も譲歩を数えた。赤子の名に、大国外交の重さが乗った。", "命名は揉め、ルテニア使節は露骨に不満を残して去った。"]})},
{id:'wife4_secret_tutor',title:'内廷長官の秘密教師',category:'教育・諜報',difficulty:'hard',ignoreType:'くすぶる',requiresFlag:'spouse_wife4',danger:2,enemy:'アナスタシア',lineName:'内廷長官の秘密教師',enemyImg:'rutheniaKing',initialLine:-15,intro:"セルゲイ内廷長官が、王子に東方語と宮廷作法を教える秘密教師を推薦してきた。教師は優秀だが、諜報の匂いがする。",effects:makeEffects({"win": {"prestige": 3}, "loss": {"prestige": -2}, "ignored": {}, "stories": ["秘密教師の身元は調べられ、外国語教育は王宮の管理下に置かれた。知識は得て、危険な影は退けた。", "教師は残ったが、誰が推薦したのかは曖昧だった。王宮の廊下に小さな不信が残った。", "教師は姿を消し、机には暗号めいた書き込みだけが残った。王宮警備の甘さが露呈した。"]})},
{id:'wife4_princess_betrothal',title:'王女の東方婚約打診',category:'婚姻外交',difficulty:'hard',ignoreType:'くすぶる',requiresFlag:'spouse_wife4',danger:2,enemy:'アナスタシア',lineName:'王女の東方婚約打診',enemyImg:'rutheniaKing',initialLine:-15,intro:"イリーナ女大公が王女とルテニア大公家の縁組を将来検討したいと伝えてくる。大国同盟と政治利用の境目に立つ。",effects:makeEffects({"win": {"diplomacy": 4, "prestige": 2}, "loss": {"diplomacy": -4}, "ignored": {"diplomacy": -2}, "stories": ["王女の縁談は、即答を避けつつ大国との絆を保つ形で処理された。王家は時間を手に入れた。", "返答は弱く、ルテニア側はさらに条件を積み増した。王女の未来が交渉台に置かれたままになった。", "打診はこじれ、ルテニア宮廷は王女を軽んじられたと見なした。"]})},
{id:'wife4_dual_succession',title:'二重継承の噂',category:'継承・大国危機',difficulty:'desperate',ignoreType:'くすぶる',requiresFlag:'spouse_wife4',danger:3,enemy:'アナスタシア',lineName:'二重継承の噂',enemyImg:'rutheniaKing',initialLine:-30,intro:"王子がアルトラントとルテニア双方の血を持つ継承者として利用されるのではないか、という噂が広がる。",effects:makeEffects({"win": {"prestige": 3}, "loss": {"prestige": -2}, "ignored": {}, "stories": ["二重継承の議論は、将来の権利を曖昧にせず封じ込められた。王国は大国の継承争いに飲まれずに済んだ。", "妥協案は出たが、条文の隙間に危険が残った。後の世の法学者が必ず読み返すだろう。", "二重継承の噂は広がり、王家の子はルテニアの政治にも巻き込まれる存在となった。"]})},
{id:'wife5_lyam_nurse',title:'リャム教徒乳母への反発',category:'宗教・王朝',difficulty:'normal',ignoreType:'くすぶる',requiresFlag:'spouse_wife5',danger:1,enemy:'サフィーラ',lineName:'リャム教徒乳母への反発',enemyImg:'trickBeliever',initialLine:-5,intro:"サフィーラの側近であるリャム教徒の乳母が王女の世話に加わる。王妃には安心だが、トリック司祭たちは強く反発する。",effects:makeEffects({"win": {"churchSupport": 4, "prestige": 2}, "loss": {"churchSupport": -4}, "ignored": {"churchSupport": -2}, "stories": ["リャム教徒の乳母は、王国法の保護下で迎えられた。異文化への寛容は交易商人たちの信頼を呼んだ。", "乳母は残ったが、保守派聖職者は王宮の信仰を疑った。子守歌一つにも宗教の影が落ちた。", "乳母は退けられ、アズラク使節は静かに侮辱を記録した。"]})},
{id:'wife5_stargazer',title:'星読み教師の招待',category:'学問・外交',difficulty:'easy',ignoreType:'くすぶる',requiresFlag:'spouse_wife5',danger:0,enemy:'サフィーラ',lineName:'星読み教師の招待',enemyImg:'azraqKing',initialLine:0,intro:"アズラクから天文学者が招かれ、王子に星の読み方と暦法を教えることになる。学問か迷信かで宮廷の見方は割れる。",effects:makeEffects({"win": {"diplomacy": 4, "prestige": 2}, "loss": {"diplomacy": -4}, "ignored": {"diplomacy": -2}, "stories": ["星読みは儀礼ではなく暦学として扱われ、航海と農事にも役立てられた。王妃の知恵は迷信ではなく実学となった。", "星読みは許されたが、占いに頼る王宮という噂も広がった。合理と神秘の線引きは難しい。", "星読みは禁じられ、王妃は自分の文化を否定されたように沈黙した。"]})},
{id:'wife5_desert_name',title:'王女の砂漠名',category:'王朝・異文化',difficulty:'normal',ignoreType:'くすぶる',requiresFlag:'spouse_wife5',danger:1,enemy:'サフィーラ',lineName:'王女の砂漠名',enemyImg:'azraqKing',initialLine:-5,intro:"サフィーラは王女にアズラク風の愛称を授けたいと願う。母の愛情と異文化への警戒がぶつかる。",effects:makeEffects({"win": {"prestige": 3}, "loss": {"prestige": -2}, "ignored": {}, "stories": ["砂漠名は私的な愛称として認められ、公的儀礼では王国名を用いる形で落ち着いた。二つの文化は衝突を避けた。", "呼び名は増えたが、宮廷人はどれを使うべきか迷った。親しみは混乱も連れてきた。", "砂漠名をめぐる配慮は失われ、王妃の一族は王宮の冷たさを感じ取った。"]})},
{id:'wife5_holy_truce_blessing',title:'聖地停戦の祝福式',category:'宗教外交・王朝',difficulty:'hard',ignoreType:'くすぶる',requiresFlag:'spouse_wife5',danger:2,enemy:'サフィーラ',lineName:'聖地停戦の祝福式',enemyImg:'azraqKing',initialLine:-15,intro:"聖地で一時停戦が成立し、サフィーラは子どもの誕生を平和の象徴として祝福式に使いたいと提案する。",effects:makeEffects({"win": {"churchSupport": 4, "prestige": 2}, "loss": {"churchSupport": -4}, "ignored": {"churchSupport": -2}, "stories": ["聖戦休戦の祝福は、商人と聖職者の双方を傷つけぬ文言でまとめられた。南方交易に静かな道が開いた。", "祝福は行われたが、リック側とアズラク側の解釈は食い違った。和平の言葉は薄い氷の上にある。", "祝福は実現せず、南方では「アルトラントはどちらの友でもない」と囁かれた。"]})},
{id:'wife5_caravan_inheritance',title:'隊商路を継承祝いに',category:'交易・大国外交',difficulty:'desperate',ignoreType:'くすぶる',requiresFlag:'spouse_wife5',danger:3,enemy:'サフィーラ',lineName:'隊商路を継承祝いに',enemyImg:'azraqKing',initialLine:-30,intro:"サファル皇帝が、王子誕生の祝いとして隊商路の優先通行権を贈ると申し出る。国庫は潤うが、リックは警戒する。",effects:makeEffects({"win": {"diplomacy": 4, "prestige": 2}, "loss": {"diplomacy": -4}, "ignored": {"diplomacy": -2}, "stories": ["隊商権の相続は王国の法に組み込まれ、王家は南方交易の実利を得た。港の倉庫に香辛料の匂いが満ちた。", "権利は得たが、商業連盟とアズラク商人の双方が手数料を求めた。利益は細く分けられた。", "隊商権は他家へ流れ、王国は南方への貴重な窓を失った。"]})},
{id:'wife6_warband_visit',title:'戦姫の従士団到着',category:'辺境・宮廷',difficulty:'normal',ignoreType:'くすぶる',requiresFlag:'spouse_wife6',danger:1,enemy:'ブリギッド',lineName:'戦姫の従士団到着',enemyImg:'treuvalSoldier',initialLine:-5,intro:"王妃ブリギッドの従士団が王都に到着する。忠実だが武器を手放さず、宮廷貴族は粗野だと眉をひそめる。",effects:makeEffects({"win": {"troops": 80, "prestige": 3}, "loss": {"troops": -80, "prestige": -3}, "ignored": {"troops": -40}, "stories": ["戦士団の来訪は、武威の誇示ではなく盟友の儀礼として整えられた。王都の民は恐怖よりも勇壮さを語った。", "戦士団は歓迎されたが、酒場での乱闘が尾を引いた。辺境の力は頼もしくも扱いづらい。", "来訪は混乱に終わり、王都ではトレウヴァル人への警戒だけが強まった。"]})},
{id:'wife6_prince_shield_oath',title:'王子の盾誓い',category:'王朝・軍事',difficulty:'easy',ignoreType:'くすぶる',requiresFlag:'spouse_wife6',danger:0,enemy:'ブリギッド',lineName:'王子の盾誓い',enemyImg:'treuvalSoldier',initialLine:0,intro:"ブリギッドは幼い王子に木の盾を持たせ、守る者の誓いを教えたいと言う。辺境の兵たちは次代の王に勇気を見たい。",effects:makeEffects({"win": {"troops": 80, "prestige": 3}, "loss": {"troops": -80, "prestige": -3}, "ignored": {"troops": -40}, "stories": ["王子は小さな盾を掲げ、守る者の誓いを声にした。辺境兵は歓声を上げ、王家の血に勇気を見た。", "誓いは済んだが、宮廷貴族は粗野な儀礼だと眉をひそめた。王子の教育方針は割れたままだ。", "盾誓いは流れ、辺境の兵たちは王家が自分たちの武の誇りを軽んじたと感じた。"]})},
{id:'wife6_clan_fosterage',title:'氏族式の養育案',category:'教育・辺境外交',difficulty:'hard',ignoreType:'くすぶる',requiresFlag:'spouse_wife6',danger:2,enemy:'ブリギッド',lineName:'氏族式の養育案',enemyImg:'treuvalKing',initialLine:-15,intro:"トレウヴァルの族長たちが、王子か王女を短期間だけ氏族の客人として迎えたいと申し出る。養育は同盟の証でもある。",effects:makeEffects({"win": {"troops": 80, "prestige": 3}, "loss": {"troops": -80, "prestige": -3}, "ignored": {"troops": -40}, "stories": ["氏族滞在は短期かつ護衛付きで認められた。王家の子は辺境の焚き火を知り、同盟は血の温度を帯びた。", "養育案は一部実現したが、王都では人質に近いのではないかという疑念が残った。", "養育案は拒まれ、族長たちは王家が彼らを信用していないと受け止めた。"]})},
{id:'wife6_bards_song',title:'王妃を讃える吟遊詩',category:'文化・民心',difficulty:'normal',ignoreType:'くすぶる',requiresFlag:'spouse_wife6',danger:1,enemy:'ブリギッド',lineName:'王妃を讃える吟遊詩',enemyImg:'treuvalKing',initialLine:-5,intro:"老詩人フィンガルがブリギッドを讃える歌を王都で披露する。民は喜ぶが、王より王妃の武勇が目立つ危うさもある。",effects:makeEffects({"win": {"citySupport": 4, "stability": 2}, "loss": {"citySupport": -3}, "ignored": {"stability": -1}, "stories": ["吟遊詩は王妃の武勇だけでなく、王と王妃が共に国を守る歌へ整えられた。民は新しい王家像に沸いた。", "歌は流行したが、王より王妃の名が先に呼ばれる場面も増えた。宮廷には複雑な笑みが広がった。", "吟遊詩は野放しになり、王都では王妃だけが英雄のように歌われた。王の影は少し薄くなった。"]})},
{id:'wife6_princess_bow',title:'王女の弓初め',category:'王朝・辺境',difficulty:'hard',ignoreType:'くすぶる',requiresFlag:'spouse_wife6',danger:2,enemy:'ブリギッド',lineName:'王女の弓初め',enemyImg:'treuvalSoldier',initialLine:-15,intro:"ブリギッドは王女にも弓を持たせたいと願う。貴族たちは王女らしくないと反発し、辺境の民は歓声を上げる。",effects:makeEffects({"win": {"troops": 80, "prestige": 3}, "loss": {"troops": -80, "prestige": -3}, "ignored": {"troops": -40}, "stories": ["王女の弓初めは、辺境式の勇気と王女らしい品位を両立する儀礼となった。民は新しい時代を感じた。", "王女は弓を引いたが、保守貴族は不満を隠さなかった。小さな矢は宮廷の古い作法にも刺さった。", "弓初めは中止され、辺境の民は王宮が王妃の文化を恥じていると受け取った。"]})},
{id:'dynasty_first_child_naming',title:'第一子の命名式',category:'王朝・儀礼',difficulty:'normal',ignoreType:'くすぶる',requiresFlag:'dynasty_started',danger:1,enemy:'王宮関係者',lineName:'第一子の命名式',enemyImg:'rickKing',initialLine:-5,intro:"王宮に第一子誕生の鐘が鳴った。名を何にするかをめぐり、王家、王妃の実家、教会、選帝侯が静かに綱を引く。",effects:makeEffects({"win": {"prestige": 4, "stability": 3}, "loss": {"prestige": -4, "stability": -3}, "ignored": {"stability": -2}, "stories": ["第一子の名は、王家の伝統を軸に王妃の血筋にも敬意を払う形で決まった。鐘の音は王朝の未来を明るく響かせた。", "命名式は終わったが、名に込められた序列をめぐって親族と聖職者が火種を残した。", "命名は先送りされ、赤子の揺り籠の周囲で大人たちの計算だけが大きくなった。"]})},
{id:'dynasty_guardian_choice',title:'後見人を誰にするか',category:'継承・派閥',difficulty:'hard',ignoreType:'くすぶる',requiresFlag:'dynasty_started',danger:2,enemy:'王宮関係者',lineName:'後見人を誰にするか',enemyImg:'elector4',initialLine:-15,intro:"王子または王女の後見人を誰にするかで、宮廷が揺れる。五選帝侯はそれぞれ、自分こそ次代を導けると主張する。",effects:makeEffects({"win": {"prestige": 4, "stability": 3}, "loss": {"prestige": -4, "stability": -3}, "ignored": {"stability": -2}, "stories": ["後見人は一人に絞らず、王の監督下に置く評議制で決まった。次代を人質にする派閥争いは抑え込まれた。", "後見人は決まったが、外された選帝侯たちは沈黙で抗議した。幼い子の周囲に派閥の影が残った。", "後見人争いは放置され、各家が勝手に子どもへ贈り物と教師を送り始めた。"]})},

/* =========================================================
   CASE EFFECT BUILDERS
   案件結果の効果を生成する補助処理。
   ========================================================= */
function makeEffects({win={},loss={},ignored={},stories=[]}){return{completeWin:{...scaleEffect(win,1.4),story:stories[0]},majorWin:{...scaleEffect(win,1),story:stories[0]},minorWin:{...scaleEffect(win,.55),story:stories[1]||stories[0]},draw:{params:{},tension:{},influence:{},map:{},story:stories[1]||'事態は先送りされた。'},minorLoss:{...scaleEffect(loss,.55),story:stories[2]||stories[1]},majorLoss:{...scaleEffect(loss,1),story:stories[2]},completeLoss:{...scaleEffect(loss,1.4),story:stories[2]},ignored:{...scaleEffect(ignored,1),story:stories[2]||'未対応のまま、火種は静かに残った。'}}}
function scaleEffect(obj={},m=1){const out={params:{},tension:{},influence:{},map:{}};for(const[k,v]of Object.entries(obj||{})){if(k==='params'||k==='tension'||k==='influence'||k==='map'){for(const[kk,vv]of Object.entries(v||{})){out[k][kk]=k==='map'?Math.trunc(vv):Math.round(vv*m)}}else if(typeof v==='number'){out.params[k]=Math.round(v*m)}}return out}

function mapSignedKey(value){
  const v=Number(value)||0;
  if(v>0)return "+"+v;
  if(v<0)return String(v);
  return "0";
}
function mapNewsTextFor(key,before,after){
  const dir=after>before?"plus":"minus";
  return MAP_NEWS_LABELS[key]?.[dir]||"大陸の勢力圏に変化が生じた";
}
function renderMapLayersHtml(changedKey=null, scaleClass=""){
  const layers=[];
  const base=typeof MAP_LAYER_URLS!=="undefined"?MAP_LAYER_URLS:null;
  if(!base)return "";
  layers.push(`<img class="mapLayer baseBottom ${scaleClass}" src="${base.base.bottom}" draggable="false">`);
  for(const def of MAP_BORDER_DEFS){
    const value=State.map?.[def.key]||0;
    if(value===0)continue;
    const k=mapSignedKey(value);
    const url=base[def.key]?.[k];
    if(!url)continue;
    layers.push(`<img class="mapLayer dynamic ${def.key===changedKey?'changed':''} ${scaleClass}" src="${url}" draggable="false">`);
  }
  layers.push(`<img class="mapLayer baseTop ${scaleClass}" src="${base.base.top}" draggable="false">`);
  return layers.join("");
}

function prepareMapNewsQueue(){
  const raw=State.mapNews||[];
  if(!raw.length)return [];
  const scored=raw.map((item,idx)=>({
    ...item,
    originalIndex:idx,
    importance:mapNewsImportance(item)
  })).sort((a,b)=>b.importance-a.importance||a.originalIndex-b.originalIndex);

  if(scored.length<=3)return scored;

  const shown=scored.slice(0,3);
  const rest=scored.slice(3);
  shown.push({
    key:null,
    before:0,
    after:0,
    summary:true,
    text:`ほかにも${rest.length}か所で勢力圏が揺らいでいます。大陸の均衡は、静かに次の局面へ移りつつあります。`
  });
  return shown;
}
function mapNewsImportance(item){
  const key=item.key||"";
  let score=1;
  if(key.startsWith("altrant"))score+=3;
  if(key==="altrantLoire"||key==="altrantRick"||key==="altrantRuthenia")score+=1;
  if(key.startsWith("azraq"))score+=2;
  if(Math.abs((item.after||0)-(item.before||0))>=2)score+=2;
  if(Math.abs(item.after||0)>=3)score+=1;
  return score;
}

function showMapNews(){
  const raw=State.mapNews||[];
  if(!raw.length)return false;
  State.mapNewsDisplay=State.mapNewsDisplay&&State.mapNewsDisplay.length?State.mapNewsDisplay:prepareMapNewsQueue();
  const news=State.mapNewsDisplay;
  State.mapNewsIndex=State.mapNewsIndex||0;
  const item=news[State.mapNewsIndex];
  setScreen("screenMapNews");
  if(!State.mapNewsSoundIndex||State.mapNewsSoundIndex!==State.mapNewsIndex){sfx("mapNews");State.mapNewsSoundIndex=State.mapNewsIndex;}
  const title=item.summary?"各地の動揺":"勢力圏が変動しました";
  const mapHtml=item.summary?renderMapLayersHtml(null):renderMapLayersHtml(item.key);
  $("screenMapNews").innerHTML=`<div class="mapNewsScreen" onclick="advanceMapNews()"><div class="mapNewsBox"><div class="mapNewsKicker">世界情勢の変化</div><div class="mapNewsTitle">${title}</div><div class="mapNewsMap">${mapHtml}</div><div class="mapNewsText">${item.text}</div><div class="mapNewsCount">${State.mapNewsIndex+1}/${news.length}</div><div class="mapNewsCue">▼</div></div></div>`;
  return true;
}
function advanceMapNews(){
  audio();sfx("page");
  const news=State.mapNewsDisplay||State.mapNews||[];
  State.mapNewsIndex=(State.mapNewsIndex||0)+1;
  if(State.mapNewsIndex<news.length){
    showMapNews();
  }else{
    State.mapNews=[];
    State.mapNewsDisplay=[];
    State.mapNewsIndex=0;
    State.mapNewsSoundIndex=null;
    View.main();
  }
}

function setScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function fmt(n){return Math.round(n).toLocaleString('ja-JP')}
function periodLabel(){const age=16+Math.floor((State.turn-1)/2);return `${age}歳 ${State.turn%2?'上半期':'下半期'}`}
function paramHud(){return `<span class="param resourceParam">国庫 ${fmt(State.params.treasury)}</span><span class="param resourceParam">兵数 ${fmt(State.params.troops)}</span><span class="rankHint">国力${nationalPowerRank()}</span>`}
function getCase(id){return DATA.cases.find(c=>c.id===id)||activeCaptiveCases().find(c=>c.id===id)}
function actorIsUnlocked(id){return (State.actorsUnlocked||[]).includes(id)}
function actorStatusOf(id){return State.actorStatus?.[id]?.status||'normal'}
function actorIsTired(id){return actorStatusOf(id)==='tired'}
function actorIsInjured(id){return actorStatusOf(id)==='injured'}
function actorIsCaptured(id){return actorStatusOf(id)==='captured'}
function actorIsDead(id){return actorStatusOf(id)==='dead'}
function actorIsUsable(id){if(DATA.supportActors?.[id])return true;const st=State.actorStatus?.[id];return actorIsUnlocked(id)&&(!st||st.status==='normal'||st.status==='tired')}
function availableActorIds(){return (State.actorsUnlocked||[]).filter(actorIsUsable)}
function actorStatusLabel(id){const st=State.actorStatus?.[id];if(!st||st.status==='normal')return '通常';if(st.status==='tired')return '疲労';if(st.status==='injured')return '負傷';if(st.status==='captured')return '捕虜';if(st.status==='dead')return '死亡';if(st.status==='locked')return '未加入';return st.status}
function regularGrowthActorIds(){return ['albrecht','brother','wife','wife1','wife2','wife3','wife4','wife5','wife6']}
function actorCanGrow(id){return !!id&&regularGrowthActorIds().includes(id)&&!!DATA.actors[id]&&!DATA.actors[id].support}
function actorEffectiveStats(actor){
  if(!actor)return actor;
  if(actor.support||!actorCanGrow(actor.id))return {...actor};
  const g=actorGrowthOf(actor.id);
  let out={...actor,
    speed:actor.speed+(g.points.speed||0),
    push:actor.push+(g.points.push||0),
    stability:actor.stability+(g.points.stability||0),
    defense:actor.defense+(g.points.defense||0)
  };
  const cap=actor.id==='albrecht'?8:7;
  out.speed=clamp(out.speed,1,cap);
  out.push=clamp(out.push,1,cap);
  out.stability=clamp(out.stability,1,cap);
  out.defense=clamp(out.defense,1,cap);
  out.growthLevel=g.level||0;
  out.xp=g.xp||0;
  if(!actorIsTired(actor.id))return out;
  return {...out,speed:Math.max(1,out.speed-1),push:Math.max(1,out.push-1),stability:Math.max(1,out.stability-1),defense:Math.max(1,out.defense-1),statusNote:'疲労'};
}
function actorGrowthOf(id){
  if(!State.actorGrowth)State.actorGrowth={};
  if(!State.actorGrowth[id])State.actorGrowth[id]={xp:0,level:0,points:{speed:0,push:0,stability:0,defense:0},domains:{military:0,diplomacy:0,internal:0,religion:0,court:0,dynasty:0,occult:0}};
  const g=State.actorGrowth[id];
  if(!g.points)g.points={speed:0,push:0,stability:0,defense:0};
  if(!g.domains)g.domains={military:0,diplomacy:0,internal:0,religion:0,court:0,dynasty:0,occult:0};
  return g;
}
function nextGrowthXp(level){const table=[4,8,13,19,26,34,43,53];return table[level]||999;}
function actorGrowthPreference(id){
  const map={
    albrecht:['stability','push','speed','defense'],brother:['speed','push','stability','defense'],
    wife:['stability','defense','speed','push'],wife1:['stability','defense','speed','push'],wife2:['stability','speed','defense','push'],wife3:['defense','stability','speed','push'],
    wife4:['push','stability','defense','speed'],wife5:['speed','push','stability','defense'],wife6:['push','speed','defense','stability']
  };
  return map[id]||['stability','push','defense','speed'];
}
function growActorStat(id){
  const g=actorGrowthOf(id);
  const actor=DATA.actors[id];
  if(!actor||!actorCanGrow(id))return null;
  const cap=id==='albrecht'?8:7;
  const pref=actorGrowthPreference(id);
  let stat=pref.find(k=>(actor[k]||0)+(g.points[k]||0)<cap)||pref[0];
  if((actor[stat]||0)+(g.points[stat]||0)>=cap)return null;
  g.points[stat]=(g.points[stat]||0)+1;
  g.level=(g.level||0)+1;
  const names={speed:'速度',push:'押し込み',stability:'踏ん張り',defense:'立て直し'};
  return `${actor.name}の${names[stat]}が上がりました。`;
}
function caseExperienceDomains(c){
  const tags=caseMeta(c).tags||[];
  const out=[];
  if(tags.some(t=>['military','border','fort','security','war','mercenary','ruthenia','treuval'].includes(t)))out.push('military');
  if(tags.some(t=>['diplomacy','country','loire','rick','ruthenia','solia','azraq','seafeara','greatPower','trade'].includes(t)))out.push('diplomacy');
  if(tags.some(t=>['internal','welfare','people','city','village','finance','tax','road','building','plague','food'].includes(t)))out.push('internal');
  if(tags.some(t=>['religion','church','pilgrimage','faith','stunt'].includes(t)))out.push('religion');
  if(tags.some(t=>['court','noble','politics','law','university','culture','scandal'].includes(t)))out.push('court');
  if(tags.some(t=>['dynasty','family','marriage','succession','brother'].includes(t)))out.push('dynasty');
  if(tags.some(t=>['occult','witch','ghost','dragon','omen','animal','fate'].includes(t)))out.push('occult');
  return [...new Set(out)].slice(0,2);
}
function domainLabel(k){return {military:'軍事',diplomacy:'外交',internal:'内政',religion:'宗教',court:'宮廷',dynasty:'王朝',occult:'怪異'}[k]||k}
function dominantDomainText(id){
  if(!actorCanGrow(id))return '固定性能';
  const g=actorGrowthOf(id);
  const entries=Object.entries(g.domains||{}).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if(!entries.length)return '分野経験なし';
  return entries.slice(0,2).map(([k,v])=>`${domainLabel(k)}${v}`).join(' / ');
}
function applyDomainExperienceStats(actor,c){
  if(!actor||actor.support||!actorCanGrow(actor.id))return actor;
  const g=actorGrowthOf(actor.id);
  const ds=caseExperienceDomains(c);
  if(!ds.length)return actor;
  let out={...actor};
  const relevant=ds.reduce((sum,k)=>sum+(g.domains?.[k]||0),0);
  if(relevant>=4){
    if(ds.includes('military')){out.push+=1;out.stability+=1;}
    if(ds.includes('diplomacy')){out.stability+=1;out.defense+=1;}
    if(ds.includes('internal')){out.defense+=1;out.stability+=1;}
    if(ds.includes('religion')){out.defense+=1;out.stability+=1;}
    if(ds.includes('court')){out.speed+=1;out.defense+=1;}
    if(ds.includes('dynasty')){out.stability+=1;out.push+=1;}
    if(ds.includes('occult')){out.defense+=1;out.speed+=1;}
  }
  if(relevant>=10){out.push+=1;out.defense+=1;}
  const cap=actor.id==='albrecht'?8:7;
  out.speed=clamp(out.speed,1,cap);out.push=clamp(out.push,1,cap);out.stability=clamp(out.stability,1,cap);out.defense=clamp(out.defense,1,cap);
  out.domainNote=relevant>=10?'熟練補正大':relevant>=4?'熟練補正':'';
  return out;
}

function actorSuitabilityForCase(id,c){

  const match=p.tags.filter(t=>tags.has(t)).length;
  const penalty=p.weak.filter(t=>tags.has(t)).length;
  let bonus={};
  if(match>=1){

    if(match>=3){

}

function ensureEarlyDangerCase(out,count=5){

function visibleCases(){
  if(State.caseCache&&State.caseCache.turn===State.turn)return State.caseCache.cases.map(getCase).filter(Boolean).filter(c=>!caseBlockedByProgress(c));
  let out=[];
  if(State.turn===1){
    const count=5;

    const earlyPool=DATA.cases.filter(c=>c.id!=='tutorial_butler'&&c.id!=='horse'&&caseAvailable(c,1));
    const starterBuckets=[
      earlyPool.filter(c=>(caseMeta(c).tags||[]).includes('internal')||(caseMeta(c).tags||[]).includes('welfare')||(caseMeta(c).tags||[]).includes('people')),
      earlyPool.filter(c=>(caseMeta(c).tags||[]).includes('border')||(caseMeta(c).tags||[]).includes('diplomacy')||(caseMeta(c).tags||[]).includes('military')),
      earlyPool.filter(c=>(caseMeta(c).tags||[]).includes('finance')||(caseMeta(c).tags||[]).includes('city')||(caseMeta(c).tags||[]).includes('trade')),
      earlyPool.filter(c=>(caseMeta(c).tags||[]).includes('church')||(caseMeta(c).tags||[]).includes('law')||(caseMeta(c).tags||[]).includes('university'))
    ];
    const addStarter=c=>{if(c&&!out.includes(c)&&out.length<count)out.push(c)};
    out=[...fixed];

    for(const c of shuffleCasesForDisplay(earlyPool)){addStarter(c);if(out.length>=count)break;}
    out=ensureEarlyDangerCase(out,count);
  }
  else{
    const rank=nationalPowerRank();
    const treasuryLow=State.params.treasury<ECONOMY.lowTreasury;
    const troopsLow=State.params.troops<ECONOMY.lowTroops;
    const all=DATA.cases.filter(c=>c.id!=='tutorial_butler'&&caseAvailable(c,rank));
    const meta=c=>caseMeta(c), tags=c=>meta(c).tags||[];
    const safe=all.filter(c=>meta(c).scale<=rank&&!tags(c).includes('greatPower'));
    const money=all.filter(c=>tags(c).includes('trade')||tags(c).includes('internal')||tags(c).includes('welfare'));
    const military=all.filter(c=>tags(c).includes('border')||tags(c).includes('security')||tags(c).includes('greatPower'));
    const upper=all.filter(c=>meta(c).scale===rank+1&&!tags(c).includes('greatPower'));
    const rare=all.filter(c=>meta(c).scale>rank+1||tags(c).includes('greatPower'));
    const count=5;
    const rotate=a=>{if(!a.length)return[];const start=(State.turn*3+rank+a.length)%a.length;return[...a.slice(start),...a.slice(0,start)]};
    const hasMarriage=()=>out.some(c=>c.marriageCandidate);
    const canAdd=c=>c&&!out.includes(c)&&out.length<count&&(!c.marriageCandidate||!hasMarriage());
    const add=list=>{for(const c of rotate(list))if(canAdd(c))out.push(c)};
    const priorityStory=all.filter(c=>c.id==='brother_persuasion'||c.id==='brother_rebellion'||c.unlockActor||c.marriageCandidate||(State.turn===6&&c.id==='horse'));
    const tense5=tensionPriorityCases(all,5);
    const tense7=tensionPriorityCases(all,7);

    add(priorityStory);
    if(treasuryLow)add(money);
    if(troopsLow)add(safe.filter(c=>!tags(c).includes('border')&&!tags(c).includes('greatPower')));
    add(tense9);
    add(safe);
    if(!troopsLow)add(military.filter(c=>meta(c).scale<=rank));
    add(tense7);
    if(out.length<4)add(upper);
    add(tense5);
    if(out.length<5&&!treasuryLow&&!troopsLow)add(rare);
    add(all);
    out=out.slice(0,count);
    out=ensureLandBorderSkirmishCase(out,all,count);
    out=ensureEarlyDangerCase(out,count);
  }
  const captiveCases=activeCaptiveCases();
  if(captiveCases.length){
    out=[...captiveCases,...out.filter(c=>!captiveCases.some(x=>x.id===c.id))].slice(0,5);
  }

  let marriageShown=false;

    const rank=nationalPowerRank();

      out.push(c);
    }

function storyRecentMood(){

function storyOmenMood(){
  const age=storyAge();
  const occult=Object.keys(State.caseFlags||{}).filter(k=>k.startsWith('occult_')&&State.caseFlags[k]);
  const a=[];
  if(occult.length)a.push('森と古城と噂話は、もはやただの迷信ではない。王国が救い損ねた不安が、怪異という形で名を持ち始めている');
  if(age>=35)a.push('そして二十度目の冬が近い。幼き日に告げられた鷲の予言は、誰も口にしなくとも、玉座の間の空気を少し冷たくしている');
  else if(age>=30)a.push('三十を越えた王の背には、若き日の勢いとは違う重さが宿った。勝利も失敗も、今では未来の王朝へ受け継がれる材料になる');

function storyUpcomingMood(){
  const vis=visibleCases();
  if(!vis.length)return '今期、王宮に届いた報告はまだ整理されていない。だが静かな半期ほど、後に大きな意味を持つことがある。';
  const tagsOf=c=>caseMeta(c).tags||[];
  const priority=vis.slice().sort((a,b)=>{
    const score=c=>(c.difficulty==='desperate'?4:c.difficulty==='hard'?3:c.difficulty==='normal'?2:1)+(caseTensionLevel(c)>=7?2:0)+(tagsOf(c).includes('late')?2:0)+(tagsOf(c).includes('dynasty')?1:0)+(tagsOf(c).includes('occult')?1:0);
    return score(b)-score(a);
  }).slice(0,3);
  const names=priority.map(c=>c.title).join('、');
  const hasLate=priority.some(c=>tagsOf(c).includes('late'));
  const hasOccult=priority.some(c=>tagsOf(c).includes('occult'));
  const hasDynasty=priority.some(c=>tagsOf(c).includes('dynasty'));
  let tail='王はこの中から、限られた采配者と切り札で向き合う火種を選ばねばならない。';
  if(hasLate)tail='これは単なる案件ではなく、治世の総決算へつながる前触れでもある。';
  else if(hasOccult)tail='噂や迷信に見えるものほど、民衆の深い不安を映している。';
  else if(hasDynasty)tail='王家の小さな選択は、やがて大陸の血統図に線を引く。';
  return `この半期、特に目立つ報告は${names}であった。${tail}`;
}
function storyHeadline(){
  const age=storyAge(), season=storySeason();
  if(State.turn===1)return '十六歳の春。戴冠したばかりの王の前に、国そのものが試練として差し出された。祝鐘の余韻が消える前に、税、飢え、国境、選帝侯の視線が一斉に玉座へ集まっている。';
  if(age>=35)return `${age}歳の${season}。二十度目の冬は近い。王国は日々の案件を処理しながら、同時にアルブレヒトの治世が何であったかを記憶し始めている。`;
  if(age>=30)return `${age}歳の${season}。若き王の物語は終わり、大陸は一人の統治者としてアルブレヒトを見ている。成功も失敗も、もはや若さでは言い訳できない。`;
  if(age>=24)return `${age}歳の${season}。王国は日々の裁きだけでなく、制度、血統、大陸外交によって形を変えつつある。半期ごとの選択が、やがて国の骨格になる。`;
  if(age>=19)return `${age}歳の${season}。婚姻、選帝侯、隣国の使節が、王の私事さえ国家の針路へ変えていく。王宮の扉を叩く音は、以前より重い。`;
  return `${age}歳の${season}。若き鷲は、まだ自分の翼の重さを測っている。だが大陸は、若さを待ってくれるほど穏やかではない。`;
}
function storyChips(){
  const chips=[];
  const top=storyTopTensions();
  for(const t of top)chips.push(`<span class="chronicleChip danger">${t.label} 緊張${t.v}</span>`);
  const p=State.params||{};
  if(p.treasury<9000)chips.push('<span class="chronicleChip danger">国庫逼迫</span>');
  else if(p.treasury>25000)chips.push('<span class="chronicleChip good">国庫安定</span>');
  if(p.troops<1000)chips.push('<span class="chronicleChip danger">兵数不足</span>');
  else if(p.troops>3500)chips.push('<span class="chronicleChip good">軍備拡大</span>');
  if(State.marriage?.state==='married')chips.push('<span class="chronicleChip good">王妃あり</span>');
  if(actorIsUnlocked('brother'))chips.push('<span class="chronicleChip good">弟帰還</span>');
  if((State.cardRewardStats?.occult||0)>0)chips.push('<span class="chronicleChip omen">怪異の噂</span>');
  if(storyAge()>=35)chips.push('<span class="chronicleChip omen">予言の冬近し</span>');
  return chips.slice(0,7).join('');
}
function storyFocusMood(){
  const p=State.params||{};
  const vis=visibleCases();
  const tagsOf=c=>caseMeta(c).tags||[];
  const topT=storyTopTensions()[0];
  const urgent=vis.filter(c=>['desperate','hard'].includes(c.difficulty)||caseTensionLevel(c)>=7).slice(0,2).map(c=>c.title);
  const low=[];
  if((p.treasury||0)<9000)low.push('国庫');
  if((p.troops||0)<1200)low.push('兵');
  if((p.stability||50)<35)low.push('民心');
  if((p.prestige||50)<35)low.push('威信');
  if(low.length&&urgent.length)return `${low.join('・')}に余裕がない一方で、${urgent.join('、')}が王の前に積まれている。勝てる案件だけを拾うのか、危険な火種を先に潰すのかが、この半期の分岐点になる。`;
  if(topT&&topT.v>=7)return `${topT.label}の緊張が高く、内政案件の失敗も外交上の弱さとして読まれかねない。宮廷の一手は、国境の兵站と使節の口調を同時に動かす。`;
  if(vis.some(c=>tagsOf(c).includes('dynasty')))return '王朝に関わる報告が混じり始めている。子ども部屋、婚姻、後見人、教育といった柔らかな言葉の裏で、次代の正統性が静かに組み上がっていく。';
  if(vis.some(c=>tagsOf(c).includes('occult')))return '怪異めいた報告は、単なる余談として片づけられない。民衆が名づけられない恐怖を抱えた時、それは森の噂、古城の幽霊、魔女の裁きとして王宮へ届く。';
  if(vis.some(c=>tagsOf(c).includes('infrastructure')))return '建築と制度の案件は、すぐに英雄譚にはならない。だが橋、図書館、施療院、砦は、後の危機で王国が折れないための骨格になる。';
  return '今期の焦点は、一つの大事件ではなく小さな歪みの重なりにある。王がどの報告を重大事として扱うかによって、次の半期に現れる危機の形が変わる。';
}

function yearStoryText(){
  const lines=[];
  lines.push(`<div class="chronicleHeadline">${storyHeadline()}</div>`);
  lines.push(`<div class="chronicleLine"><b>焦点</b>${storyFocusMood()}</div>`);
  lines.push(`<div class="chronicleLine"><b>大陸</b>${storyWorldMood()} ${storyMapMood()}</div>`);
  lines.push(`<div class="chronicleLine"><b>国内</b>${storyParamMood()} ${storyCourtMood()}</div>`);
  lines.push(`<div class="chronicleLine"><b>王家</b>${storyFamilyMood()}</div>`);
  const omen=storyOmenMood();
  if(omen)lines.push(`<div class="chronicleLine"><b>影</b>${omen}</div>`);
  lines.push(`<div class="chronicleLine"><b>前期</b>${storyRecentMood()}</div>`);
  lines.push(`<div class="chronicleLine"><b>今期</b>${storyUpcomingMood()}</div>`);
  const chips=storyChips();
  if(chips)lines.push(`<div class="chronicleHints">${chips}</div>`);
  return `<div class="chronicleNews">${lines.join('')}</div>`;
}

function openingVeil(){
  const host=document.getElementById("game");
  if(!host)return;
  const v=document.createElement("div");
  v.className="openingTransitionVeil";
  host.appendChild(v);
  setTimeout(()=>v.remove(),680);
}
function playOpeningSfx(kind){
  audio();
  if(kind==="title"){
    beep(220,.18,"sine",.055);
    setTimeout(()=>beep(330,.16,"triangle",.045),95);
    setTimeout(()=>beep(520,.12,"triangle",.030),205);
  }else if(kind==="story"){
    beep(360,.08,"triangle",.036);
    setTimeout(()=>beep(540,.08,"triangle",.030),75);
  }else if(kind==="start"){
    beep(330,.07,"triangle",.040);
    setTimeout(()=>beep(520,.08,"triangle",.038),75);
    setTimeout(()=>beep(760,.10,"triangle",.034),150);
  }
}
function startOpeningTransition(){
  const screen=$("screenOpening");
  if(!screen)return showIntroStory();
  playOpeningSfx("title");
  openingVeil();
  screen.classList.add("openingFadeOut");
  setTimeout(()=>showIntroStory(),460);
}
function startStoryTransition(){
  const screen=$("screenOpening");
  if(!screen)return startGameFromOpening();
  playOpeningSfx("start");
  openingVeil();
  screen.classList.add("storyExit");
  setTimeout(()=>startGameFromOpening(true),420);
}


function startGameFromOpening(withEnter=false){
  View.main();
  if(withEnter){
    const s=$("screenMain");
    if(s){s.classList.add("mainEnter");setTimeout(()=>s.classList.remove("mainEnter"),700);}
  }
}

function isSpouseActorId(id){return /^wife[1-6]$/.test(id||'')}
function actorRiskTags(c){return caseMeta(c).tags||[]}
function spouseOriginPenalty(id){
  const map={
    wife1:{params:{stability:-6,citySupport:-5,prestige:-4},world:{}},
    wife2:{params:{diplomacy:-5,prestige:-4},world:{tension:{altrantLoire:2},influence:{altrantLoire:-25}}},
    wife3:{params:{churchSupport:-8,prestige:-4},world:{tension:{altrantRick:2}}},
    wife4:{params:{diplomacy:-7,nobleSupport:-3,prestige:-5},world:{tension:{altrantRuthenia:3},influence:{altrantRuthenia:-35}}},
    wife5:{params:{diplomacy:-6,churchSupport:-4,treasury:-2},world:{tension:{azraqRick:2,azraqLoire:1}}},
    wife6:{params:{troops:-180,prestige:-5,stability:-3},world:{tension:{altrantTreuval:3}}}
  };
  return map[id]||{params:{prestige:-4,stability:-3},world:{}};
}
function spouseDeathEpitaph(id){
  const name=DATA.actors[id]?.name||'王妃';
  const map={
    wife1:`${name}の死は、王都の路地にまで静かな悲しみを広げました。民は若き王の孤独を噂し、宮廷は黒布に包まれます。`,
    wife2:`${name}の死に、ロアール宮廷は弔意と疑念を同時に送りました。西方国境には柔らかな言葉の裏で硬い空気が満ちます。`,
    wife3:`${name}の死は聖職者たちに殉教の物語として語られ始めました。教会の祈りは深く、同時に王宮への視線も厳しくなります。`,
    wife4:`${name}の死を、ルテニアは偶然として受け止めませんでした。大国の使節は喪服のまま、王宮の隅々を測り始めます。`,
    wife5:`${name}の死に、南方の隊商とアズラク宮廷は沈黙しました。異文化婚姻の夢は、疑念と追悼の間で揺れます。`,
    wife6:`${name}の死は、海の向こうの氏族に復讐の歌を思い出させました。辺境の戦士たちは、王国の誠意を試そうとしています。`
  };
  return map[id]||`${name}は帰らぬ人となり、王宮は喪に沈みました。`;
}
function spouseDeathEligible(r){
  const tags=actorRiskTags(r.case);
  if((r.case?.danger||0)<2)return false;
  return ['war','border','plague','assassination','occult','late','crisis','military','greatPower'].some(t=>tags.includes(t));
}
function applySpouseDeath(id){
  const penalty=spouseOriginPenalty(id);
  if(penalty.params)Flow.applyEffect({params:penalty.params});
  if(penalty.world)applyWorldEffect(penalty.world);
  State.marriage.deadSpouses=State.marriage.deadSpouses||[];
  if(!State.marriage.deadSpouses.includes(id))State.marriage.deadSpouses.push(id);
  State.marriage.state='widower';
  State.marriage.spouseId=null;
  State.marriage.mourningUntil=State.turn+randInt(2,4);
  if(State.caseFlags)State.caseFlags['spouse_'+id]=false;
  setActorStatus(id,'dead');
  removeCaptive(id);
}
function applyActorConsequences(lanes=[]){
  const lines=[];
  const touched=new Set();
  for(const r of lanes){
    const id=r.actor?.id;
    if(!id||touched.has(id)||r.case?.id==='tutorial_butler'||actorIsDead(id)||actorIsCaptured(id))continue;
    // 臨時助力者は物語上の協力であり、恒久的な負傷・死亡・捕虜にはしない。
    if(DATA.supportActors?.[id])continue;
    let line='';
    const hard=r.rank==='completeLoss';
    const major=r.rank==='majorLoss';
    if(id==='brother'){
      if(['completeWin','majorWin','minorWin'].includes(r.rank))changeBrotherRelation(2,'弟は兄の采配の下で働き、わずかに心を近づけました',lines);
      if(r.rank==='draw')changeBrotherRelation(-1,'弟は結果の曖昧さを、兄の迷いとして受け止めました',lines);
      if(major)changeBrotherRelation(-5,'弟は敗北の痛みを、兄の采配への不信として抱え込みました',lines);
      if(hard)changeBrotherRelation(-10,'弟は決定的な敗北を、兄に従った屈辱として記憶しました',lines);
    }
    if(hard){
      if(id==='albrecht'){
        if(Math.random()<.12){
          State.pendingDeathEnding='battle';
          setActorStatus(id,'dead');
          line='アルブレヒトは戦場で致命傷を負いました。王国はこの半期の総括ののち、別の結末へ向かいます。';
        }else{
          setActorStatus(id,'tired',1);
          line=`${r.actor.name}は深く消耗し、次の半期は力を十分に発揮できません。`;
        }
      }else if(isSpouseActorId(id)){
        const eligible=spouseDeathEligible(r);
        const roll=Math.random();
        const deathChance=eligible?(State.turn>=28?.10:.06):0;
        const captiveChance=eligible?.10:.03;
        if(roll<deathChance){
          applySpouseDeath(id);
          line=spouseDeathEpitaph(id)+` 喪中のあいだ、婚姻案件は出現しません。`;
        }else if(roll<deathChance+captiveChance){
          setActorStatus(id,'captured');
          line=`${r.actor.name}は敵方に捕らえられました。王妃の身柄は、王朝と外交を揺さぶる重大な交渉材料になりました。`;
        }else{
          const turns=eligible?randInt(2,3):1;
          setActorStatus(id,'injured',turns);
          line=`${r.actor.name}は重傷を負い、${turns}期のあいだ采配に出られません。王宮には不安が広がります。`;
          Flow.applyEffect({params:{prestige:-2,stability:-2}});
        }
      }else if(id==='brother'){
        const roll=Math.random();
        if(roll<.18){
          setActorStatus(id,'captured');
          line=`${r.actor.name}は敵方に捕らえられました。王弟の身柄は、反王派やリックに利用されかねません。`;
        }else{
          setActorStatus(id,'injured',randInt(1,2));
          line=`${r.actor.name}は深手を負い、しばらく采配に出られません。王宮では継承をめぐる不安が囁かれます。`;
          Flow.applyEffect({params:{prestige:-2,nobleSupport:-2}});
        }
      }else{
        // 将来の恒久レギュラー追加に備えた通常処理。死亡は抑え、負傷か捕虜中心にする。
        const roll=Math.random();
        if(roll<.16){
          setActorStatus(id,'captured');
          line=`${r.actor.name}は敵方に捕らえられました。次の半期以降、捕虜解放交渉が案件として現れます。`;
        }else{
          setActorStatus(id,'injured',1);
          line=`${r.actor.name}は深手を負い、次の半期は采配に出られません。`;
        }
      }
    }else if(major){
      if(id==='albrecht'){
        setActorStatus(id,'tired',1);
        line=`${r.actor.name}は疲労し、次の半期は力を十分に発揮できません。`;
      }else if(isSpouseActorId(id)){
        if(spouseDeathEligible(r)&&Math.random()<.05){
          setActorStatus(id,'injured',2);
          Flow.applyEffect({params:{prestige:-2,stability:-1}});
          line=`${r.actor.name}は深く傷つき、2期のあいだ采配に出られません。王妃の危機は宮廷に重く受け止められました。`;
        }else{
          setActorStatus(id,'tired',1);
          line=`${r.actor.name}は消耗し、次の半期は力を十分に発揮できません。`;
        }
      }else if(id==='brother'&&Math.random()<.10){
        setActorStatus(id,'injured',1);
        line=`${r.actor.name}は退却の混乱で負傷しました。次の半期は采配に出られません。`;
      }else{
        setActorStatus(id,'tired',1);
        line=`${r.actor.name}は疲労し、次の半期は力を十分に発揮できません。`;
      }
    }
    if(line){
      touched.add(id);
      r.specialLines=r.specialLines||[];
      r.specialLines.push(line);
      lines.push(line);
    }
  }
  return lines;
}
function handleActorDeath(id){
  if(!id)return;
  removeCaptive(id);
  if(State.marriage?.spouseId===id||isSpouseActorId(id)){
    if(!State.marriage?.deadSpouses?.includes(id)){
      State.marriage.deadSpouses=State.marriage.deadSpouses||[];
      State.marriage.deadSpouses.push(id);
    }
    if(State.marriage?.spouseId===id){
      State.marriage.state='widower';
      State.marriage.spouseId=null;
      State.marriage.mourningUntil=State.turn+2;
    }
    if(State.caseFlags)State.caseFlags['spouse_'+id]=false;
  }
}
function actorConsequenceHtml(data){
  const lines=data?.actorConsequences||[];
  if(!lines.length)return '';
  return `<div class="economyBreakdown"><h3>采配者の状態</h3>${lines.map(x=>`<div class="econRow"><span>${x}</span><b>状態変化</b><b>—</b></div>`).join('')}</div>`;
}

    State.caseFlags[flag]=true;
    if(lines)lines.push(`怪異の余波により、続編案件「${OCCULT_FLAG_LABELS[flag]||flag}」が解禁されました。`);

function unlockOccultFlagsFromResult(r,lines){
  if(!r||!r.case)return;
  const id=r.case.id;
  if(id==='occult_witch_trial'&&r.rank==='completeLoss')setOccultFlag('occult_witch_hunt_unlocked',lines);

function changeBrotherRelation(delta,reason,out){
  if(!actorIsUnlocked('brother')||State.caseFlags?.brotherDead)return;
  State.brotherRelation=clamp((State.brotherRelation||0)+(Number(delta)||0),-100,100);
  if(out&&reason&&delta)out.push(`${reason}（弟との関係 ${delta>0?'+':''}${delta}）`);
}
function maybeTriggerBrotherRebellion(){
  if(!actorIsUnlocked('brother')||State.caseFlags?.brotherDead||State.caseFlags?.brotherRebellionUnlocked||State.caseFlags?.brotherPersuasionUnlocked)return null;
  if(actorIsCaptured('brother')||actorIsDead('brother'))return null;
  if(State.completedCases?.includes('brother_rebellion'))return null;
  const age=currentAge();
  if(age<20)return null;
  const rel=State.brotherRelation||0;
  let chance=0;
  if(rel<=-45)chance=.55;
  else if(rel<=-30)chance=.34;
  else if(rel<=-18)chance=.18;
  else if(rel<=-8&&age>=28)chance=.08;
  if(chance<=0)return null;
  if(Math.random()<chance){
    if(rel>-35){
      State.caseFlags.brotherPersuasionUnlocked=true;
      State.brotherRebellionRisk=0;
      return '弟との亀裂はまだ完全には裂けていません。王宮に、最後の説得の機会が生まれました。';
    }
    State.caseFlags.brotherRebellionUnlocked=true;
    State.brotherRebellionRisk=0;
    return '弟との亀裂が限界に近づき、王宮に反逆の気配が満ち始めた。';
  }
  State.brotherRebellionRisk=(State.brotherRebellionRisk||0)+1;
  if(State.brotherRebellionRisk>=4&&rel<=-30){
    if(rel>-40){
      State.caseFlags.brotherPersuasionUnlocked=true;
      State.brotherRebellionRisk=0;
      return '積み重なった不信は、まだ言葉で止められるかもしれない。弟への説得が急務となった。';
    }
    State.caseFlags.brotherRebellionUnlocked=true;
    State.brotherRebellionRisk=0;
    return '積み重なった不信が、ついに反逆の火種となった。';
  }
  return null;
}
function killBrotherAfterRebellion(out){
  if(!actorIsUnlocked('brother'))return;
  setActorStatus('brother','dead');
  State.actorsUnlocked=(State.actorsUnlocked||[]).filter(x=>x!=='brother');
  if(State.caseFlags){State.caseFlags.brotherDead=true;State.caseFlags.brotherRebellionUnlocked=false;}
  State.brotherRelation=-100;
  removeCaptive('brother');
  if(out)out.push('ルートヴィヒは反逆の果てに命を落としました。以後、弟は采配者として戻りません。');
}


function addGrowthPointForCase(actorId,stat,amount,lines,label){
  if(!actorCanGrow(actorId))return false;
  const g=actorGrowthOf(actorId);
  const base=DATA.actors[actorId]||{};
  const cap=actorId==='albrecht'?8:7;
  const before=(g.points[stat]||0);
  const room=Math.max(0,cap-((base[stat]||0)+before));
  const inc=Math.min(Math.max(0,amount||1),room);
  const names={speed:'速度',push:'押し込み',stability:'踏ん張り',defense:'立て直し'};
  if(inc>0){
    g.points[stat]=before+inc;
    g.level=(g.level||0)+inc;
    lines.push(`${label||DATA.actors[actorId]?.name||actorId}の${names[stat]||stat}が上がりました。`);
    return true;
  }
  lines.push(`${label||DATA.actors[actorId]?.name||actorId}は既に${names[stat]||stat}を十分に鍛えています。`);
  return false;
}
function addGrowthXpAndDomains(actorId,xp,domains,lines,label){
  if(!actorCanGrow(actorId))return;
  const g=actorGrowthOf(actorId);
  g.xp=(g.xp||0)+(xp||0);
  if(!g.domains)g.domains={military:0,diplomacy:0,internal:0,religion:0,court:0,dynasty:0,occult:0};
  for(const d of domains||[])g.domains[d]=(g.domains[d]||0)+1;
  const dtext=(domains||[]).length?` / ${(domains||[]).map(domainLabel).join('・')}経験 +1`:'';
  if(xp||domains?.length)lines.push(`${label||DATA.actors[actorId]?.name||actorId} 熟練度 +${xp||0}${dtext}`);
}

function applySpecialCaseResult(r){
  const c=r.case;
  if(!c)return r;
  const lines=[];

  if(c.id==='brother_persuasion'){
    if(isSuccessRank(r.rank)){
      if(State.caseFlags){State.caseFlags.brotherPersuasionUnlocked=false;State.caseFlags.brotherRebellionUnlocked=false;State.caseFlags.brotherRebellionSoftened=false;}
      State.brotherRebellionRisk=0;
      changeBrotherRelation(18,'兄弟は決裂の寸前で踏みとどまりました',lines);
      lines.push('弟はなお「弟」のまま王宮に残りました。本名は、まだ歴史の表へ出ていません。');
    }else if(isHardFailureRank(r.rank)){
      if(State.caseFlags){State.caseFlags.brotherPersuasionUnlocked=false;State.caseFlags.brotherRebellionUnlocked=true;State.caseFlags.brotherRebellionSoftened=true;}
      changeBrotherRelation(-12,'説得の失敗は、弟の沈黙を反逆へ近づけました',lines);
      lines.push('説得は届きませんでした。次に現れる時、弟は名を掲げて兄に歯向かうでしょう。');
    }else{
      changeBrotherRelation(4,'弟はまだ迷いを捨てきれません',lines);
      if(State.caseFlags){State.caseFlags.brotherPersuasionUnlocked=false;State.caseFlags.brotherRebellionSoftened=true;}
      State.brotherRebellionRisk=1;
      lines.push('火種は小さくなりましたが、完全には消えていません。');
    }
  }

  if(c.id==='brother_rebellion'){
    if(isSuccessRank(r.rank)){
      killBrotherAfterRebellion(lines);
      State.params.prestige=clamp((State.params.prestige||50)-4,0,100);
      State.params.stability=clamp((State.params.stability||50)-4,0,100);
    }else if(isHardFailureRank(r.rank)){
      State.brotherRelation=-100;
      lines.push('反逆は鎮めきれませんでした。ルートヴィヒの名は、兄王に対抗する血筋として宮廷に刻まれました。');
    }
  }

  const unlockedCrisis=unlockCrisisFlagFromResult(r);
  if(unlockedCrisis)lines.push(`大失敗の余波により、続編危機「${CRISIS_FLAG_LABELS[unlockedCrisis]||unlockedCrisis}」が解禁されました。`);
  unlockOccultFlagsFromResult(r,lines);

  if(c.captiveActor){
    const a=DATA.actors[c.captiveActor];
    if(isSuccessRank(r.rank)){
      removeCaptive(c.captiveActor);
      setActorStatus(c.captiveActor,'normal');
      lines.push(`${a?.name||'捕虜'}は解放され、采配者として復帰しました。`);
    }else if(isHardFailureRank(r.rank)){
      lines.push(`${a?.name||'捕虜'}の解放は実現しませんでした。交渉は次の機会へ持ち越されます。`);
    }
  }

  if(c.id==='tutorial_butler'&&!State.butlerCardUnlocked){
    State.butlerCardUnlocked=true;
    if(grantCard('butler'))lines.push('老執事は小さな封書を差し出した。切り札「老執事の助言」を得ました。');
  }

  const infraFlags={
    infra_stone_bridge:'infra_stone_bridge_built',
    infra_royal_library:'infra_royal_library_built',
    infra_infirmary_wing:'infra_infirmary_wing_built',
    infra_star_fort:'infra_star_fort_built',
    infra_rose_theatre:'infra_rose_theatre_built',
    infra_drydock:'infra_drydock_built'
  };
  if(infraFlags[c.id]&&isSuccessRank(r.rank)){
    if(!State.caseFlags)State.caseFlags={};
    State.caseFlags[infraFlags[c.id]]=true;
    lines.push('この建築・制度改革は恒久効果として記録され、関連案件の初期ラインに小さな補正を与えます。');
  }

  if(c.id==='horse'&&isSuccessRank(r.rank)){
    const g=actorGrowthOf('albrecht');
    const base=DATA.actors.albrecht;
    if((base.speed||0)+(g.points.speed||0)<8){
      g.points.speed=(g.points.speed||0)+1;
      g.level=(g.level||0)+1;
      lines.push('アルブレヒトは馬上の恐怖を克服しました。速度が上がりました。');
    }else{
      lines.push('アルブレヒトはシュトルムを乗りこなし、馬上采配の確信を深めました。');
    }
    g.xp=(g.xp||0)+2;
    if(!g.domains)g.domains={military:0,diplomacy:0,internal:0,religion:0,court:0,dynasty:0,occult:0};
    g.domains.military=(g.domains.military||0)+2;
    if(!State.caseFlags)State.caseFlags={};
    State.caseFlags.horseMastered=true;
    lines.push('アルブレヒト 熟練度 +2 / 軍事経験 +2');
  }

  applyTrainingCaseReward(c,r,lines);

  if(c.once)completeCase(c.id);

  if(c.unlockActor){
    if(isSuccessRank(r.rank)){
      if(unlockActor(c.unlockActor)){
        if(c.unlockActor==='brother'){
          if(State.caseFlags)State.caseFlags.brotherReturnRetryUnlocked=false;
          changeBrotherRelation(c.id==='brother_return_01'?8:4,'弟は帰国したものの、その胸にはリックで育った年月も残っています',lines);
        }
        lines.push(`${DATA.actors[c.unlockActor]?.name||'新たな人物'}が采配者に加わりました。案件選択上限が${maxSelectableCases()}件になりました。`);
      }
    }else if(isHardFailureRank(r.rank)){
      if(c.unlockActor==='brother')changeBrotherRelation(-8,'帰還交渉の失敗は、弟との距離をさらに広げました',lines);
      if(c.id==='brother_return_01'){
        if(State.caseFlags)State.caseFlags.brotherReturnRetryUnlocked=true;
        lines.push('この帰還交渉は決裂しました。リック側は条件を重くしましたが、次の再交渉の余地は残っています。');
      }else if(c.id==='brother_return_02'){
        lines.push('再交渉も決裂しました。弟の帰国はさらに遠のき、宮廷には重い沈黙が残りました。');
      }else{
        lines.push('この交渉は決裂しました。加入は、今後の続編案件に委ねられます。');
      }
    }
  }

  if(c.marriageCandidate){
    const wid=c.marriageCandidate;
    if(isSuccessRank(r.rank)){
      if(unlockActor(wid)){
        State.marriage.state='married';
        State.marriage.spouseId=wid;
        if(State.caseFlags){State.caseFlags.dynasty_started=true;State.caseFlags['spouse_'+wid]=true;}
        if(!State.marriage.marriedHistory.includes(wid))State.marriage.marriedHistory.push(wid);
        lines.push(`${DATA.actors[wid]?.name||'王妃'}が王妃となり、采配者に加わりました。案件選択上限が${maxSelectableCases()}件になりました。`);
      }
    }else if(isHardFailureRank(r.rank)){
      if(!State.rejectedSpouses.includes(wid))State.rejectedSpouses.push(wid);
      lines.push(`${DATA.actors[wid]?.name||'候補者'}との婚姻は破談となりました。`);
    }
  }

  r.specialLines=lines;
  return r;
}



/* =========================================================
   ILLNESS / FINAL FATE PRESSURE
   疫病・過労・晩年の不調を、病没エンドと36歳の運命へ接続する。
   ========================================================= */
function caseHasAnyTag(c,tags){
  const own=(caseMeta(c).tags||[]);
  return tags.some(t=>own.includes(t));
}
function updateIllnessStrainFromResults(lanes=[],ignored=[]){
  let delta=0;
  for(const r of lanes){
    const loss=['minorLoss','majorLoss','completeLoss'].includes(r.rank);
    const hard=['majorLoss','completeLoss'].includes(r.rank);
    const plagueLike=caseHasAnyTag(r.case,['plague','welfare','city','late','fate','occult']);
    if(loss&&plagueLike)delta+=hard?2:1;
    if(['completeWin','majorWin'].includes(r.rank)&&caseHasAnyTag(r.case,['plague','welfare']))delta-=1;
    if(r.actor?.id==='albrecht'&&hard)delta+=1;
  }
  for(const r of ignored){
    if(caseHasAnyTag(r.case,['plague','welfare','late','fate']))delta+=1;
  }
  if(currentAge()>=31&&(State.params.stability||50)<30)delta+=1;
  if(currentAge()>=33&&(State.params.treasury||0)<3000)delta+=1;
  State.illnessStrain=clamp((State.illnessStrain||0)+delta,0,12);
}
function maybeTriggerIllnessEnding(){
  const age=currentAge();
  if(age<32||State.pendingDeathEnding||State.gameOver)return false;
  const strain=State.illnessStrain||0;
  if(strain<6)return false;
  let chance=0;
  if(strain>=11)chance=.28;
  else if(strain>=9)chance=.18;
  else if(strain>=7)chance=.10;
  else chance=.05;
  if((State.params.stability||50)<22)chance+=.05;
  if(currentAge()>=35)chance+=.05;
  if(Math.random()<chance){
    State.pendingDeathEnding='illness';
    return true;
  }
  return false;
}
function fatePressureLine(){
  const strain=State.illnessStrain||0;
  if(strain>=10)return '晩年の王は、報告書の上に落ちる自分の手の震えを隠せなくなっていた。占い師の言葉は迷信ではなく、身体の奥から近づく足音になっていた。';
  if(strain>=7)return '疫病、過労、宮廷の重圧が、王の頬から若さを削っていた。二十度目の冬という言葉は、冗談では済まなくなりつつあった。';
  if(currentAge()>=35)return '二十度目の冬は近い。王宮では誰も口にしないが、古い占いの言葉だけが廊下の冷気に混じっていた。';
  return '';
}
